<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta Premium v6</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        :root {
            --primary: #8a2be2;
            --bg: #f0f2f5;
            --surface: rgba(255, 255, 255, 0.4);
            --text: #1a1a1a;
            --text-mut: #65676b;
            --border: rgba(255, 255, 255, 0.5);
            --glass: blur(25px);
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
            --del-bg: #000;
            --del-txt: #fff;
        }

        [data-theme="dark"] {
            --bg: #0a0a0b;
            --surface: rgba(30, 30, 35, 0.4);
            --text: #ffffff;
            --text-mut: #b0b3b8;
            --border: rgba(255, 255, 255, 0.1);
            --del-bg: #fff;
            --del-txt: #000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .hidden { display: none !important; }

        /* ЦЕНТРАЛИЗАЦИЯ ВСЕГО */
        .main-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            width: 100%;
        }

        .content-area {
            width: 100%;
            max-width: 500px; /* Идеальная ширина для фокуса внимания */
            padding: 0 15px 100px;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: 24px;
        }

        /* ИСТОРИИ */
        .stories-container { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; margin-top: 15px; }
        .story-circle { flex-shrink: 0; width: 70px; text-align: center; cursor: pointer; }
        .ring { width: 66px; height: 66px; border-radius: 50%; padding: 3px; border: 2px solid var(--primary); margin-bottom: 5px; }
        .ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #ccc; }

        /* ПОСТЫ */
        .post { margin: 20px 0; overflow: hidden; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .post-h { padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .p-ava { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-img { width: 100%; display: block; border-radius: 0; max-height: 550px; object-fit: cover; }
        .post-act { padding: 12px 15px; display: flex; gap: 20px; }
        .btn-act { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 16px; }
        .btn-del { background: var(--del-bg); color: var(--del-txt); border: none; padding: 5px 12px; border-radius: 10px; font-size: 11px; margin-left: auto; cursor: pointer; }

        /* МЕНЮ */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 65px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 9999;
        }
        .nav-link { cursor: pointer; color: var(--text-mut); display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-link.active { color: var(--primary); transform: translateY(-5px); }
        .nav-link i { font-style: normal; font-size: 24px; }
        .nav-link span { font-size: 10px; font-weight: bold; margin-top: 2px; }

        /* ПРОФИЛЬ */
        .p-header { padding: 30px 20px; text-align: center; }
        .p-main-ava { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); padding: 4px; margin-bottom: 15px; }
        .p-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; border-top: 1px solid var(--border); padding-top: 15px; }
        .p-stats b { display: block; font-size: 18px; color: var(--text); }
        .p-stats span { font-size: 12px; color: var(--text-mut); }

        /* ИНПУТЫ */
        input, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 10px; outline: none; }
        .main-btn { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; }

        /* ОКНО ЧАТА */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div class="main-layout">
    <div id="page-auth" class="content-area" style="display:flex; align-items:center; min-height:100vh;">
        <div class="glass" style="padding:40px; width:100%; text-align:center;">
            <h1 style="font-size:40px; color:var(--primary); margin-bottom:20px;">KASTA</h1>
            <input id="login-u" placeholder="Никнейм">
            <input id="login-p" type="password" placeholder="Пароль">
            <button class="main-btn" onclick="authAction('login')">Войти</button>
            <p onclick="authAction('register')" style="margin-top:15px; font-size:13px; cursor:pointer;">Нет аккаунта? Зарегистрироваться</p>
        </div>
    </div>

    <div id="page-app" class="content-area hidden">
        
        <div id="sec-feed">
            <div class="stories-container glass" id="stories-list">
                <div class="story-circle" onclick="document.getElementById('file-story').click()">
                    <div class="ring" style="border-style:dashed; border-color:var(--text-mut); display:flex; align-items:center; justify-content:center; font-size:30px;">+</div>
                    <span style="font-size:10px;">Твоя</span>
                    <input type="file" id="file-story" hidden accept="image/*" onchange="uploadStory(this)">
                </div>
            </div>
            <div id="feed-items"></div>
        </div>

        <div id="sec-chats" class="hidden">
            <div class="glass" style="margin-top:20px; padding:15px;">
                <input id="search-users" oninput="filterChats(this.value)" placeholder="🔍 Поиск друзей..." style="margin:0;">
            </div>
            <div id="chats-items" style="margin-top:15px;"></div>
        </div>

        <div id="sec-profile" class="hidden">
            <div id="profile-card" class="glass p-header" style="margin-top:20px;"></div>
            
            <div class="glass" style="margin:20px 0; padding:20px;">
                <textarea id="new-post-text" placeholder="Напиши что-нибудь... Описание важно!" rows="2"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label style="color:var(--primary); cursor:pointer; font-weight:bold;">🖼️ Фото <input type="file" id="new-post-file" hidden accept="image/*"></label>
                    <button class="main-btn" style="width:auto; padding:8px 25px;" onclick="publishPost()">Пост</button>
                </div>
            </div>

            <div id="profile-posts-grid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:3px;"></div>
        </div>

        <div id="sec-settings" class="hidden">
            <div class="glass" style="margin-top:20px; padding:25px;">
                <h3>Настройки KASTA</h3>
                <div style="margin:20px 0;">
                    <p style="font-size:12px; margin-bottom:5px;">Имя пользователя</p>
                    <input id="edit-name" placeholder="Твоё имя">
                    <p style="font-size:12px; margin-bottom:5px;">Био (Описание)</p>
                    <textarea id="edit-bio" placeholder="Расскажи о себе..."></textarea>
                    <button class="main-btn" onclick="saveProfileChanges()">Сохранить изменения</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="main-btn" style="background:#fff; color:#000;" onclick="switchTheme('light')">Светлая</button>
                    <button class="main-btn" style="background:#222; color:#fff;" onclick="switchTheme('dark')">Темная</button>
                </div>
                <button class="main-btn" style="background:#ff3b30; margin-top:20px;" onclick="logOut()">Выйти из системы</button>
            </div>
        </div>

        <nav class="bottom-nav glass">
            <div class="nav-link active" onclick="changeTab('feed', this)"><i>🏠</i><span>Лента</span></div>
            <div class="nav-link" onclick="changeTab('chats', this)"><i>💬</i><span>Чаты</span></div>
            <div class="nav-link" onclick="goToMyProfile(this)"><i>👤</i><span>Профиль</span></div>
            <div class="nav-link" onclick="changeTab('settings', this)"><i>⚙️</i><span>Опции</span></div>
        </nav>
    </div>
</div>

<div id="chat-window">
    <div class="glass" style="padding:15px; display:flex; align-items:center; gap:15px; border-radius:0;">
        <button onclick="document.getElementById('chat-window').style.display='none'" style="background:none; border:none; font-size:25px; color:var(--text);">←</button>
        <b id="chat-with-name">Чат</b>
    </div>
    <div id="messages-container" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;"></div>
    <div class="glass" style="padding:15px; display:flex; gap:10px; border-radius:0;">
        <input id="message-input" placeholder="Сообщение..." style="margin:0;">
        <button class="main-btn" style="width:auto; padding:0 20px;" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const API = "https://kasta-l49s.onrender.com";
    let token = localStorage.getItem('token'), me = localStorage.getItem('user'), currentChat = "";

    // Починка ссылок и HTTPS
    function safeUrl(url) {
        if(!url) return 'https://ui-avatars.com/api/?background=random&name=K';
        return url.replace('http://', 'https://');
    }

    async function apiCall(path, method='GET', body=null) {
        const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        const config = { method, headers };
        if(body) config.body = JSON.stringify(body);
        try {
            const res = await fetch(API+path, config);
            if(res.status === 401) logOut();
            return await res.json();
        } catch(e) { return { error: true }; }
    }

    // АВТОРИЗАЦИЯ
    async function authAction(type) {
        const u = document.getElementById('login-u').value, p = document.getElementById('login-p').value;
        if(!u || !p) return alert("Заполни всё!");
        const res = await fetch(`${API}/${type}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username:u, password:p})
        });
        const d = await res.json();
        if(res.ok) {
            localStorage.setItem('token', d.token); localStorage.setItem('user', d.username);
            location.reload();
        } else alert(d.message);
    }

    function logOut() { localStorage.clear(); location.reload(); }

    // ТАБЫ (ИСПРАВЛЕННЫЙ NAV)
    function changeTab(tabId, btn) {
        // Прячем всё
        document.getElementById('sec-feed').classList.add('hidden');
        document.getElementById('sec-chats').classList.add('hidden');
        document.getElementById('sec-profile').classList.add('hidden');
        document.getElementById('sec-settings').classList.add('hidden');
        
        // Показываем нужный
        const target = document.getElementById('sec-' + tabId);
        if(target) target.classList.remove('hidden');

        // Активная кнопка
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(btn) btn.classList.add('active');

        // Загрузка данных
        if(tabId === 'feed') { loadFeed(); loadStories(); }
        if(tabId === 'chats') loadChats();
    }

    // ПОСТЫ: ЛАЙКИ И УДАЛЕНИЕ
    async function loadFeed() {
        const data = await apiCall('/posts');
        if(!Array.isArray(data)) return;
        document.getElementById('feed-items').innerHTML = data.map(p => `
            <div class="post glass">
                <div class="post-h">
                    <img src="${safeUrl(p.authorAvatar)}" class="p-ava">
                    <b>${p.author}</b>
                    ${p.author === me ? `<button class="btn-del" onclick="deletePost('${p._id}')">Удалить</button>` : ''}
                </div>
                ${p.imageUrl ? `<img src="${safeUrl(p.imageUrl)}" class="post-img">` : ''}
                <div class="post-act">
                    <button class="btn-act" onclick="likePost('${p._id}')">${p.likes.includes(me)?'❤️':'🤍'} ${p.likes.length}</button>
                    <button class="btn-act">💬 ${p.comments.length}</button>
                </div>
                <div style="padding:0 15px 15px; font-size:14px;"><b>${p.author}</b> ${p.text || ''}</div>
            </div>
        `).reverse().join('');
    }

    window.deletePost = async (id) => {
        if(confirm("Удалить этот пост?")) {
            await apiCall('/posts/'+id, 'DELETE');
            loadFeed();
        }
    }

    window.likePost = async (id) => {
        await apiCall(`/posts/${id}/like`, 'POST');
        loadFeed();
    }

    // ПРОФИЛЬ (ВЕРНУЛ ВСЕ КНОПКИ И BIO)
    async function goToMyProfile(btn) {
        changeTab('profile', btn);
        const u = await apiCall('/users/profile/'+me);
        if(u.error) return;

        document.getElementById('profile-card').innerHTML = `
            <img src="${safeUrl(u.avatarUrl)}" class="p-main-ava">
            <h2>${u.displayName || u.username}</h2>
            <p style="color:var(--text-mut); margin:5px 0;">@${u.username}</p>
            <div style="margin:10px 0; font-size:14px;">${u.bio || 'Описания пока нет...'}</div>
            <div class="p-stats">
                <div><b>${u.posts.length}</b><span>Посты</span></div>
                <div><b>${u.subscribersCount || 0}</b><span>Друзья</span></div>
                <div><b>${u.followingCount || 0}</b><span>Подписки</span></div>
            </div>
        `;

        document.getElementById('profile-posts-grid').innerHTML = u.posts.map(p => `
            <img src="${safeUrl(p.imageUrl)}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:5px;">
        `).join('');

        // Пре-заполнение настроек
        document.getElementById('edit-name').value = u.displayName || '';
        document.getElementById('edit-bio').value = u.bio || '';
    }

    async function saveProfileChanges() {
        const n = document.getElementById('edit-name').value;
        const b = document.getElementById('edit-bio').value;
        await apiCall('/users/update', 'POST', { displayName: n, bio: b });
        alert("Профиль обновлен!");
        goToMyProfile();
    }

    // ЧАТЫ И СООБЩЕНИЯ
    async function loadChats() {
        const d = await apiCall('/chats');
        if(d.error) return;
        document.getElementById('chats-items').innerHTML = d.users.map(u => `
            <div class="glass" style="margin-bottom:10px; padding:15px; display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="openChatWith('${u.username}')">
                <img src="${safeUrl(u.avatarUrl)}" class="p-ava">
                <b>${u.username}</b>
            </div>
        `).join('');
    }

    window.openChatWith = async (username) => {
        currentChat = username;
        document.getElementById('chat-with-name').innerText = username;
        document.getElementById('chat-window').style.display = 'flex';
        const msgs = await apiCall('/messages/'+username);
        document.getElementById('messages-container').innerHTML = msgs.map(m => `
            <div style="align-self:${m.sender===me?'flex-end':'flex-start'}; background:${m.sender===me? 'var(--primary)':'var(--surface)'}; color:${m.sender===me?'#fff':'var(--text)'}; padding:10px 15px; border-radius:15px; max-width:80%; font-size:14px;">
                ${m.text}
            </div>
        `).join('');
        const c = document.getElementById('messages-container'); c.scrollTop = c.scrollHeight;
    }

    window.sendMessage = async () => {
        const inp = document.getElementById('message-input'); if(!inp.value) return;
        await apiCall('/messages', 'POST', { recipient: currentChat, text: inp.value });
        inp.value = ""; openChatWith(currentChat);
    }

    // ИСТОРИИ (БЕЗ ОШИБОК 404)
    async function loadStories() {
        const res = await apiCall('/stories');
        const list = document.getElementById('stories-list');
        list.innerHTML = list.children[0].outerHTML; // Сохраняем кнопку +
        if(Array.isArray(res)) {
            res.forEach(s => {
                list.innerHTML += `
                    <div class="story-circle">
                        <div class="ring"><img src="${safeUrl(s.userAva)}"></div>
                        <span style="font-size:10px;">${s.username}</span>
                    </div>
                `;
            });
        }
    }

    async function uploadStory(el) {
        const f = el.files[0]; if(!f) return;
        const img = await compressImg(f);
        await apiCall('/stories', 'POST', { image: img });
        loadStories();
    }

    async function publishPost() {
        const t = document.getElementById('new-post-text').value;
        const f = document.getElementById('new-post-file').files[0];
        if(!t && !f) return alert("Пусто!");
        let img = f ? await compressImg(f) : "";
        await apiCall('/posts', 'POST', { text: t, imageUrl: img });
        document.getElementById('new-post-text').value = "";
        goToMyProfile();
    }

    function compressImg(f) {
        return new Promise(r => {
            const rd = new FileReader(); rd.readAsDataURL(f);
            rd.onload = e => {
                const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = 800; c.height = (i.height/i.width)*800;
                    c.getContext('2d').drawImage(i,0,0,800,c.height);
                    r(c.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    function switchTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); }
    switchTheme(localStorage.getItem('theme') || 'light');

    if(token) {
        document.getElementById('page-auth').classList.add('hidden');
        document.getElementById('page-app').classList.remove('hidden');
        changeTab('feed');
    }
</script>
</body>
</html>
