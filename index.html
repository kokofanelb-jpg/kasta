<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0095f6; --bg: #ffffff; --border: #dbdbdb; --text: #262626; --gray: #8e8e8e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .desktop-nav { border-right: 1px solid var(--border); width: 250px; height: 100vh; position: fixed; left: 0; top: 0; padding: 20px; display: flex; flex-direction: column; background: #fff; }
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 1000; font-size: 24px; }
        .main-container { margin-left: 250px; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .content-width { width: 100%; max-width: 500px; padding-bottom: 80px; }
        .post { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; background: #fff; overflow: hidden; }
        .post-header { padding: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        @media (max-width: 768px) { .desktop-nav { display: none; } .mobile-nav { display: flex; } .main-container { margin-left: 0; padding: 10px; } }
    </style>
</head>
<body>

    <nav class="desktop-nav">
        <h2 style="color: var(--accent);">Kasta</h2>
        <div onclick="showTab('feed')">🏠 Лента</div>
        <div onclick="showTab('chats')">💬 Чаты</div>
        <div onclick="showTab('search')">🔍 Поиск</div>
        <div onclick="showTab('profile')">👤 Профиль</div>
        <div onclick="logout()" style="margin-top: auto; color: red;">🚪 Выйти</div>
    </nav>

    <nav class="mobile-nav">
        <div onclick="showTab('chats')">💬</div>
        <div onclick="showTab('feed')">🏠</div>
        <div onclick="showTab('profile')">👤</div>
        <div onclick="showTab('search')">🔍</div>
    </nav>

    <div class="main-container">
        <div class="content-width">
            
            <div id="auth-screen">
                <h2 id="auth-title">Вход в Kasta</h2>
                <input id="u-name" placeholder="Юзернейм">
                <input id="u-pass" type="password" placeholder="Пароль">
                <button class="btn-main" onclick="handleAuth('login')">Войти</button>
                <button class="btn-main" style="background:#333;" onclick="handleAuth('register')">Создать аккаунт</button>
            </div>

            <div id="app-screens" class="hidden">
                <div id="tab-feed">
                    <textarea id="post-txt" placeholder="Что нового?"></textarea>
                    <input type="file" id="post-file" accept="image/*">
                    <button class="btn-main" onclick="publishPost()">Опубликовать</button>
                    <div id="feed-items"></div>
                </div>

                <div id="tab-search" class="hidden">
                    <input oninput="runSearch(this.value)" placeholder="Поиск @username...">
                    <div id="search-list"></div>
                </div>

                <div id="tab-profile" class="hidden">
                    <div style="text-align:center">
                        <img id="my-ava" style="width:100px; height:100px; border-radius:50%; object-fit:cover">
                        <h3 id="my-name"></h3>
                        <p id="my-handle"></p>
                    </div>
                    <div id="profile-actions"></div>
                    <button class="btn-main" onclick="showTab('settings')">Настройки</button>
                </div>

                <div id="tab-settings" class="hidden">
                    <input id="set-name" placeholder="Новое имя">
                    <input type="file" id="set-ava-file" accept="image/*">
                    <button class="btn-main" onclick="saveSettings()">Сохранить</button>
                </div>
                
                <div id="tab-chats" class="hidden">
                    <h2>Чаты</h2>
                    <div id="chats-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
