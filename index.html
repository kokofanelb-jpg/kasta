<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0095f6; --bg: #ffffff; --border: #dbdbdb; --text: #262626; --gray: #8e8e8e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .hidden { display: none !important; }

        /* НАВИГАЦИЯ */
        .desktop-nav { border-right: 1px solid var(--border); width: 250px; height: 100vh; position: fixed; left: 0; top: 0; padding: 20px; display: flex; flex-direction: column; background: #fff; }
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 1000; font-size: 24px; }
        .nav-link { cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .nav-link:hover { background: #f0f0f0; }

        /* КОНТЕНТ */
        .main-container { margin-left: 250px; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .content-width { width: 100%; max-width: 500px; padding-bottom: 80px; }

        /* ПОСТЫ */
        .post { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; background: #fff; overflow: hidden; }
        .post-header { padding: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .post-img { width: 100%; display: block; object-fit: cover; max-height: 500px; }
        .post-content { padding: 12px; }

        /* ПРОФИЛЬ */
        .profile-header { text-align: center; padding: 20px 0; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .stats-row { display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 15px 0; }
        .stat-btn { text-align: center; cursor: pointer; flex: 1; }
        .stat-btn b { display: block; font-size: 18px; }

        /* ЧАТ */
        #msg-history { height: 400px; overflow-y: auto; border: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; border-radius: 12px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #fff; }
        .msg.received { align-self: flex-start; background: #dbdbdb; color: #000; }

        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .mobile-nav { display: flex; }
            .main-container { margin-left: 0; padding: 10px; }
        }
    </style>
</head>
<body>

    <nav class="desktop-nav">
        <h2 style="color: var(--accent);">Kasta</h2>
        <div class="nav-link" onclick="showTab('feed')">🏠 Лента</div>
        <div class="nav-link" onclick="showTab('chats')">💬 Чаты</div>
        <div class="nav-link" onclick="showTab('search')">🔍 Поиск</div>
        <div class="nav-link" onclick="showTab('profile')">👤 Профиль</div>
        <div class="nav-link" onclick="logout()" style="margin-top: auto; color: red;">🚪 Выйти</div>
    </nav>

    <nav class="mobile-nav">
        <div onclick="showTab('chats')">💬</div>
        <div onclick="showTab('feed')">🏠</div>
        <div onclick="showTab('profile')">👤</div>
        <div onclick="showTab('search')">🔍</div>
    </nav>

    <div class="main-container">
        <div class="content-width">
            
            <div id="auth-screen">
                <div style="text-align: center; margin-top: 50px;">
                    <h2 id="auth-title">Вход в Kasta</h2>
                    <input id="u-name" placeholder="Юзернейм">
                    <input id="u-pass" type="password" placeholder="Пароль">
                    <button id="auth-btn" class="btn-main" onclick="handleAuth('login')">Войти</button>
                    <p><a href="javascript:void(0)" onclick="toggleAuthMode()" id="auth-link">Нет аккаунта? Создать</a></p>
                </div>
            </div>

            <div id="app-screens" class="hidden">
                
                <div id="tab-feed">
                    <div style="background:#fff; padding:15px; border:1px solid var(--border); border-radius:12px; margin-bottom:20px;">
                        <textarea id="post-txt" placeholder="Что нового?"></textarea>
                        <input id="post-img-url" placeholder="Ссылка на фото (URL)">
                        <button class="btn-main" onclick="publishPost()">Опубликовать</button>
                    </div>
                    <div id="feed-items"></div>
                </div>

                <div id="tab-search" class="hidden">
                    <h2>Поиск</h2>
                    <input type="text" oninput="runSearch(this.value)" placeholder="Введите @username...">
                    <div id="search-list" style="margin-top:15px;"></div>
                </div>

                <div id="tab-chats" class="hidden">
                    <div id="chats-list-view">
                        <h2>Мои переписки</h2>
                        <div id="active-dialogs"></div>
                    </div>
                    <div id="chat-box" class="hidden">
                        <button class="btn-main" style="width:auto" onclick="closeChat()">← Назад</button>
                        <h3 id="chat-title">Чат</h3>
                        <div id="msg-history"></div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input id="msg-input" placeholder="Сообщение..." style="margin:0">
                            <button class="btn-main" style="width:auto" onclick="sendMsg()">➤</button>
                        </div>
                    </div>
                </div>

                <div id="tab-profile" class="hidden">
                    <div class="profile-header">
                        <img id="my-ava" class="profile-avatar" src="https://via.placeholder.com/100">
                        <h3 id="my-name">Загрузка...</h3>
                        <p id="my-handle" style="color:var(--gray)">@username</p>
                    </div>
                    <div class="stats-row">
                        <div class="stat-btn"><b id="s-p">0</b>посты</div>
                        <div class="stat-btn"><b id="s-subers">0</b>подписчики</div>
                        <div class="stat-btn"><b id="s-subing">0</b>подписки</div>
                    </div>
                    <div id="profile-actions">
                         <button class="btn-main" onclick="showTab('settings')">⚙️ Настройки</button>
                    </div>
                </div>

                <div id="tab-settings" class="hidden">
                    <h2>Настройки профиля</h2>
                    <label>Никнейм:</label><input id="set-name">
                    <label>Ссылка на аватарку:</label><input id="set-ava">
                    <button class="btn-main" onclick="saveSettings()">Сохранить</button>
                    <button class="btn-main" style="background:red" onclick="logout()">Выйти</button>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
