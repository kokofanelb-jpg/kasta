<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        /* === ТЕМЫ И ПЕРЕМЕННЫЕ === */
        :root { 
            --primary: #8a2be2; 
            --bg: #f4f5f7; 
            --surface: #ffffff; 
            --text: #1a1a1a; 
            --text-mut: #8e8e8e; 
            --border: rgba(0, 0, 0, 0.08);
            
            /* Эффекты стекла (Glassmorphism) */
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-blur: blur(16px);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            
            --radius: 24px;
            --anim: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg: #0f0f11;
            --surface: #1c1c1e;
            --text: #f0f0f0;
            --text-mut: #8e8e93;
            --border: rgba(255, 255, 255, 0.08);
            
            /* Темное стекло */
            --glass-bg: rgba(28, 28, 30, 0.55);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); transition: background var(--anim), color var(--anim); overflow-x: hidden; }
        
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 90px; }

        /* АНИМАЦИИ ПОЯВЛЕНИЯ */
        .fade-in { animation: fadeIn var(--anim) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* КЛАСС СТЕКЛА ДЛЯ БЛОКОВ */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            border-radius: var(--radius);
        }

        /* === ТИПОГРАФИКА И ИНПУТЫ === */
        input, textarea { width: 100%; padding: 16px 20px; border: 1px solid var(--border); border-radius: 18px; margin-bottom: 12px; font-size: 15px; background: rgba(128, 128, 128, 0.05); color: var(--text); transition: all var(--anim); outline: none; backdrop-filter: blur(5px); }
        input:focus, textarea:focus { border-color: var(--primary); background: transparent; box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.1); }
        
        /* === КНОПКИ === */
        .btn { background: var(--primary); color: white; border: none; padding: 16px 24px; border-radius: 18px; font-weight: 600; cursor: pointer; font-size: 16px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-gray { background: var(--border); color: var(--text); box-shadow: none; }
        .btn:active { transform: scale(0.94); box-shadow: 0 2px 8px rgba(0,0,0,0.1); } /* Эффект дрожания/прожатия */
        .btn-icon { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .btn-icon:active { transform: scale(0.8); }

        /* === АВТОРИЗАЦИЯ === */
        #view-auth { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; background: radial-gradient(circle at top right, var(--primary), transparent 40%), var(--bg); }
        .auth-card { padding: 40px 30px; text-align: center; }

        /* === ПОСТЫ === */
        .post { margin: 15px; overflow: hidden; transition: transform var(--anim); }
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .p-ava-s { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
        .post-img { width: 100%; display: block; max-height: 500px; object-fit: cover; }
        .post-actions { padding: 12px 15px; display: flex; align-items: center; gap: 15px; }
        .post-info { padding: 0 15px 12px; font-size: 14.5px; line-height: 1.5; }
        
        .comm-sec { padding: 12px 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.01); }
        .comm-item { margin-bottom: 8px; font-size: 14px; }

        /* === ПРОФИЛЬ === */
        .prof-top { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; border-radius: 0 0 var(--radius) var(--radius); }
        .p-ava-l { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid var(--primary); padding: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .p-stats { display: flex; width: 100%; justify-content: space-evenly; margin: 20px 0; }
        .p-stats div { text-align: center; cursor: pointer; padding: 10px; border-radius: 12px; transition: background 0.2s; }
        .p-stats div:active { background: var(--border); transform: scale(0.95); }
        .p-stats b { display: block; font-size: 20px; }
        .p-stats span { font-size: 13px; color: var(--text-mut); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 0 15px; }
        .grid-item { aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .grid-item:active { transform: scale(0.95); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* === ЧАТЫ И СПИСКИ === */
        .list-item { padding: 15px; display: flex; align-items: center; gap: 15px; margin: 10px 15px; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .list-item:active { transform: scale(0.98); background: rgba(0,0,0,0.05); }
        
        #msg-box { height: calc(100vh - 150px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: background var(--anim); }
        .m { padding: 14px 18px; border-radius: 22px; max-width: 78%; font-size: 15px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .m-out { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 6px; }
        .m-in { align-self: flex-start; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: var(--text); border-bottom-left-radius: 6px; }
        .m-time { font-size: 11px; opacity: 0.7; display: block; margin-top: 6px; text-align: right; }

        /* === НАВИГАЦИЯ (Тоже стекло) === */
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; height: 70px; display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-radius: 35px; }
        .nav-btn { background: none; border: none; color: var(--text-mut); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; padding: 10px; }
        .nav-btn.active { color: var(--primary); transform: translateY(-4px); }
        .nav-btn svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2.2; transition: transform 0.2s; }
        .nav-btn:active svg { transform: scale(0.8); }
        .badge { position: absolute; top: 0px; right: 2px; background: #ff3b30; color: white; border-radius: 12px; padding: 3px 7px; font-size: 11px; font-weight: bold; border: 2px solid var(--surface); animation: popIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* === МОДАЛКИ (Списки пользователей и фото) === */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:2000; display:flex; flex-direction: column; justify-content: flex-end; visibility: hidden; opacity: 0; transition: all 0.3s; backdrop-filter: blur(5px); }
        .overlay.show { visibility: visible; opacity: 1; }
        .bottom-sheet { background: var(--bg); width: 100%; max-height: 80vh; border-radius: 30px 30px 0 0; padding: 20px 0; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        .overlay.show .bottom-sheet { transform: translateY(0); }
        
        #modal-zoom { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; display:flex; align-items:center; justify-content:center; visibility: hidden; opacity: 0; transition: 0.3s; }
        #modal-zoom.show { visibility: visible; opacity: 1; }
        #modal-img { max-width: 95%; max-height: 95%; border-radius: 16px; transition: transform 0.3s; transform: scale(0.9); }
        #modal-zoom.show #modal-img { transform: scale(1); }

        .settings-block { margin: 15px; padding: 25px; }
        .color-picker { display: flex; gap: 15px; margin-top: 20px; justify-content: space-between;}
        .color-circle { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .color-circle:active { transform: scale(0.8); }

        /* ПК-ВЕРСИЯ */
        @media (min-width: 768px) {
            body { padding-right: 280px; display: flex; justify-content: center; }
            .container { margin: 0; padding-top: 20px; }
            .nav { bottom: 0; left: auto; right: 0; top: 0; transform: none; width: 280px; height: 100vh; border-radius: 0; border: none; border-left: 1px solid var(--border); flex-direction: column; justify-content: flex-start; padding: 40px 20px; }
            .nav-btn { width: 100%; flex-direction: row; justify-content: flex-start; padding: 18px; gap: 15px; border-radius: 16px; margin-bottom: 10px; }
            .nav-btn.active { background: var(--primary); color: #fff; transform: none; }
            .nav-btn span { display: block; font-size: 17px; font-weight: 600; }
            .badge { top: 18px; right: 18px; }
        }
    </style>
</head>
<body>

    <div id="view-auth">
        <div class="auth-card glass-panel fade-in">
            <h1 style="font-size: 44px; margin-bottom: 10px; color: var(--primary); letter-spacing: 3px; font-weight: 800;">KASTA</h1>
            <p style="color: var(--text-mut); margin-bottom: 35px; font-size: 16px;">Premium Social Network</p>
            <input id="auth-u" placeholder="Логин (Никнейм)">
            <input id="auth-p" type="password" placeholder="Пароль">
            <button class="btn" style="width:100%; margin-top:15px;" onclick="handleAuth('login')">Войти</button>
            <button class="btn btn-gray" style="width:100%; margin-top:15px;" onclick="handleAuth('register')">Создать аккаунт</button>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="container">
            
            <div id="sec-feed" class="fade-in">
                <div id="feed-list" style="padding-top: 10px;"></div>
            </div>

            <div id="sec-search" class="hidden fade-in">
                <div class="settings-block glass-panel"><input oninput="doSearch(this.value)" placeholder="Найти друзей..." style="margin:0;"></div>
                <div id="search-list"></div>
            </div>

            <div id="sec-chats" class="hidden fade-in">
                <div id="chats-list" style="padding-top: 10px;"></div>
                <div id="chat-active" class="hidden">
                    <div class="glass-panel" style="padding:15px 20px; display:flex; gap:15px; align-items:center; position:sticky; top:0; z-index:10; border-radius:0 0 24px 24px; border-top:none;">
                        <button class="btn-icon" onclick="backToChats()"><svg viewBox="0 0 24 24" stroke="currentColor" width="28"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <b id="chat-name" style="font-size: 18px;">Чат</b>
                    </div>
                    <div id="msg-box"></div>
                    <div class="glass-panel" style="padding:15px; display:flex; gap:12px; position:sticky; bottom:0; border-radius:24px 24px 0 0; border-bottom:none;">
                        <input id="m-in" placeholder="Написать сообщение..." style="margin:0; border-radius: 24px;">
                        <button class="btn" style="border-radius: 50%; width:52px; height:52px; padding:0;" onclick="sendMsg()"><svg viewBox="0 0 24 24" width="20" stroke="white" fill="none" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </div>
                </div>
            </div>

            <div id="sec-profile" class="hidden fade-in">
                <div id="prof-ui" class="prof-top glass-panel"></div>
                
                <div id="prof-edit" class="settings-block glass-panel hidden fade-in">
                    <h3 style="margin-bottom:15px;">Редактировать профиль</h3>
                    <input id="edit-name" placeholder="Имя профиля">
                    <label style="display:block; margin-bottom:15px; color:var(--primary); cursor:pointer; font-weight:bold;">
                        Загрузить новую аватарку <input type="file" id="edit-ava" accept="image/*" style="display:none;">
                    </label>
                    <button class="btn" onclick="saveProfile()" style="width:100%">Сохранить изменения</button>
                    <button class="btn btn-gray" onclick="toggleEdit(false)" style="width:100%; margin-top:10px;">Отмена</button>
                </div>

                <div id="prof-create-post" class="settings-block glass-panel fade-in" style="margin-bottom: 20px;">
                    <textarea id="p-txt" placeholder="Добавь описание к посту..." rows="2" style="border:none; background:transparent; font-size:16px; padding: 0 0 10px 0; border-radius:0; box-shadow:none;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items:center; border-top: 1px solid var(--border); padding-top:15px;">
                        <label class="btn btn-gray" style="cursor:pointer; border-radius: 14px; padding: 12px 18px;">
                            <svg viewBox="0 0 24 24" width="20" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            Фото
                            <input type="file" id="p-img" accept="image/*" style="display:none;">
                        </label>
                        <button class="btn" id="btn-post" onclick="doPost()" style="border-radius: 14px; padding: 12px 24px;">Опубликовать</button>
                    </div>
                </div>

                <div id="prof-posts" class="grid fade-in"></div>
                <div id="prof-feed" class="hidden fade-in">
                   <button class="btn btn-gray glass-panel" onclick="closeProfFeed()" style="width:calc(100% - 30px); margin:15px;">← Вернуться к сетке</button>
                   <div id="prof-feed-list"></div>
                </div>
            </div>

            <div id="sec-settings" class="hidden fade-in">
                <div class="settings-block glass-panel">
                    <h2 style="margin-bottom: 20px;">Внешний вид (Стекло)</h2>
                    <div style="display:flex; gap:12px;">
                        <button class="btn btn-gray" style="flex:1; background:#f4f5f7; color:#000;" onclick="setTheme('light')">Светлая</button>
                        <button class="btn" style="flex:1; background:#1c1c1e; color:#fff;" onclick="setTheme('dark')">Темная</button>
                    </div>
                    <div class="color-picker">
                        <div class="color-circle" style="background:#8a2be2;" onclick="setColor('#8a2be2')"></div>
                        <div class="color-circle" style="background:#0095f6;" onclick="setColor('#0095f6')"></div>
                        <div class="color-circle" style="background:#ff2d55;" onclick="setColor('#ff2d55')"></div>
                        <div class="color-circle" style="background:#34c759;" onclick="setColor('#34c759')"></div>
                        <div class="color-circle" style="background:#ff9500;" onclick="setColor('#ff9500')"></div>
                    </div>
                    <button class="btn btn-gray" style="width:100%; margin-top:35px; color:#ff3b30; font-weight:bold; background:rgba(255,59,48,0.1);" onclick="logout()">Выйти из аккаунта</button>
                </div>
            </div>
        </div>

        <nav class="nav glass-panel">
            <button class="nav-btn active" onclick="nav('feed', this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Лента</span></button>
            <button class="nav-btn" onclick="nav('search', this)"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><span>Поиск</span></button>
            <button class="nav-btn" onclick="nav('chats', this)"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><div id="dot" class="badge hidden"></div><span>Чаты</span></button>
            <button class="nav-btn" onclick="openProfile(me, this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Профиль</span></button>
            <button class="nav-btn" onclick="nav('settings', this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg><span>Опции</span></button>
        </nav>
    </div>

    <div id="modal-zoom" onclick="closeZoom()"><img id="modal-img"></div>

    <div id="modal-users" class="overlay" onclick="if(event.target===this) this.classList.remove('show')">
        <div class="bottom-sheet">
            <div style="padding: 0 20px 15px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                <h3 id="mu-title">Список</h3>
                <button class="btn-icon" onclick="document.getElementById('modal-users').classList.remove('show')"><svg viewBox="0 0 24 24" width="24" stroke="currentColor" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div id="mu-list" style="padding: 10px 0;"></div>
        </div>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        const DEF = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";
        let token = localStorage.getItem('token'), me = localStorage.getItem('currentUser'), curP, chatL, lastProfileData = null;

        function fixUrl(url) { if(!url) return DEF; return url.replace('http://localhost:3000', API).replace('http://', 'https://'); }

        async function api(path, opt={}) {
            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            opt.headers = { ...headers, ...opt.headers };
            const r = await fetch(API+path, opt);
            if(r.status === 401) logout();
            return r.json();
        }

        async function handleAuth(t) {
            const u = document.getElementById('auth-u').value.trim(), p = document.getElementById('auth-p').value.trim();
            if(!u || !p) return alert("Заполни поля");
            const res = await fetch(`${API}/${t}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
            const d = await res.json();
            if(res.ok) { localStorage.setItem('token', d.token); localStorage.setItem('currentUser', d.username); location.reload(); }
            else alert(d.message); // Сервер сам скажет, если ник занят
        }

        function logout() { localStorage.clear(); location.reload(); }

        function updateChatGradient() {
            const color = localStorage.getItem('color') || '#8a2be2';
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            const chatBox = document.getElementById('msg-box');
            
            // Логика градиентов для чата: создаем вайб
            if(!isDark && color === '#ff2d55') {
                // Как ты просила: светлая + красный = красно-черный градиент
                chatBox.style.background = `linear-gradient(135deg, #2b0005, #ff2d55)`;
                chatBox.style.color = "#fff"; // Чтобы текст было видно
            } else if (isDark) {
                chatBox.style.background = `linear-gradient(135deg, #050505, ${color}50)`;
            } else {
                chatBox.style.background = `linear-gradient(135deg, #f0f0f0, ${color}30)`;
            }
        }

        function setTheme(m) { 
            if(m==='dark') document.body.setAttribute('data-theme', 'dark'); 
            else document.body.removeAttribute('data-theme');
            localStorage.setItem('theme', m);
            updateChatGradient();
        }
        function setColor(c) { 
            document.documentElement.style.setProperty('--primary', c); 
            localStorage.setItem('color', c);
            updateChatGradient();
        }

        function nav(s, btn) {
            document.querySelectorAll('[id^="sec-"]').forEach(x => x.classList.add('hidden'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            if(btn) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
            if(s==='feed') loadFeed();
            if(s==='chats') loadChats();
        }

        function renderPostList(pp, elId) {
            const list = document.getElementById(elId); list.innerHTML = '';
            pp.forEach(p => {
                const div = document.createElement('div'); div.className = 'post glass-panel fade-in';
                div.innerHTML = `
                    <div class="post-h" onclick="openProfile('${p.author}')">
                        <img class="p-ava-s" src="${fixUrl(p.authorAvatar)}">
                        <b style="font-size:16px;">${p.author}</b>
                        ${p.author === me ? `<span style="margin-left:auto; color:#ff3b30; font-weight:bold; padding:5px;" onclick="event.stopPropagation(); deletePost('${p._id}')">✕ Удалитиь</span>` : ''}
                    </div>
                    ${p.imageUrl ? `<img src="${fixUrl(p.imageUrl)}" class="post-img" onclick="zoom('${fixUrl(p.imageUrl)}')">` : ''}
                    <div class="post-actions">
                        <button class="btn-icon" onclick="doLike('${p._id}', '${elId}')">
                            <svg viewBox="0 0 24 24" stroke="${p.likes?.includes(me) ? 'var(--primary)' : 'currentColor'}" fill="${p.likes?.includes(me) ? 'var(--primary)' : 'none'}" width="28"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        </button>
                        <b style="font-size:15px;">${p.likes?.length || 0} отметок "Нравится"</b>
                    </div>
                    ${p.text ? `<div class="post-info"><b>${p.author}</b> ${p.text}</div>` : ''}
                    <div class="comm-sec">
                        <div id="cl-${p._id}">${(p.comments || []).map(c => `<div class="comm-item"><b>${c.author}</b> ${c.text}</div>`).join('')}</div>
                        <div style="display:flex; gap:10px; margin-top:12px;">
                            <input id="ci-${p._id}" placeholder="Добавьте комментарий..." style="margin:0; padding:10px 15px; border-radius:20px; font-size:14px;">
                            <button style="color:var(--primary); border:none; background:none; font-weight:bold; padding:0 10px; cursor:pointer;" onclick="addComment('${p._id}', '${elId}')">ОК</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function loadFeed() { 
            const pp = await api('/posts'); 
            const now = Date.now();
            const H24 = 24 * 60 * 60 * 1000;
            
            // Фильтр: показываем только те, которым меньше 24 часов (или если нет даты создания)
            const activePosts = pp.filter(p => {
                if(!p.createdAt) return true;
                return (now - new Date(p.createdAt).getTime()) < H24;
            });
            
            renderPostList(activePosts, 'feed-list'); 
        }

        async function openProfile(n, btn) {
            nav('profile', btn || document.querySelectorAll('.nav-btn')[3]); closeProfFeed();
            const u = await api('/users/profile/'+n); lastProfileData = u;
            const isMe = u.username === me, isSub = u.subscribers?.includes(me);
            
            // Кнопка создания поста показывается ТОЛЬКО в своем профиле
            document.getElementById('prof-create-post').classList.toggle('hidden', !isMe);

            document.getElementById('prof-ui').innerHTML = `
                <img src="${fixUrl(u.avatarUrl)}" class="p-ava-l">
                <h2 style="font-size:24px; margin-bottom:5px;">${u.displayName || u.username}</h2>
                <p style="color:var(--text-mut); font-size:14px; margin-bottom:10px;">@${u.username}</p>
                <div class="p-stats">
                    <div><b>${u.posts.filter(p=>p.imageUrl).length}</b><span>посты</span></div>
                    <div onclick="showFollowList('subscribers')"><b>${u.subscribersCount}</b><span>подписчики</span></div>
                    <div onclick="showFollowList('subscriptions')"><b>${u.subscriptionsCount}</b><span>подписки</span></div>
                </div>
                ${isMe ? `<button class="btn btn-gray" style="width:100%; border-radius:16px;" onclick="toggleEdit(true)">Настройки профиля</button>` : `<button class="btn" style="width:100%; border-radius:16px;" onclick="doFollow('${u.username}')">${isSub?'Отписаться':'Подписаться'}</button>`}
            `;
            const grid = document.getElementById('prof-posts'); grid.innerHTML = '';
            // В профиле показываем ВСЕ фото-посты, без 24ч ограничения
            u.posts.filter(p => p.imageUrl).forEach(p => {
                const d = document.createElement('div'); d.className = 'grid-item'; d.innerHTML = `<img src="${fixUrl(p.imageUrl)}">`;
                d.onclick = () => openProfFeed(); grid.appendChild(d);
            });
        }

        function showFollowList(type) {
            if(!lastProfileData) return;
            const arr = type === 'subscribers' ? lastProfileData.subscribers : lastProfileData.subscriptions;
            document.getElementById('mu-title').innerText = type === 'subscribers' ? 'Подписчики' : 'Подписки';
            const listEl = document.getElementById('mu-list');
            
            if(!arr || arr.length === 0) {
                listEl.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-mut);">Тут пока пусто</div>`;
            } else {
                // Если бэкэнд отдает массив строк (имён)
                listEl.innerHTML = arr.map(username => `
                    <div class="list-item glass-panel" style="margin:5px 20px;" onclick="document.getElementById('modal-users').classList.remove('show'); openProfile('${username}')">
                        <div style="width:40px; height:40px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">${username[0].toUpperCase()}</div>
                        <b style="font-size:16px;">${username}</b>
                    </div>
                `).join('');
            }
            document.getElementById('modal-users').classList.add('show');
        }

        function openProfFeed() { 
            document.getElementById('prof-posts').classList.add('hidden'); 
            document.getElementById('prof-feed').classList.remove('hidden'); 
            document.getElementById('prof-create-post').classList.add('hidden');
            renderPostList(lastProfileData.posts.filter(p=>p.imageUrl), 'prof-feed-list'); 
        }
        function closeProfFeed() { 
            document.getElementById('prof-posts').classList.remove('hidden'); 
            document.getElementById('prof-feed').classList.add('hidden'); 
            if(lastProfileData && lastProfileData.username === me) {
                document.getElementById('prof-create-post').classList.remove('hidden');
            }
        }

        async function doLike(id, lid) { await api(`/posts/${id}/like`, {method:'POST'}); if(lid==='feed-list') loadFeed(); else { const u=await api('/users/profile/'+lastProfileData.username); lastProfileData=u; openProfFeed(); } }
        async function addComment(id, lid) { 
            const i = document.getElementById('ci-'+id); if(!i.value.trim()) return;
            await api(`/posts/${id}/comment`, {method:'POST', body:JSON.stringify({text:i.value})});
            i.value=""; if(lid==='feed-list') loadFeed(); else { const u=await api('/users/profile/'+lastProfileData.username); lastProfileData=u; openProfFeed(); }
        }

        async function loadMsgs() {
            const m = await api('/messages/'+curP);
            document.getElementById('msg-box').innerHTML = m.map(msg => `<div class="m ${msg.sender === me ? 'm-out' : 'm-in'} fade-in">${msg.text}<span class="m-time">${new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>`).join('');
            const b = document.getElementById('msg-box'); b.scrollTop = b.scrollHeight;
        }

        async function sendMsg() {
            const i = document.getElementById('m-in'); if(!i.value.trim()) return;
            await api('/messages', { method:'POST', body:JSON.stringify({receiver:curP, text: i.value}) });
            i.value = ""; loadMsgs();
        }

        async function doPost() {
            const b=document.getElementById('btn-post'), t=document.getElementById('p-txt').value, f=document.getElementById('p-img').files[0];
            if(!t && !f) return alert('Добавь фото или текст!'); 
            b.disabled=true; b.innerText = "Грузим...";
            let img = ""; if(f) img = await compressImage(f);
            await api('/posts', { method:'POST', body:JSON.stringify({text:t, imageUrl:img}) });
            document.getElementById('p-txt').value=""; document.getElementById('p-img').value=""; b.disabled=false; b.innerText = "Опубликовать"; 
            openProfile(me); // Перезагружаем профиль чтобы увидеть пост
        }

        function compressImage(file) {
            return new Promise(r => {
                const rd = new FileReader(); rd.readAsDataURL(file);
                rd.onload = e => {
                    const i = new Image(); i.src = e.target.result;
                    i.onload = () => {
                        const c = document.createElement('canvas'); const M = 800; let w=i.width, h=i.height;
                        if(w>h) { if(w>M){ h*=M/w; w=M; } } else { if(h>M){ w*=M/h; h=M; } }
                        c.width=w; c.height=h; c.getContext('2d').drawImage(i,0,0,w,h); r(c.toDataURL('image/jpeg', 0.8));
                    };
                };
            });
        }

        async function loadChats() {
            const d = await api('/chats'); const dot = document.getElementById('dot');
            if(d.unreadCount > 0) { dot.innerText = d.unreadCount; dot.classList.remove('hidden'); } else dot.classList.add('hidden');
            document.getElementById('chats-list').innerHTML = d.users.map(u => `<div class="list-item glass-panel" onclick="startChat('${u.username}')"><img src="${fixUrl(u.avatarUrl)}" class="p-ava-s"><div style="font-size:16px;"><b>${u.username}</b></div></div>`).join('');
        }

        function startChat(n) { curP=n; document.getElementById('chats-list').classList.add('hidden'); document.getElementById('chat-active').classList.remove('hidden'); document.getElementById('chat-name').innerText=n; loadMsgs(); if(chatL) clearInterval(chatL); chatL=setInterval(loadMsgs, 4000); }
        function backToChats() { clearInterval(chatL); document.getElementById('chat-active').classList.add('hidden'); document.getElementById('chats-list').classList.remove('hidden'); }
        async function doFollow(n) { await api('/users/follow/'+n, {method:'POST'}); openProfile(n); }
        async function deletePost(id) { if(confirm('Точно удалить этот шедевр?')) { await api(`/posts/${id}`, {method:'DELETE'}); openProfile(me); } }
        
        function toggleEdit(v) { 
            document.getElementById('prof-ui').classList.toggle('hidden',v); 
            document.getElementById('prof-create-post').classList.toggle('hidden',v); 
            document.getElementById('prof-posts').classList.toggle('hidden',v); 
            document.getElementById('prof-edit').classList.toggle('hidden',!v); 
        }
        
        function zoom(u) { document.getElementById('modal-img').src=u; document.getElementById('modal-zoom').classList.add('show'); }
        function closeZoom() { document.getElementById('modal-zoom').classList.remove('show'); }
        
        async function doSearch(q) { 
            if(!q) return; 
            const uu = await api('/users/search?q='+q); 
            document.getElementById('search-list').innerHTML = uu.map(u => `<div class="list-item glass-panel" onclick="openProfile('${u.username}')"><img src="${fixUrl(u.avatarUrl)}" class="p-ava-s"><b style="font-size:16px;">${u.username}</b></div>`).join(''); 
        }
        
        async function saveProfile() {
            const dn = document.getElementById('edit-name').value;
            const f = document.getElementById('edit-ava').files[0];
            let ava = ""; if(f) ava = await compressImage(f);
            const body = {}; if(dn) body.displayName = dn; if(ava) body.avatarUrl = ava;
            await api('/users/update', { method:'POST', body:JSON.stringify(body) });
            toggleEdit(false); openProfile(me);
        }

        // Запуск
        setTheme(localStorage.getItem('theme') || 'light');
        setColor(localStorage.getItem('color') || '#8a2be2');

        if(token) { 
            document.getElementById('view-auth').classList.add('hidden'); 
            document.getElementById('view-app').classList.remove('hidden'); 
            loadFeed(); setInterval(loadChats, 15000); 
        }
    </script>
</body>
</html>
