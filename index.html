<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        :root { 
            --primary: #8a2be2; 
            --bg: #f4f5f7; 
            --surface: rgba(255, 255, 255, 0.6); 
            --text: #1a1a1a; 
            --text-mut: #666; 
            --border: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-blur: blur(20px);
            --del-btn: #000;
            --del-txt: #fff;
            --radius: 24px;
            --anim: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #0a0a0c;
            --surface: rgba(28, 28, 30, 0.6);
            --text: #ffffff;
            --text-mut: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(0, 0, 0, 0.5);
            --del-btn: #fff;
            --del-txt: #000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: background var(--anim); }
        
        .glass { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border); }
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 100px; }

        /* ИСТОРИИ */
        .stories-row { display: flex; gap: 15px; padding: 20px; overflow-x: auto; scrollbar-width: none; }
        .stories-row::-webkit-scrollbar { display: none; }
        .story-circle { flex-shrink: 0; width: 75px; text-align: center; cursor: pointer; }
        .story-avatar-wrap { width: 66px; height: 66px; border-radius: 50%; padding: 3px; border: 2px solid var(--primary); margin: 0 auto 5px; transition: border-color 0.3s; }
        .story-avatar-wrap.viewed { border-color: #8e8e93 !important; }
        .story-avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* КНОПКА УДАЛИТЬ (ЧЕРНО-БЕЛАЯ) */
        .btn-del { background: var(--del-btn); color: var(--del-txt); border: none; padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

        /* ПОИСК В ЧАТАХ */
        .search-bar { margin: 15px; border-radius: 15px; padding: 12px 20px; display: flex; align-items: center; }
        .search-bar input { background: none; border: none; color: var(--text); width: 100%; outline: none; font-size: 15px; }

        /* ОСТАЛЬНЫЕ СТИЛИ */
        input, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 10px; outline: none; }
        .btn { background: var(--primary); color: #fff; padding: 15px; border: none; border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.96); }
        
        .post { margin: 15px; border-radius: var(--radius); overflow: hidden; }
        .post-h { padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .ava-mini { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid transparent; }
        .ava-mini.has-story { border-color: var(--primary); }
        .post-img { width: 100%; max-height: 550px; object-fit: cover; }
        
        .prof-top { padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; margin-bottom: 15px; }
        .p-ava-l { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); padding: 3px; margin-bottom: 15px; }
        .p-bio { font-size: 14px; color: var(--text-mut); margin: 10px 0; line-height: 1.4; max-width: 80%; margin-inline: auto; }

        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; height: 70px; border-radius: 35px; display: flex; align-items: center; justify-content: space-around; z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-mut); cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); transform: translateY(-3px); }

        #story-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .story-progress { display: flex; gap: 4px; padding: 10px; }
        .p-bar { height: 3px; background: rgba(255,255,255,0.3); flex: 1; border-radius: 2px; overflow: hidden; }
        .p-fill { height: 100%; background: #fff; width: 0%; }
    </style>
</head>
<body>

    <div id="view-auth">
        <div class="container" style="padding-top: 100px; px: 30px;">
            <div class="glass" style="padding: 40px 20px; border-radius: 30px; text-align: center;">
                <h1 style="font-size: 36px; color: var(--primary); margin-bottom: 30px;">KASTA</h1>
                <input id="auth-u" placeholder="Логин">
                <input id="auth-p" type="password" placeholder="Пароль">
                <button class="btn" style="width: 100%; margin-top: 10px;" onclick="handleAuth('login')">Войти</button>
                <button class="btn" style="width: 100%; margin-top: 10px; background: none; color: var(--text);" onclick="handleAuth('register')">Регистрация</button>
            </div>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="container">
            
            <div id="sec-feed">
                <div class="stories-row" id="stories-list"></div>
                <div id="feed-list"></div>
            </div>

            <div id="sec-chats" class="hidden">
                <div class="search-bar glass">
                    <input id="chat-search" oninput="doSearchChats(this.value)" placeholder="Поиск людей...">
                </div>
                <div id="chats-list"></div>
                <div id="chat-active" class="hidden">
                    <div class="glass" style="padding: 15px; display: flex; align-items: center; gap: 10px;">
                        <button onclick="backToChats()" style="background:none; border:none; color:var(--text); font-size: 20px;">←</button>
                        <img id="chat-ava" class="ava-mini">
                        <b id="chat-name">Чат</b>
                    </div>
                    <div id="msg-box" style="height: 60vh; overflow-y: auto; padding: 15px;"></div>
                    <div class="glass" style="padding: 15px; display: flex; gap: 10px;">
                        <input id="m-in" placeholder="Сообщение..." style="margin:0;">
                        <button class="btn" onclick="sendMsg()">➤</button>
                    </div>
                </div>
            </div>

            <div id="sec-profile" class="hidden">
                <div id="prof-ui" class="prof-top glass"></div>
                
                <div id="prof-create-post" class="glass" style="margin: 15px; padding: 20px; border-radius: 20px;">
                    <textarea id="p-txt" placeholder="Что нового?" rows="2"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="cursor: pointer; color: var(--primary); font-weight: bold;">
                            📷 Фото <input type="file" id="p-img" accept="image/*" style="display:none;">
                        </label>
                        <button class="btn" onclick="doPost()" style="padding: 10px 20px;">Пост</button>
                    </div>
                </div>

                <div class="glass" style="margin: 0 15px 15px; padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: 600;">Добавить в историю</span>
                    <label class="btn" style="padding: 8px 15px; font-size: 13px;">
                        Загрузить + <input type="file" id="st-img" accept="image/*" style="display:none;" onchange="uploadStory(this)">
                    </label>
                </div>

                <div id="prof-posts" class="grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
            </div>

            <div id="sec-settings" class="hidden">
                <div class="glass" style="margin: 15px; padding: 25px; border-radius: 25px;">
                    <h3>Настройки профиля</h3>
                    <input id="edit-name" placeholder="Отображаемое имя" style="margin-top: 15px;">
                    <textarea id="edit-bio" placeholder="О себе (биография)"></textarea>
                    <button class="btn" style="width: 100%;" onclick="saveProfile()">Сохранить</button>
                    
                    <h3 style="margin-top: 30px;">Оформление</h3>
                    <div style="display: flex; gap: 10px; margin: 15px 0;">
                        <button class="btn" style="flex:1; background:#fff; color:#000;" onclick="setTheme('light')">Светлая</button>
                        <button class="btn" style="flex:1; background:#000; color:#fff;" onclick="setTheme('dark')">Темная</button>
                    </div>
                    <button class="btn" style="width:100%; background: #ff3b30;" onclick="logout()">Выход</button>
                </div>
            </div>
        </div>

        <nav class="nav glass">
            <button class="nav-btn active" onclick="nav('feed', this)">🏠</button>
            <button class="nav-btn" onclick="nav('chats', this)">💬</button>
            <button class="nav-btn" onclick="openProfile(me, this)">👤</button>
            <button class="nav-btn" onclick="nav('settings', this)">⚙️</button>
        </nav>
    </div>

    <div id="story-viewer" onclick="closeStory()">
        <div class="story-progress" id="st-progress"></div>
        <div id="st-content" style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative;">
            <img id="st-img-view" style="max-width: 100%; max-height: 80vh;">
            <div id="st-author" style="position: absolute; top: 30px; left: 20px; display: flex; align-items: center; gap: 10px; color: #fff;">
                <img id="st-author-ava" style="width: 40px; height: 40px; border-radius: 50%;">
                <b id="st-author-name"></b>
            </div>
        </div>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        let token = localStorage.getItem('token'), me = localStorage.getItem('currentUser'), stories = [];

        function fixUrl(url) { return url ? url.replace('http://localhost:3000', API) : 'https://via.placeholder.com/150'; }

        async function api(path, opt={}) {
            const h = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            opt.headers = { ...h, ...opt.headers };
            const r = await fetch(API+path, opt);
            if(r.status === 401) logout();
            return r.json();
        }

        async function handleAuth(t) {
            const u = document.getElementById('auth-u').value, p = document.getElementById('auth-p').value;
            const res = await fetch(`${API}/${t}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
            const d = await res.json();
            if(res.ok) { localStorage.setItem('token', d.token); localStorage.setItem('currentUser', d.username); location.reload(); }
            else alert(d.message);
        }

        function logout() { localStorage.clear(); location.reload(); }

        function nav(s, btn) {
            document.querySelectorAll('[id^="sec-"]').forEach(x => x.classList.add('hidden'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            if(s==='feed') { loadFeed(); loadStories(); }
            if(s==='chats') loadChats();
        }

        // ИСТОРИИ
        async function loadStories() {
            // Имитация получения историй (на бэкенде должен быть эндпоинт /stories)
            // Для теста создадим структуру
            const list = document.getElementById('stories-list');
            list.innerHTML = `<div class="story-circle" onclick="document.getElementById('st-img').click()">
                <div class="story-avatar-wrap" style="border-style: dashed; border-color: var(--text-mut);">
                    <div style="font-size: 30px; margin-top: 10px;">+</div>
                </div>
                <span class="story-name">Ваша</span>
            </div>`;
            
            // Здесь будет fetch('/stories')
            const data = await api('/stories').catch(() => []);
            data.forEach(s => {
                const viewed = localStorage.getItem('viewed_'+s._id);
                list.innerHTML += `
                <div class="story-circle" onclick="viewStory('${s._id}')">
                    <div class="story-avatar-wrap ${viewed?'viewed':''}" style="border-color: ${s.color || 'var(--primary)'}">
                        <img src="${fixUrl(s.userAva)}">
                    </div>
                    <span class="story-name">${s.username}</span>
                </div>`;
            });
            stories = data;
        }

        let stInterval;
        function viewStory(id) {
            const s = stories.find(x => x._id === id);
            if(!s) return;
            const v = document.getElementById('story-viewer');
            v.style.display = 'flex';
            document.getElementById('st-img-view').src = fixUrl(s.image);
            document.getElementById('st-author-ava').src = fixUrl(s.userAva);
            document.getElementById('st-author-name').innerText = s.username;
            
            localStorage.setItem('viewed_'+id, true);
            
            const prog = document.getElementById('st-progress');
            prog.innerHTML = '<div class="p-bar"><div class="p-fill" id="f-0"></div></div>';
            let w = 0;
            clearInterval(stInterval);
            stInterval = setInterval(() => {
                w += 1;
                document.getElementById('f-0').style.width = w + '%';
                if(w >= 100) closeStory();
            }, 50); // 5 секунд на историю
        }

        function closeStory() {
            document.getElementById('story-viewer').style.display = 'none';
            clearInterval(stInterval);
            loadStories();
        }

        async function uploadStory(el) {
            const f = el.files[0]; if(!f) return;
            const img = await compressImage(f);
            await api('/stories', { method:'POST', body: JSON.stringify({ image: img, color: localStorage.getItem('color') }) });
            loadStories();
        }

        // ПОСТЫ И ПРОФИЛЬ
        async function loadFeed() {
            const pp = await api('/posts');
            const list = document.getElementById('feed-list');
            list.innerHTML = pp.map(p => `
                <div class="post glass fade-in">
                    <div class="post-h">
                        <img src="${fixUrl(p.authorAvatar)}" class="ava-mini">
                        <b>${p.author}</b>
                        ${p.author === me ? `<button class="btn-del" style="margin-left:auto" onclick="deletePost('${p._id}')">Удалить</button>` : ''}
                    </div>
                    <img src="${fixUrl(p.imageUrl)}" class="post-img">
                    <div style="padding:15px;">
                        <p><b>${p.author}</b> ${p.text || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        async function openProfile(n) {
            nav('profile');
            const u = await api('/users/profile/'+n);
            document.getElementById('prof-ui').innerHTML = `
                <img src="${fixUrl(u.avatarUrl)}" class="p-ava-l">
                <h2>${u.displayName || u.username}</h2>
                <p class="p-bio">${u.bio || 'Нет описания'}</p>
                <div style="display:flex; justify-content:center; gap:20px; margin: 15px 0;">
                    <span><b>${u.posts.length}</b><br>посты</span>
                    <span><b>${u.subscribersCount}</b><br>друзья</span>
                </div>
            `;
            const grid = document.getElementById('prof-posts');
            grid.innerHTML = u.posts.map(p => `<img src="${fixUrl(p.imageUrl)}" style="width:100%; aspect-ratio:1; object-fit:cover;">`).join('');
        }

        async function saveProfile() {
            const name = document.getElementById('edit-name').value;
            const bio = document.getElementById('edit-bio').value;
            await api('/users/update', { method:'POST', body: JSON.stringify({ displayName: name, bio: bio }) });
            alert("Сохранено!");
        }

        async function loadChats() {
            const d = await api('/chats');
            document.getElementById('chats-list').innerHTML = d.users.map(u => `
                <div class="glass" style="margin:10px 15px; padding:15px; border-radius:20px; display:flex; align-items:center; gap:12px;" onclick="startChat('${u.username}', '${fixUrl(u.avatarUrl)}')">
                    <img src="${fixUrl(u.avatarUrl)}" class="ava-mini ${u.hasStory?'has-story':''}">
                    <b>${u.username}</b>
                </div>
            `).join('');
        }

        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            localStorage.setItem('theme', m);
        }

        function compressImage(file) {
            return new Promise(r => {
                const rd = new FileReader(); rd.readAsDataURL(file);
                rd.onload = e => {
                    const i = new Image(); i.src = e.target.result;
                    i.onload = () => {
                        const c = document.createElement('canvas');
                        c.width = 600; c.height = (i.height/i.width)*600;
                        c.getContext('2d').drawImage(i,0,0,600,c.height);
                        r(c.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        async function doPost() {
            const t = document.getElementById('p-txt').value;
            const f = document.getElementById('p-img').files[0];
            let img = f ? await compressImage(f) : "";
            await api('/posts', { method:'POST', body: JSON.stringify({ text: t, imageUrl: img }) });
            location.reload();
        }

        if(token) { 
            document.getElementById('view-auth').classList.add('hidden'); 
            document.getElementById('view-app').classList.remove('hidden'); 
            nav('feed'); 
        }
    </script>
</body>
</html>
