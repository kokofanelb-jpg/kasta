<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        /* === ТЕМЫ И ПЕРЕМЕННЫЕ === */
        :root { 
            --primary: #8a2be2; 
            --bg: #f4f5f7; 
            --surface: #ffffff; 
            --text: #1a1a1a; 
            --text-mut: #8e8e8e; 
            --border: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
            --radius: 20px;
            --anim: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg: #0f0f11;
            --surface: #1c1c1e;
            --text: #f0f0f0;
            --text-mut: #7a7a7a;
            --border: #2c2c2e;
            --glass: rgba(28, 28, 30, 0.85);
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); transition: background var(--anim), color var(--anim); overflow-x: hidden; }
        
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 90px; }

        /* === ТИПОГРАФИКА И ИНПУТЫ === */
        input, textarea { width: 100%; padding: 14px 18px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; font-size: 15px; background: var(--surface); color: var(--text); transition: border var(--anim); outline: none; }
        input:focus, textarea:focus { border-color: var(--primary); }
        
        /* === КНОПКИ === */
        .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 14px; font-weight: 600; cursor: pointer; font-size: 15px; transition: transform 0.2s, opacity var(--anim); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gray { background: var(--border); color: var(--text); }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-icon { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* === АВТОРИЗАЦИЯ (Окна входа) === */
        #view-auth { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
        .auth-card { background: var(--surface); padding: 40px 30px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }

        /* === ПОСТЫ === */
        .post { background: var(--surface); margin: 15px; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .p-ava-s { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .post-img { width: 100%; display: block; max-height: 500px; object-fit: cover; }
        .post-actions { padding: 12px 15px; display: flex; align-items: center; gap: 15px; }
        .post-info { padding: 0 15px 12px; font-size: 14px; line-height: 1.5; }
        
        .comm-sec { padding: 12px 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.02); }
        .comm-item { margin-bottom: 6px; font-size: 13.5px; }

        /* === ПРОФИЛЬ === */
        .prof-top { padding: 30px 20px; background: var(--surface); display: flex; flex-direction: column; align-items: center; border-bottom-left-radius: var(--radius); border-bottom-right-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 15px; }
        .p-ava-l { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary); padding: 3px; }
        .p-stats { display: flex; width: 100%; justify-content: space-evenly; margin: 20px 0; }
        .p-stats div { text-align: center; }
        .p-stats b { display: block; font-size: 18px; }
        .p-stats span { font-size: 12px; color: var(--text-mut); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 0 15px; }
        .grid-item { aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* === ЧАТЫ === */
        .chat-list-item { padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--surface); margin: 10px 15px; border-radius: 16px; box-shadow: var(--shadow); cursor: pointer; }
        #msg-box { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .m { padding: 12px 16px; border-radius: 20px; max-width: 75%; font-size: 14.5px; position: relative; }
        .m-out { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .m-in { align-self: flex-start; background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
        .m-time { font-size: 10px; opacity: 0.7; display: block; margin-top: 5px; text-align: right; }

        /* === НАВИГАЦИЯ === */
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; height: 65px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 30px; display: flex; align-items: center; justify-content: space-around; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .nav-btn { background: none; border: none; color: var(--text-mut); cursor: pointer; transition: 0.3s; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }
        .nav-btn span { display: none; }
        .badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; border-radius: 10px; padding: 2px 6px; font-size: 10px; font-weight: bold; }

        /* === МОДАЛКА === */
        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center; visibility: hidden; opacity: 0; transition: 0.3s; }
        #modal.show { visibility: visible; opacity: 1; }
        #modal-img { max-width: 95%; max-height: 95%; border-radius: 10px; }

        .settings-block { background: var(--surface); margin: 15px; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .color-picker { display: flex; gap: 15px; margin-top: 15px; }
        .color-circle { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(0,0,0,0.1); }

        /* ПК-ВЕРСИЯ (Меню справа) */
        @media (min-width: 768px) {
            body { padding-right: 280px; display: flex; justify-content: center; }
            .container { margin: 0; padding-top: 20px; }
            .nav { bottom: 0; left: auto; right: 0; top: 0; transform: none; width: 280px; height: 100vh; border-radius: 0; border: none; border-left: 1px solid var(--border); flex-direction: column; justify-content: flex-start; padding: 40px 20px; background: var(--surface); }
            .nav-btn { width: 100%; flex-direction: row; justify-content: flex-start; padding: 15px; gap: 15px; border-radius: 12px; }
            .nav-btn.active { background: var(--primary); color: #fff; }
            .nav-btn span { display: block; font-size: 16px; font-weight: 600; }
        }
    </style>
</head>
<body>

    <div id="view-auth">
        <div class="auth-card">
            <h1 style="font-size: 40px; margin-bottom: 10px; color: var(--primary); letter-spacing: 2px;">KASTA</h1>
            <p style="color: var(--text-mut); margin-bottom: 30px;">Premium Social Network</p>
            <input id="auth-u" placeholder="Логин">
            <input id="auth-p" type="password" placeholder="Пароль">
            <button class="btn" style="width:100%; margin-top:10px;" onclick="handleAuth('login')">Войти</button>
            <button class="btn btn-gray" style="width:100%; margin-top:15px;" onclick="handleAuth('register')">Регистрация</button>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="container">
            
            <div id="sec-feed">
                <div class="settings-block">
                    <textarea id="p-txt" placeholder="Что нового?" rows="2" style="border:none; background:transparent; font-size:16px;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items:center; border-top: 1px solid var(--border); padding-top:10px;">
                        <label style="cursor:pointer; color:var(--primary); font-weight:600;">
                            📷 Фото <input type="file" id="p-img" accept="image/*" style="display:none;">
                        </label>
                        <button class="btn" id="btn-post" onclick="doPost()">Опубликовать</button>
                    </div>
                </div>
                <div id="feed-list"></div>
            </div>

            <div id="sec-search" class="hidden">
                <div class="settings-block"><input oninput="doSearch(this.value)" placeholder="Найти друзей..."></div>
                <div id="search-list"></div>
            </div>

            <div id="sec-chats" class="hidden">
                <div id="chats-list"></div>
                <div id="chat-active" class="hidden">
                    <div style="padding:15px; background:var(--glass); backdrop-filter:blur(10px); display:flex; gap:15px; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;">
                        <button class="btn-icon" onclick="backToChats()"><svg viewBox="0 0 24 24" stroke="currentColor" width="24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <b id="chat-name">Чат</b>
                    </div>
                    <div id="msg-box"></div>
                    <div style="padding:15px; display:flex; gap:10px; background:var(--surface); border-top:1px solid var(--border); position:sticky; bottom:0;">
                        <input id="m-in" placeholder="Сообщение..." style="margin:0; border-radius: 20px;">
                        <button class="btn" style="border-radius: 50%; width:50px;" onclick="sendMsg()">➤</button>
                    </div>
                </div>
            </div>

            <div id="sec-profile" class="hidden">
                <div id="prof-ui"></div>
                <div id="prof-edit" class="settings-block hidden">
                    <input id="edit-name" placeholder="Имя">
                    <input type="file" id="edit-ava" accept="image/*">
                    <button class="btn" onclick="saveProfile()" style="width:100%">Сохранить</button>
                    <button class="btn btn-gray" onclick="toggleEdit(false)" style="width:100%; margin-top:10px;">Отмена</button>
                </div>
                <div id="prof-posts" class="grid"></div>
                <div id="prof-feed" class="hidden">
                   <button class="btn btn-gray" onclick="closeProfFeed()" style="width:calc(100% - 30px); margin:15px;">← Назад</button>
                   <div id="prof-feed-list"></div>
                </div>
            </div>

            <div id="sec-settings" class="hidden">
                <div class="settings-block">
                    <h2>Темы и цвета</h2>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn btn-gray" style="flex:1" onclick="setTheme('light')">Светлая</button>
                        <button class="btn" style="flex:1; background:#1c1c1e;" onclick="setTheme('dark')">Темная</button>
                    </div>
                    <div class="color-picker">
                        <div class="color-circle" style="background:#8a2be2;" onclick="setColor('#8a2be2')"></div>
                        <div class="color-circle" style="background:#0095f6;" onclick="setColor('#0095f6')"></div>
                        <div class="color-circle" style="background:#ff2d55;" onclick="setColor('#ff2d55')"></div>
                        <div class="color-circle" style="background:#34c759;" onclick="setColor('#34c759')"></div>
                        <div class="color-circle" style="background:#ff9500;" onclick="setColor('#ff9500')"></div>
                    </div>
                    <button class="btn btn-gray" style="width:100%; margin-top:30px; color:red;" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>

        <nav class="nav">
            <button class="nav-btn active" onclick="nav('feed', this)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Лента</span></button>
            <button class="nav-btn" onclick="nav('search', this)"><svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><span>Поиск</span></button>
            <button class="nav-btn" onclick="nav('chats', this)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><div id="dot" class="badge hidden"></div><span>Чаты</span></button>
            <button class="nav-btn" onclick="openProfile(me, this)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Профиль</span></button>
            <button class="nav-btn" onclick="nav('settings', this)"><svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg><span>Опции</span></button>
        </nav>
    </div>

    <div id="modal" onclick="closeZoom()"><img id="modal-img"></div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        const DEF = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";
        let token = localStorage.getItem('token'), me = localStorage.getItem('currentUser'), curP, chatL, lastProfileData = null;

        function fixUrl(url) { if(!url) return DEF; return url.replace('http://localhost:3000', API).replace('http://', 'https://'); }

        async function api(path, opt={}) {
            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            opt.headers = { ...headers, ...opt.headers };
            const r = await fetch(API+path, opt);
            if(r.status === 401) logout();
            return r.json();
        }

        async function handleAuth(t) {
            const u = document.getElementById('auth-u').value.trim(), p = document.getElementById('auth-p').value.trim();
            if(!u || !p) return alert("Заполни поля");
            const res = await fetch(`${API}/${t}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
            const d = await res.json();
            if(res.ok) { localStorage.setItem('token', d.token); localStorage.setItem('currentUser', d.username); location.reload(); }
            else alert(d.message);
        }

        function logout() { localStorage.clear(); location.reload(); }

        function setTheme(m) { 
            if(m==='dark') document.body.setAttribute('data-theme', 'dark'); 
            else document.body.removeAttribute('data-theme');
            localStorage.setItem('theme', m);
        }
        function setColor(c) { 
            document.documentElement.style.setProperty('--primary', c); 
            localStorage.setItem('color', c);
        }

        function nav(s, btn) {
            document.querySelectorAll('[id^="sec-"]').forEach(x => x.classList.add('hidden'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            if(btn) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
            if(s==='feed') loadFeed();
            if(s==='chats') loadChats();
        }

        function renderPostList(pp, elId) {
            const list = document.getElementById(elId); list.innerHTML = '';
            pp.forEach(p => {
                const div = document.createElement('div'); div.className = 'post';
                div.innerHTML = `
                    <div class="post-h" onclick="openProfile('${p.author}')">
                        <img class="p-ava-s" src="${fixUrl(p.authorAvatar)}">
                        <b style="font-size:14px;">${p.author}</b>
                        ${p.author === me ? `<span style="margin-left:auto; color:red;" onclick="event.stopPropagation(); deletePost('${p._id}')">✕</span>` : ''}
                    </div>
                    ${p.imageUrl ? `<img src="${fixUrl(p.imageUrl)}" class="post-img" onclick="zoom('${fixUrl(p.imageUrl)}')">` : ''}
                    <div class="post-actions">
                        <button class="btn-icon" onclick="doLike('${p._id}', '${elId}')">
                            <svg viewBox="0 0 24 24" stroke="${p.likes?.includes(me) ? 'var(--primary)' : 'currentColor'}" fill="${p.likes?.includes(me) ? 'var(--primary)' : 'none'}" width="24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        </button>
                        <b>${p.likes?.length || 0} лайков</b>
                    </div>
                    ${p.text ? `<div class="post-info"><b>${p.author}</b> ${p.text}</div>` : ''}
                    <div class="comm-sec">
                        <div id="cl-${p._id}">${(p.comments || []).map(c => `<div class="comm-item"><b>${c.author}</b> ${c.text}</div>`).join('')}</div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input id="ci-${p._id}" placeholder="Коммент..." style="margin:0; border:none; padding:5px; font-size:13px; background:transparent;">
                            <button style="color:var(--primary); border:none; background:none; font-weight:bold;" onclick="addComment('${p._id}', '${elId}')">ОК</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function loadFeed() { const pp = await api('/posts'); renderPostList(pp, 'feed-list'); }

        async function openProfile(n, btn) {
            nav('profile', btn || document.querySelectorAll('.nav-btn')[3]); closeProfFeed();
            const u = await api('/users/profile/'+n); lastProfileData = u;
            const isMe = u.username === me, isSub = u.subscribers?.includes(me);
            document.getElementById('prof-ui').innerHTML = `
                <div class="prof-top">
                    <img src="${fixUrl(u.avatarUrl)}" class="p-ava-l">
                    <h2>${u.displayName || u.username}</h2>
                    <div class="p-stats">
                        <div><b>${u.posts.filter(p=>p.imageUrl).length}</b><span>посты</span></div>
                        <div><b>${u.subscribersCount}</b><span>подписчики</span></div>
                        <div><b>${u.subscriptionsCount}</b><span>подписки</span></div>
                    </div>
                    ${isMe ? `<button class="btn btn-gray" style="width:100%" onclick="toggleEdit(true)">Настройки</button>` : `<button class="btn" style="width:100%" onclick="doFollow('${u.username}')">${isSub?'Отписаться':'Подписаться'}</button>`}
                </div>
            `;
            const grid = document.getElementById('prof-posts'); grid.innerHTML = '';
            u.posts.filter(p => p.imageUrl).forEach(p => {
                const d = document.createElement('div'); d.className = 'grid-item'; d.innerHTML = `<img src="${fixUrl(p.imageUrl)}">`;
                d.onclick = () => openProfFeed(); grid.appendChild(d);
            });
        }

        function openProfFeed() { document.getElementById('prof-posts').classList.add('hidden'); document.getElementById('prof-feed').classList.remove('hidden'); renderPostList(lastProfileData.posts.filter(p=>p.imageUrl), 'prof-feed-list'); }
        function closeProfFeed() { document.getElementById('prof-posts').classList.remove('hidden'); document.getElementById('prof-feed').classList.add('hidden'); }

        async function doLike(id, lid) { await api(`/posts/${id}/like`, {method:'POST'}); if(lid==='feed-list') loadFeed(); else { const u=await api('/users/profile/'+lastProfileData.username); lastProfileData=u; openProfFeed(); } }
        async function addComment(id, lid) { 
            const i = document.getElementById('ci-'+id); if(!i.value.trim()) return;
            await api(`/posts/${id}/comment`, {method:'POST', body:JSON.stringify({text:i.value})});
            i.value=""; if(lid==='feed-list') loadFeed(); else { const u=await api('/users/profile/'+lastProfileData.username); lastProfileData=u; openProfFeed(); }
        }

        async function loadMsgs() {
            const m = await api('/messages/'+curP);
            document.getElementById('msg-box').innerHTML = m.map(msg => `<div class="m ${msg.sender === me ? 'm-out' : 'm-in'}">${msg.text}<span class="m-time">${new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>`).join('');
            const b = document.getElementById('msg-box'); b.scrollTop = b.scrollHeight;
        }

        async function sendMsg() {
            const i = document.getElementById('m-in'); if(!i.value.trim()) return;
            await api('/messages', { method:'POST', body:JSON.stringify({receiver:curP, text: i.value}) });
            i.value = ""; loadMsgs();
        }

        async function doPost() {
            const b=document.getElementById('btn-post'), t=document.getElementById('p-txt').value, f=document.getElementById('p-img').files[0];
            if(!t && !f) return; b.disabled=true;
            let img = ""; if(f) img = await compressImage(f);
            await api('/posts', { method:'POST', body:JSON.stringify({text:t, imageUrl:img}) });
            document.getElementById('p-txt').value=""; document.getElementById('p-img').value=""; b.disabled=false; loadFeed();
        }

        function compressImage(file) {
            return new Promise(r => {
                const rd = new FileReader(); rd.readAsDataURL(file);
                rd.onload = e => {
                    const i = new Image(); i.src = e.target.result;
                    i.onload = () => {
                        const c = document.createElement('canvas'); const M = 800; let w=i.width, h=i.height;
                        if(w>h) { if(w>M){ h*=M/w; w=M; } } else { if(h>M){ w*=M/h; h=M; } }
                        c.width=w; c.height=h; c.getContext('2d').drawImage(i,0,0,w,h); r(c.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        async function loadChats() {
            const d = await api('/chats'); const dot = document.getElementById('dot');
            if(d.unreadCount > 0) { dot.innerText = d.unreadCount; dot.classList.remove('hidden'); } else dot.classList.add('hidden');
            document.getElementById('chats-list').innerHTML = d.users.map(u => `<div class="chat-list-item" onclick="startChat('${u.username}')"><img src="${fixUrl(u.avatarUrl)}" class="p-ava-s"><div><b>${u.username}</b></div></div>`).join('');
        }

        function startChat(n) { curP=n; document.getElementById('chats-list').classList.add('hidden'); document.getElementById('chat-active').classList.remove('hidden'); document.getElementById('chat-name').innerText=n; loadMsgs(); if(chatL) clearInterval(chatL); chatL=setInterval(loadMsgs, 4000); }
        function backToChats() { clearInterval(chatL); document.getElementById('chat-active').classList.add('hidden'); document.getElementById('chats-list').classList.remove('hidden'); }
        async function doFollow(n) { await api('/users/follow/'+n, {method:'POST'}); openProfile(n); }
        async function deletePost(id) { if(confirm('Удалить?')) { await api(`/posts/${id}`, {method:'DELETE'}); loadFeed(); openProfile(me); } }
        function toggleEdit(v) { document.getElementById('prof-ui').classList.toggle('hidden',v); document.getElementById('prof-edit').classList.toggle('hidden',!v); }
        function zoom(u) { document.getElementById('modal-img').src=u; document.getElementById('modal').classList.add('show'); }
        function closeZoom() { document.getElementById('modal').classList.remove('show'); }
        async function doSearch(q) { if(!q) return; const uu = await api('/users/search?q='+q); document.getElementById('search-list').innerHTML = uu.map(u => `<div class="chat-list-item" onclick="openProfile('${u.username}')"><img src="${fixUrl(u.avatarUrl)}" class="p-ava-s"><b>${u.username}</b></div>`).join(''); }
        
        async function saveProfile() {
            const dn = document.getElementById('edit-name').value;
            const f = document.getElementById('edit-ava').files[0];
            let ava = ""; if(f) ava = await compressImage(f);
            await api('/users/update', { method:'POST', body:JSON.stringify({displayName:dn, avatarUrl:ava}) });
            toggleEdit(false); openProfile(me);
        }

        // Запуск
        setTheme(localStorage.getItem('theme') || 'light');
        setColor(localStorage.getItem('color') || '#8a2be2');

        if(token) { 
            document.getElementById('view-auth').classList.add('hidden'); 
            document.getElementById('view-app').classList.remove('hidden'); 
            loadFeed(); setInterval(loadChats, 15000); 
        }
    </script>
</body>
</html>
