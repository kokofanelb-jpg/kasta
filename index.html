<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0088cc; --bg: #f0f2f5; --white: #ffffff; --border: #dddfe2; --text: #1c1e21; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { cursor: pointer; font-size: 24px; padding: 10px; transition: 0.2s; }
        .nav-item:active { transform: scale(0.9); }

        .container { max-width: 550px; margin: 0 auto; padding: 15px 15px 80px 15px; }
        
        .post { background: #fff; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .post-ava { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #eee; border: 1px solid #eee; }
        .post-img { width: 100%; display: block; background: #f0f0f0; max-height: 450px; object-fit: cover; }
        .post-content { padding: 12px; font-size: 15px; line-height: 1.4; }
        .del-btn { margin-left: auto; color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 18px; padding: 5px; }

        .profile-info { background: #fff; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .big-ava { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 10px; }
        
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn-sec { background: #e4e6eb; color: #050505; }
        
        input, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; box-sizing: border-box; font-size: 16px; outline: none; }
        
        #msg-history { height: 60vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; border-radius: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-out { align-self: flex-end; background: #dcf8c6; }
        .msg-in { align-self: flex-start; background: #fff; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1 style="text-align:center; color: var(--accent); font-size: 40px; margin-bottom: 10px;">Kasta</h1>
        <p style="text-align:center; color: gray; margin-bottom: 30px;">Твоя новая соцсеть</p>
        <div style="background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border);">
            <input id="u-name" placeholder="Логин (без @)">
            <input id="u-pass" type="password" placeholder="Пароль">
            <button class="btn" onclick="auth('login')">Войти</button>
            <button class="btn btn-sec" onclick="auth('register')">Создать аккаунт</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="container">
            <div id="page-feed">
                <div style="background:#fff; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">
                    <textarea id="p-txt" placeholder="Что у вас нового?" rows="2"></textarea>
                    <p style="font-size: 12px; color: gray; margin: 5px 0;">Добавить фото:</p>
                    <input type="file" id="p-img" accept="image/*">
                    <button class="btn" onclick="createPost()">Опубликовать</button>
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="page-search" class="hidden">
                <input oninput="doSearch(this.value)" placeholder="Найти друзей по логину...">
                <div id="search-results"></div>
            </div>

            <div id="page-chats" class="hidden">
                <div id="chat-list"><h3 style="text-align:center; color:gray; margin-top:50px;">Переписки появятся здесь</h3></div>
                <div id="active-chat" class="hidden">
                    <button class="btn btn-sec" onclick="backToChats()">← К списку чатов</button>
                    <h4 id="chat-with-name" style="text-align:center; margin: 10px 0;"></h4>
                    <div id="msg-history"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input id="m-input" placeholder="Напишите сообщение...">
                        <button class="btn" style="width:70px; margin:0;" onclick="sendMsg()">></button>
                    </div>
                </div>
            </div>

            <div id="page-profile" class="hidden">
                <div class="profile-info">
                    <img id="view-ava" class="big-ava" src="https://via.placeholder.com/110">
                    <h2 id="view-name" style="margin:5px 0">...</h2>
                    <p id="view-handle" style="color:gray; margin:0">@username</p>
                    <p id="view-stats" style="font-weight:bold; margin:15px 0">0 подписчиков</p>
                    <div id="profile-btns"></div>
                </div>
                <h3 style="margin: 20px 0 10px 0;">Публикации</h3>
                <div id="profile-posts"></div>
            </div>

            <div id="page-settings" class="hidden">
                <h3>Настройки профиля</h3>
                <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
                    <label>Отображаемое имя:</label>
                    <input id="new-display-name" placeholder="Введите имя">
                    <label>Изменить аватарку:</label>
                    <input type="file" id="new-ava-file" accept="image/*">
                    <button class="btn" onclick="updateProfile()">Сохранить</button>
                    <button class="btn btn-sec" onclick="logout()" style="color:red; margin-top:30px;">Выйти из системы</button>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="nav('feed')">🏠</div>
            <div class="nav-item" onclick="nav('search')">🔍</div>
            <div class="nav-item" onclick="nav('chats')">💬</div>
            <div class="nav-item" onclick="openUser(localStorage.getItem('currentUser'))">👤</div>
            <div class="nav-item" onclick="nav('settings')">⚙️</div>
        </nav>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        let token = localStorage.getItem('token');
        let me = localStorage.getItem('currentUser');
        let currentChat = null;
        let chatTimer = null;

        async function auth(type) {
            const username = document.getElementById('u-name').value.trim();
            const password = document.getElementById('u-pass').value.trim();
            if(!username || !password) return alert("Заполните все поля");
            try {
                const res = await fetch(`${API}/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const d = await res.json();
                if(res.ok && d.token) {
                    localStorage.setItem('token', d.token);
                    localStorage.setItem('currentUser', username);
                    location.reload();
                } else alert(d.message || "Ошибка!");
            } catch(e) { alert("Сервер еще не проснулся, попробуй через 15 секунд"); }
        }

        function nav(page) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            const target = document.getElementById('page-' + page);
            if(target) target.classList.remove('hidden');
            if(page === 'feed') loadFeed();
            if(page !== 'chats') backToChats();
        }

        const toB64 = file => new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });

        async function createPost() {
            const txt = document.getElementById('p-txt').value;
            const file = document.getElementById('p-img').files[0];
            if(!txt && !file) return;
            let img = file ? await toB64(file) : "";
            await fetch(`${API}/posts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({text: txt, imageUrl: img})
            });
            document.getElementById('p-txt').value = "";
            document.getElementById('p-img').value = "";
            loadFeed();
        }

        async function loadFeed() {
            const res = await fetch(`${API}/posts`);
            const posts = await res.json();
            document.getElementById('feed-container').innerHTML = posts.map(p => renderPost(p)).join('');
        }

        function renderPost(p) {
            return `
                <div class="post">
                    <div class="post-header">
                        <img class="post-ava" src="${p.authorAvatar || 'https://via.placeholder.com/38'}">
                        <span style="cursor:pointer" onclick="openUser('${p.author}')">@${p.author}</span>
                        ${p.author === me ? `<button class="del-btn" onclick="delPost('${p._id}')">🗑️</button>` : ''}
                    </div>
                    ${p.imageUrl ? `<img class="post-img" src="${p.imageUrl}">` : ''}
                    <div class="post-content">${p.text}</div>
                </div>`;
        }

        async function delPost(id) {
            if(!confirm("Удалить?")) return;
            await fetch(`${API}/posts/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            loadFeed();
            if(!document.getElementById('page-profile').classList.contains('hidden')) openUser(me);
        }

        async function openUser(user) {
            if(!user || user === "null") return;
            nav('profile');
            try {
                const res = await fetch(`${API}/users/profile/${user}`);
                if(!res.ok) return;
                const d = await res.json();
                document.getElementById('view-ava').src = d.avatarUrl || 'https://via.placeholder.com/110';
                document.getElementById('view-name').innerText = d.displayName || d.username;
                document.getElementById('view-handle').innerText = '@' + d.username;
                document.getElementById('view-stats').innerText = `${d.subscribersCount} подписчиков`;
                let btns = document.getElementById('profile-btns');
                if(user === me) {
                    btns.innerHTML = `<button class="btn btn-sec" onclick="nav('settings')">⚙️ Настройки</button>`;
                } else {
                    const isSub = d.subscribers && d.subscribers.includes(me);
                    btns.innerHTML = `
                        <button class="btn" onclick="follow('${user}')">${isSub ? 'Отписаться' : 'Подписаться'}</button>
                        <button class="btn btn-sec" onclick="startChat('${user}')">💬 Сообщение</button>
                    `;
                }
                document.getElementById('profile-posts').innerHTML = d.posts.map(p => renderPost(p)).join('');
            } catch(e) { console.error(e); }
        }

        async function follow(user) {
            await fetch(`${API}/users/follow/${user}`, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${token}`}
            });
            openUser(user);
        }

        async function updateProfile() {
            const name = document.getElementById('new-display-name').value;
            const file = document.getElementById('new-ava-file').files[0];
            let ava = file ? await toB64(file) : undefined;
            await fetch(`${API}/users/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({displayName: name, avatarUrl: ava})
            });
            alert("Готово!");
            location.reload();
        }

        async function doSearch(q) {
            if(!q) { document.getElementById('search-results').innerHTML = ""; return; }
            const res = await fetch(`${API}/users/search?q=${q}`);
            const users = await res.json();
            document.getElementById('search-results').innerHTML = users.map(u => `
                <div onclick="openUser('${u.username}')" style="display:flex; align-items:center; gap:10px; background:#fff; padding:10px; margin-top:5px; border-radius:10px; border:1px solid #ddd; cursor:pointer;">
                    <img src="${u.avatarUrl || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <b>${u.displayName || u.username} (@${u.username})</b>
                </div>
            `).join('');
        }

        function startChat(user) {
            currentChat = user;
            nav('chats');
            document.getElementById('chat-list').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('chat-with-name').innerText = "Чат с @" + user;
            loadMsgs();
            if(chatTimer) clearInterval(chatTimer);
            chatTimer = setInterval(loadMsgs, 3000);
        }

        function backToChats() {
            currentChat = null;
            if(chatTimer) clearInterval(chatTimer);
            document.getElementById('active-chat').classList.add('hidden');
            document.getElementById('chat-list').classList.remove('hidden');
        }

        async function loadMsgs() {
            if(!currentChat) return;
            const res = await fetch(`${API}/messages/${currentChat}`, {headers: {'Authorization': `Bearer ${token}`}});
            const msgs = await res.json();
            document.getElementById('msg-history').innerHTML = msgs.map(m => `
                <div class="msg ${m.sender === me ? 'msg-out' : 'msg-in'}">${m.text}</div>
            `).join('');
            const h = document.getElementById('msg-history');
            h.scrollTop = h.scrollHeight;
        }

        async function sendMsg() {
            const txt = document.getElementById('m-input').value;
            if(!txt) return;
            await fetch(`${API}/messages`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({receiver: currentChat, text: txt})
            });
            document.getElementById('m-input').value = "";
            loadMsgs();
        }

        function logout() { localStorage.clear(); location.reload(); }

        if(token && me) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadFeed();
        }
    </script>
</body>
</html>
