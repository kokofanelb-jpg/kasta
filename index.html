<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta Fixed V5</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        :root { --blue: #0088cc; --bg: #f0f2f5; --gray: #65676b; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding-bottom: 80px; }
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin: 5px 0; }
        .btn-gray { background: #e4e6eb; color: #000; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 12px; font-size: 16px; margin-bottom: 10px; background: #fff; }
        
        .post { background: #fff; margin-bottom: 10px; border-bottom: 1px solid #ddd; }
        .post-h { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-ava { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #eee; }
        .post-img { width: 100%; display: block; max-height: 500px; object-fit: cover; }
        
        .prof-top { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
        .p-ava { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); }
        .p-stats { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .p-stats b { display: block; font-size: 18px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #fff; border-top: 2px solid #ddd; display: flex; z-index: 1000; }
        .nav-item { flex: 1; border: none; background: none; font-size: 28px; display: flex; align-items: center; justify-content: center; position: relative; }
        .badge { position: absolute; top: 15px; right: 25%; background: red; color: white; border-radius: 10px; padding: 2px 6px; font-size: 10px; }

        #msg-box { height: calc(100vh - 150px); overflow-y: auto; padding: 15px; background: #e5ddd5; display: flex; flex-direction: column; gap: 8px; }
        .m { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 15px; }
        .m-out { align-self: flex-end; background: #dcf8c6; }
        .m-in { align-self: flex-start; background: #fff; }
    </style>
</head>
<body>

    <div id="view-auth" class="container" style="padding: 40px 20px;">
        <h1 style="text-align:center; color: var(--blue); font-size: 40px; margin-bottom: 20px;">Kasta</h1>
        <input id="auth-u" placeholder="Логин">
        <input id="auth-p" type="password" placeholder="Пароль">
        <button class="btn" onclick="handleAuth('login')">Войти</button>
        <button class="btn btn-gray" onclick="handleAuth('register')">Создать аккаунт</button>
    </div>

    <div id="view-app" class="hidden">
        <div class="container">
            <div id="sec-feed">
                <div style="background:#fff; padding:15px; border-bottom:1px solid #ddd;">
                    <textarea id="p-txt" placeholder="Что нового?"></textarea>
                    <input type="file" id="p-img" accept="image/*">
                    <button class="btn" onclick="doPost()">Опубликовать</button>
                </div>
                <div id="feed-list"></div>
            </div>

            <div id="sec-search" class="hidden">
                <div style="padding:15px;"><input oninput="doSearch(this.value)" placeholder="Поиск людей..."></div>
                <div id="search-list"></div>
            </div>

            <div id="sec-chats" class="hidden">
                <div id="chats-list"></div>
                <div id="chat-active" class="hidden">
                    <div style="padding:10px; background:#fff; display:flex; gap:10px; align-items:center;">
                        <button onclick="backToChats()" style="font-size:24px; border:none; background:none;">←</button>
                        <b id="chat-name"></b>
                    </div>
                    <div id="msg-box"></div>
                    <div style="padding:10px; display:flex; gap:10px; background:#fff;">
                        <input id="m-in" placeholder="Сообщение..." style="margin:0;">
                        <button class="btn" style="width:60px; margin:0;" onclick="sendMsg()">➤</button>
                    </div>
                </div>
            </div>

            <div id="sec-profile" class="hidden">
                <div id="prof-ui"></div>
                <div id="prof-edit" class="hidden" style="padding:20px; background:#fff;">
                    <h3>Настройки профиля</h3>
                    <input id="edit-name" placeholder="Новое имя">
                    <p>Сменить фото:</p>
                    <input type="file" id="edit-ava" accept="image/*">
                    <button class="btn" onclick="saveProfile()">Сохранить</button>
                    <button class="btn btn-gray" onclick="toggleEdit(false)">Отмена</button>
                </div>
                <div id="prof-posts" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px;"></div>
            </div>
        </div>

        <nav class="nav">
            <button class="nav-item" onclick="nav('feed')">🏠</button>
            <button class="nav-item" onclick="nav('search')">🔍</button>
            <button class="nav-item" onclick="nav('chats')">💬<div id="dot" class="badge hidden">0</div></button>
            <button class="nav-item" onclick="openProfile(me)">👤</button>
        </nav>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        const DEF = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";
        let token = localStorage.getItem('token'), me = localStorage.getItem('currentUser'), chatL;

        async function api(path, opt = {}) {
            opt.headers = { ...opt.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(`${API}${path}`, opt);
            if (res.status === 401) { localStorage.clear(); location.reload(); }
            return res.json();
        }

        async function handleAuth(t) {
            const username = document.getElementById('auth-u').value.trim();
            const password = document.getElementById('auth-p').value.trim();
            const res = await fetch(`${API}/${t}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const d = await res.json();
            if(res.ok) { localStorage.setItem('token', d.token); localStorage.setItem('currentUser', d.username); location.reload(); }
            else alert(d.message);
        }

        function nav(s) {
            document.querySelectorAll('[id^="sec-"]').forEach(x => x.classList.add('hidden'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            if(s==='feed') loadFeed();
            if(s==='chats') loadChats();
        }

        async function loadFeed() {
            const posts = await api('/posts');
            document.getElementById('feed-list').innerHTML = posts.map(p => `
                <div class="post">
                    <div class="post-h" onclick="openProfile('${p.author}')">
                        <img class="post-ava" src="${p.authorAvatar || DEF}">
                        <b>${p.author}</b>
                    </div>
                    ${p.text ? `<div style="padding:10px;">${p.text}</div>` : ''}
                    ${p.imageUrl ? `<img src="${p.imageUrl}" class="post-img">` : ''}
                    <div style="padding:10px;"><button onclick="api('/posts/${p._id}/like', {method:'POST'}).then(loadFeed)" style="border:none; background:none;">❤️ ${p.likes.length}</button></div>
                </div>
            `).join('');
        }

        async function openProfile(name) {
            nav('profile');
            const u = await api('/users/profile/'+name);
            const isMe = u.username === me;
            document.getElementById('prof-ui').innerHTML = `
                <div class="prof-top">
                    <img src="${u.avatarUrl || DEF}" class="p-ava">
                    <h2>${u.displayName || u.username}</h2>
                    <p>@${u.username}</p>
                    <div class="p-stats">
                        <span><b>${u.postsCount}</b>Посты</span>
                        <span><b>${u.subscribersCount}</b>Подп-и</span>
                    </div>
                    ${isMe ? `<button class="btn btn-gray" onclick="toggleEdit(true)">Редактировать</button><button class="btn btn-gray" onclick="localStorage.clear();location.reload()" style="color:red">Выйти</button>` : ''}
                </div>
            `;
            document.getElementById('prof-posts').innerHTML = u.posts.map(p => p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">` : `<div style="padding:5px; background:#eee; aspect-ratio:1/1; font-size:10px; overflow:hidden;">${p.text}</div>`).join('');
        }

        function toggleEdit(v) { 
            document.getElementById('prof-ui').classList.toggle('hidden', v);
            document.getElementById('prof-edit').classList.toggle('hidden', !v);
        }

        async function saveProfile() {
            const name = document.getElementById('edit-name').value;
            const file = document.getElementById('edit-ava').files[0];
            let avatarUrl = "";
            if(file) {
                const reader = new FileReader();
                avatarUrl = await new Promise(r => { reader.readAsDataURL(file); reader.onload = () => r(reader.result); });
            }
            await api('/users/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ displayName: name, avatarUrl })
            });
            toggleEdit(false); openProfile(me);
        }

        async function doPost() {
            const text = document.getElementById('p-txt').value, file = document.getElementById('p-img').files[0];
            let imageUrl = "";
            if(file) {
                const reader = new FileReader();
                imageUrl = await new Promise(r => { reader.readAsDataURL(file); reader.onload = () => r(reader.result); });
            }
            await api('/posts', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text, imageUrl}) });
            document.getElementById('p-txt').value = ""; loadFeed();
        }

        async function loadChats() {
            const d = await api('/chats');
            const dot = document.getElementById('dot');
            if(d.unreadCount > 0) { dot.innerText = d.unreadCount; dot.classList.remove('hidden'); } else dot.classList.add('hidden');
            document.getElementById('chats-list').innerHTML = d.users.map(u => `
                <div style="padding:15px; background:#fff; border-bottom:1px solid #eee; display:flex; gap:10px; align-items:center;" onclick="startChat('${u.username}')">
                    <img src="${u.avatarUrl || DEF}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                    <b>${u.displayName || u.username}</b>
                </div>
            `).join('');
        }

        function startChat(n) {
            curP = n; document.getElementById('chats-list').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('chat-name').innerText = n;
            loadMsgs(); if(chatL) clearInterval(chatL); chatL = setInterval(loadMsgs, 4000);
        }
        function backToChats() { clearInterval(chatL); document.getElementById('chat-active').classList.add('hidden'); document.getElementById('chats-list').classList.remove('hidden'); }
        async function loadMsgs() {
            const msgs = await api('/messages/'+curP);
            document.getElementById('msg-box').innerHTML = msgs.map(m => `<div class="m ${m.sender === me ? 'm-out' : 'm-in'}">${m.text}</div>`).join('');
            const b = document.getElementById('msg-box'); b.scrollTop = b.scrollHeight;
        }
        async function sendMsg() {
            const text = document.getElementById('m-in').value; if(!text) return;
            await api('/messages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({receiver:curP, text}) });
            document.getElementById('m-in').value = ""; loadMsgs();
        }

        async function doSearch(q) {
            if(!q) return;
            const users = await api('/users/search?q='+q);
            document.getElementById('search-list').innerHTML = users.map(u => `<div style="padding:15px; background:#fff; border-bottom:1px solid #eee" onclick="openProfile('${u.username}')">${u.username}</div>`).join('');
        }

        if(token) { document.getElementById('view-auth').classList.add('hidden'); document.getElementById('view-app').classList.remove('hidden'); loadFeed(); setInterval(loadChats, 15000); }
    </script>
</body>
</html>
