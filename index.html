<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0088cc; --bg: #f0f2f5; --text: #000; --border: #dddfe2; --gray: #65676b; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; }
        .hidden { display: none !important; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid var(--border); display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .badge { position: absolute; top: 10px; right: 25%; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; }

        /* Посты */
        .container { max-width: 600px; margin: 0 auto; }
        .post { background: #fff; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-ava { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
        .post-img { width: 100%; max-height: 500px; object-fit: cover; display: block; }
        .post-footer { padding: 10px 15px; display: flex; gap: 15px; }

        /* Кнопки и инпуты */
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; font-size: 16px; margin: 5px 0; }
        .btn-sec { background: #e4e6eb; color: #000; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 10px; outline: none; background: #f0f2f5; }

        /* Список чатов */
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: #fff; border-bottom: 1px solid #eee; cursor: pointer; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        
        /* Окно сообщений */
        #msg-history { height: calc(100vh - 130px); overflow-y: auto; padding: 15px; background: #e5ddd5; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .msg-out { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 4px; }
        .msg-in { align-self: flex-start; background: #fff; border-bottom-left-radius: 4px; }

        @media (min-width: 600px) {
            .post { border-radius: 10px; border: 1px solid var(--border); margin-top: 15px; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="container" style="padding: 40px 20px;">
        <h1 style="text-align:center; color: var(--accent); margin-bottom: 30px;">Kasta</h1>
        <input id="u-name" placeholder="Логин">
        <input id="u-pass" type="password" placeholder="Пароль">
        <button class="btn" onclick="auth('login')">Войти</button>
        <button class="btn btn-sec" onclick="auth('register')">Создать аккаунт</button>
    </div>

    <div id="app" class="hidden">
        <div class="container">
            <div id="page-feed">
                <div style="background:#fff; padding:15px; border-bottom:1px solid var(--border);">
                    <textarea id="p-txt" placeholder="Что нового?"></textarea>
                    <input type="file" id="p-img" accept="image/*">
                    <button class="btn" onclick="createPost()">Опубликовать</button>
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="page-search" class="hidden">
                <div style="padding:15px;"><input oninput="doSearch(this.value)" placeholder="Поиск людей..."></div>
                <div id="search-results"></div>
            </div>

            <div id="page-chats" class="hidden">
                <div id="chat-list-container"></div>
                <div id="active-chat" class="hidden">
                    <div style="padding:10px; background:#fff; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border);">
                        <button onclick="backToChats()" style="border:none; background:none; font-size:20px;">←</button>
                        <b id="chat-title">Чат</b>
                    </div>
                    <div id="msg-history"></div>
                    <div style="padding:10px; display:flex; gap:10px; background:#f0f2f5;">
                        <input id="m-input" placeholder="Сообщение..." style="margin:0;">
                        <button class="btn" style="width:60px; margin:0;" onclick="sendMsg()">➤</button>
                    </div>
                </div>
            </div>

            <div id="page-profile" class="hidden">
                <div id="profile-header" style="background:#fff; padding:30px 15px; text-align:center; border-bottom:1px solid var(--border);"></div>
                <div id="profile-posts"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="nav('feed')">🏠</div>
            <div class="nav-item" onclick="nav('search')">🔍</div>
            <div class="nav-item" onclick="nav('chats')">💬<div id="unread-badge" class="badge hidden">0</div></div>
            <div class="nav-item" onclick="openUser(me)">👤</div>
        </nav>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        const DEF_AVA = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";

        let token = localStorage.getItem('token');
        let me = localStorage.getItem('currentUser');
        let chatTimer, currentChat;

        async function auth(type) {
            const username = document.getElementById('u-name').value;
            const password = document.getElementById('u-pass').value;
            const res = await fetch(`${API}/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const d = await res.json();
            if(res.ok) {
                localStorage.setItem('token', d.token);
                localStorage.setItem('currentUser', d.username);
                location.reload();
            } else alert(d.message);
        }

        function nav(page) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + page).classList.remove('hidden');
            if(page === 'chats') loadChatList();
            if(page === 'feed') loadFeed();
            window.scrollTo(0,0);
        }

        async function loadFeed() {
            const res = await fetch(`${API}/posts`);
            const posts = await res.json();
            document.getElementById('feed-container').innerHTML = posts.map(p => `
                <div class="post">
                    <div class="post-header" onclick="openUser('${p.author}')">
                        <img class="post-ava" src="${p.authorAvatar || DEF_AVA}">
                        <b>${p.author}</b>
                    </div>
                    ${p.text ? `<div style="padding:0 15px 10px;">${p.text}</div>` : ''}
                    ${p.imageUrl ? `<img src="${p.imageUrl}" class="post-img">` : ''}
                    <div class="post-footer">
                        <button onclick="like('${p._id}', this)" style="border:none; background:none; font-size:18px;">❤️ ${p.likes.length}</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadChatList() {
            const res = await fetch(`${API}/chats`, { headers: {'Authorization': `Bearer ${token}`} });
            const d = await res.json();
            
            const badge = document.getElementById('unread-badge');
            if(d.unreadCount > 0) { badge.innerText = d.unreadCount; badge.classList.remove('hidden'); }
            else { badge.classList.add('hidden'); }

            document.getElementById('chat-list-container').innerHTML = d.users.map(u => `
                <div class="chat-item" onclick="startChat('${u.username}')">
                    <img src="${u.avatarUrl || DEF_AVA}">
                    <b>${u.displayName || u.username}</b>
                </div>
            `).join('');
        }

        function startChat(username) {
            currentChat = username;
            document.getElementById('chat-list-container').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('chat-title').innerText = username;
            loadMsgs();
            chatTimer = setInterval(loadMsgs, 3000);
        }

        function backToChats() {
            clearInterval(chatTimer);
            document.getElementById('active-chat').classList.add('hidden');
            document.getElementById('chat-list-container').classList.remove('hidden');
            loadChatList();
        }

        async function loadMsgs() {
            const res = await fetch(`${API}/messages/${currentChat}`, { headers: {'Authorization': `Bearer ${token}`} });
            const msgs = await res.json();
            document.getElementById('msg-history').innerHTML = msgs.map(m => `
                <div class="msg ${m.sender === me ? 'msg-out' : 'msg-in'}">${m.text}</div>
            `).join('');
            const h = document.getElementById('msg-history');
            h.scrollTop = h.scrollHeight;
        }

        async function sendMsg() {
            const txt = document.getElementById('m-input').value;
            if(!txt) return;
            await fetch(`${API}/messages`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({receiver: currentChat, text: txt})
            });
            document.getElementById('m-input').value = "";
            loadMsgs();
        }

        async function openUser(username) {
            nav('profile');
            const res = await fetch(`${API}/users/profile/${username}`);
            const u = await res.json();
            const isMe = u.username === me;

            document.getElementById('profile-header').innerHTML = `
                <img src="${u.avatarUrl || DEF_AVA}" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
                <h2>${u.displayName || u.username}</h2>
                <div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
                    <div><b>${u.postsCount}</b><br>посты</div>
                    <div><b>${u.subscribersCount}</b><br>подписчики</div>
                </div>
                ${isMe ? '' : `<button class="btn" onclick="startChat('${u.username}')">Написать</button>`}
            `;
            document.getElementById('profile-posts').innerHTML = u.posts.map(p => `
                <img src="${p.imageUrl}" style="width:33.3%; height:120px; object-fit:cover; padding:1px;">
            `).join('');
        }

        // Остальные функции (doSearch, createPost, like) остаются как были, но адаптированы под новый API.
        
        if(token) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadFeed();
            setInterval(loadChatList, 10000); // Фоновая проверка сообщений
        }
    </script>
</body>
</html>
