<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASTA - PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        :root {
            --primary: #ff0000;
            --bg-body: #080808;
            --bg-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --blur: 15px;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-card: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg-body); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: 0.3s; }

        .nav-side {
            position: fixed; left: 0; top: 0; width: 80px; height: 100vh;
            background: var(--bg-card); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
            border-right: 1px solid var(--glass-border); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px;
        }
        
        .app-shell { margin-left: 80px; width: calc(100% - 80px); max-width: 680px; padding: 20px; }
        
        @media (max-width: 700px) {
            .nav-side { top: auto; bottom: 0; width: 100%; height: 70px; flex-direction: row; justify-content: space-around; border-right: none; border-top: 1px solid var(--glass-border); padding: 0; }
            .app-shell { margin-left: 0; width: 100%; padding-bottom: 90px; }
        }

        .glass { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); }
        .hidden { display: none !important; }

        .nav-item { cursor: pointer; color: var(--text); opacity: 0.4; transition: 0.3s; padding: 12px; border-radius: 15px; }
        .nav-item.active { opacity: 1; color: var(--primary); background: rgba(255,255,255,0.05); }
        .nav-item svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* ПОСТЫ И КОММЕНТЫ */
        .post { margin-bottom: 25px; overflow: hidden; }
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .p-ava { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: #222; }
        .media-box { width: 100%; background: #000; }
        .media-box img, .media-box video { width: 100%; display: block; max-height: 550px; object-fit: contain; }
        
        .post-act { padding: 15px; display: flex; gap: 20px; border-bottom: 1px solid var(--glass-border); }
        .act-btn { background: none; border: none; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: bold; }
        .act-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; }
        .act-btn.liked { color: var(--primary); }
        .act-btn.liked svg { fill: var(--primary); }

        .comments-section { padding: 15px; font-size: 14px; }
        .comment-item { margin-bottom: 8px; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--glass-border); }
        
        /* ПРОФИЛЬ И БАННЕР */
        .p-banner { width: 100%; height: 160px; background-color: var(--primary); background-size: cover; background-position: center; border-radius: 20px 20px 0 0; }
        .p-ava-main { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--bg-body); margin-top: -50px; object-fit: cover; background: #222; position: relative; z-index: 2; }

        .p-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--bg-card); position: relative; border: 1px solid var(--glass-border); }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* ЧАТЫ */
        #chat-window { position: fixed; inset: 0; background: var(--bg-body); z-index: 2000; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-size: cover; background-position: center; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; backdrop-filter: blur(5px); }
        .msg.me { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }

        /* ИНПУТЫ И КНОПКИ */
        input, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--bg-card); color: var(--text); outline: none; margin-bottom: 12px; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        
        /* СТОРИС */
        .story-ring { border: 2px solid var(--primary); padding: 2px; border-radius: 50%; width: 64px; height: 64px; object-fit: cover; cursor: pointer; }
        
        /* FULLSCREEN STORY VIEWER */
        #story-viewer { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #sv-img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        #sv-caption { position: absolute; bottom: 40px; width: 90%; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; text-align: center; color: #fff; font-size: 16px; backdrop-filter: blur(10px); }
        #sv-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; z-index: 3001; }
        #sv-author { position: absolute; top: 25px; left: 20px; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 10px; }

        /* ARCHIVE MODAL */
        #archive-modal { position: fixed; inset: 0; background: var(--bg-body); z-index: 2500; display: none; flex-direction: column; }
        .archive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; overflow-y: auto; }
        .arch-item { position: relative; border-radius: 15px; overflow: hidden; height: 250px; background: #222; }
        .arch-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .arch-del { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); color: white; border: none; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body data-theme="dark">

<nav class="nav-side">
    <div class="nav-item active" onclick="window.switchTab('feed', event)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
    <div class="nav-item" onclick="window.switchTab('chats', event)"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></div>
    <div class="nav-item" onclick="window.switchTab('profile', event)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
    <div class="nav-item" onclick="window.switchTab('settings', event)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div>
</nav>

<div class="app-shell">
    <div id="scr-auth" style="display: flex; flex-direction: column; justify-content: center; min-height: 80vh;">
        <div class="glass" style="padding: 40px; text-align: center;">
            <h1 style="color: var(--primary); letter-spacing: 5px; margin-bottom: 30px;">KASTA</h1>
            <input id="login-u" placeholder="Логин">
            <input id="login-p" type="password" placeholder="Пароль">
            <button class="btn-main" onclick="window.doAuth('login')">ВОЙТИ</button>
            <p onclick="window.doAuth('register')" style="margin-top: 20px; font-size: 13px; opacity: 0.5; cursor: pointer;">Регистрация</p>
        </div>
    </div>

    <div id="scr-app" class="hidden">
        <div id="view-feed">
            <div id="st-row" class="glass" style="display: flex; gap: 15px; padding: 15px; margin-bottom: 20px; overflow-x: auto;">
                <div onclick="document.getElementById('st-in').click()" style="min-width: 60px; height: 60px; border-radius: 50%; border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); font-size: 24px;">+</div>
                <input type="file" id="st-in" hidden accept="image/*,video/*" onchange="window.uploadSt(this)">
                <div id="st-list" style="display: flex; gap: 10px;"></div>
            </div>
            <div id="feed-cont"></div>
        </div>

        <div id="view-chats" class="hidden">
            <h2 style="margin-bottom: 20px;">Чаты</h2>
            <div id="chats-list"></div>
        </div>

        <div id="view-profile" class="hidden">
            <div id="p-card" class="glass" style="text-align: center; margin-bottom: 20px; padding-bottom: 20px;"></div>
            
            <button class="btn-main" style="background: var(--bg-card); margin-bottom: 20px; font-size: 14px;" onclick="window.openArchive()">📦 Архив Историй</button>
            
            <div class="glass" style="padding: 15px; margin-bottom: 20px;">
                <textarea id="post-text" placeholder="Что нового?" rows="2"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main" style="background: var(--bg-card); flex: 1;" onclick="document.getElementById('post-media').click()">МЕДИА</button>
                    <input type="file" id="post-media" hidden accept="image/*,video/*">
                    <button class="btn-main" style="flex: 1;" onclick="window.createPost()">ОПУБЛИКОВАТЬ</button>
                </div>
            </div>
            <div class="p-grid" id="p-grid"></div>
        </div>

        <div id="view-settings" class="hidden">
            <div class="glass" style="padding: 20px;">
                <h3 style="margin-bottom: 20px; color: var(--primary);">Кастомизация & Настройки</h3>
                
                <p style="font-size: 12px; margin-bottom: 8px;">ЦВЕТ АКЦЕНТА</p>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <div style="width:30px; height:30px; background:#ff0000; border-radius:50%; cursor:pointer;" onclick="window.setAccent('#ff0000')"></div>
                    <div style="width:30px; height:30px; background:#007aff; border-radius:50%; cursor:pointer;" onclick="window.setAccent('#007aff')"></div>
                    <div style="width:30px; height:30px; background:#34c759; border-radius:50%; cursor:pointer;" onclick="window.setAccent('#34c759')"></div>
                    <div style="width:30px; height:30px; background:#ff9500; border-radius:50%; cursor:pointer;" onclick="window.setAccent('#ff9500')"></div>
                    <div style="width:30px; height:30px; background:#af52de; border-radius:50%; cursor:pointer;" onclick="window.setAccent('#af52de')"></div>
                </div>

                <p style="font-size: 12px; margin-bottom: 8px;">ЭФФЕКТ СТЕКЛА (РАЗМЫТИЕ)</p>
                <input type="range" id="blur-range" min="0" max="30" value="15" onchange="window.setBlur(this.value)" style="margin-bottom: 20px;">

                <p style="font-size: 12px; margin-bottom: 8px;">ТЕМА</p>
                <button class="btn-main" style="background:var(--bg-card); margin-bottom: 20px;" onclick="window.toggleTheme()">Сменить тему</button>

                <p style="font-size: 12px; margin-bottom: 8px;">ПРОФИЛЬ (НИК И БАННЕР)</p>
                <input id="set-nick" placeholder="Изменить ник">
                <button class="btn-main" style="background:var(--bg-card); margin-bottom: 10px;" onclick="document.getElementById('banner-in').click()">ЗАГРУЗИТЬ БАННЕР ПРОФИЛЯ</button>
                <input type="file" id="banner-in" hidden onchange="window.saveBanner(this)">
                
                <p style="font-size: 12px; margin: 10px 0 8px;">ОБОИ В ЧАТАХ (URL)</p>
                <input id="set-wall" placeholder="Ссылка на картинку">
                
                <button class="btn-main" onclick="window.saveSettings()">СОХРАНИТЬ ВСЁ</button>
                <button class="btn-main" style="background: #ff3b30; margin-top: 20px;" onclick="window.logOut()">ВЫЙТИ</button>
            </div>
        </div>
    </div>
</div>

<div id="chat-window">
    <div style="padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: var(--bg-card); backdrop-filter: blur(10px);">
        <button onclick="document.getElementById('chat-window').style.display='none'" style="background:none; border:none; color:var(--text); font-size: 24px; cursor:pointer;">←</button>
        <b id="chat-user">Чат</b>
    </div>
    <div id="chat-msgs" class="chat-body"></div>
    <div style="padding: 15px; display: flex; gap: 10px; background: var(--bg-card); backdrop-filter: blur(10px);">
        <input id="chat-in" style="margin: 0;" placeholder="Сообщение...">
        <button class="btn-main" style="width: 60px;" onclick="window.sendMsg()">></button>
    </div>
</div>

<div id="story-viewer">
    <button id="sv-close" onclick="document.getElementById('story-viewer').style.display='none'">×</button>
    <div id="sv-author"></div>
    <img id="sv-img" src="">
    <div id="sv-caption" class="hidden"></div>
</div>

<div id="archive-modal">
    <div style="padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: var(--bg-card);">
        <button onclick="document.getElementById('archive-modal').style.display='none'" style="background:none; border:none; color:var(--text); font-size: 24px; cursor:pointer;">←</button>
        <b>Архив историй</b>
    </div>
    <div id="archive-grid" class="archive-grid"></div>
</div>

<script>
    const API = "https://kasta-l49s.onrender.com";
    let token = localStorage.getItem('token'), me = localStorage.getItem('me'), curChat = "";
    let myPosts = [];

    // ФИЛЬТР БЕЗОПАСНОСТИ ДЛЯ ССЫЛОК (Решает проблему Mixed Content)
    const sec = (u) => {
        if (!u) return '';
        if (u.startsWith('http://')) return u.replace('http://', 'https://');
        return u;
    };

    const isVid = (u) => u && (u.includes('.mp4') || u.includes('.webm') || u.startsWith('data:video'));
    const getAva = (n) => `https://ui-avatars.com/api/?name=${n}&background=random&color=fff&size=128`;

    async function call(p, m='GET', b=null) {
        try {
            const r = await fetch(API+p, {
                method: m, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: b ? JSON.stringify(b) : null
            });
            if (!r.ok) return { error: true, status: r.status };
            return await r.json();
        } catch(e) { return { error: true, message: e.message }; }
    }

    window.doAuth = async (t) => {
        const u = document.getElementById('login-u').value, p = document.getElementById('login-p').value;
        const d = await call(`/${t}`, 'POST', {username:u, password:p});
        if(!d.error) { localStorage.setItem('token', d.token); localStorage.setItem('me', d.username); location.reload(); } 
        else alert(d.message || "Ошибка авторизации");
    };

    window.switchTab = (id, e) => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(e && e.currentTarget) e.currentTarget.classList.add('active');
        document.querySelectorAll('#scr-app > div').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-'+id).classList.remove('hidden');
        if(id === 'feed') window.loadFeed();
        if(id === 'chats') window.loadChats();
        if(id === 'profile') window.loadProfile();
    };

    // ЗАГРУЗКА ЛЕНТЫ (С ПРАВИЛЬНОЙ СОРТИРОВКОЙ)
    window.loadFeed = async () => {
        const d = await call('/posts');
        if(!d || d.error || !Array.isArray(d)) return;
        
        // Надежная сортировка: новые сверху
        const sortedPosts = [...d].reverse();
        
        document.getElementById('feed-cont').innerHTML = sortedPosts.map(p => {
            const commentsHtml = (p.comments || []).map(c => 
                `<div class="comment-item"><b>${c.author}:</b> ${c.text}</div>`
            ).join('');

            // Пропускаем аватарки и картинки через фильтр HTTPS
            const safeAva = sec(getAva(p.author));
            const safeImg = sec(p.imageUrl);

            return `
            <div class="glass post">
                <div class="post-h">
                    <img src="${safeAva}" class="p-ava">
                    <b>${p.author}</b>
                </div>
                ${safeImg ? `<div class="media-box">${isVid(safeImg) ? `<video src="${safeImg}" controls></video>` : `<img src="${safeImg}">`}</div>` : ''}
                <div class="post-act">
                    <button class="act-btn ${p.likes.includes(me)?'liked':''}" onclick="window.like('${p._id}')">
                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        ${p.likes.length}
                    </button>
                    <button class="act-btn" onclick="document.getElementById('comm-in-${p._id}').focus()">
                        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        ${(p.comments || []).length}
                    </button>
                </div>
                <div class="comments-section">
                    <p style="margin-bottom: 10px; font-size: 15px;">${p.text || ''}</p>
                    <div style="margin-bottom: 10px;">${commentsHtml}</div>
                    <div style="display:flex; gap:10px;">
                        <input id="comm-in-${p._id}" placeholder="Добавить комментарий..." style="margin:0; padding:10px;">
                        <button class="btn-main" style="width:70px; padding:0;" onclick="window.addComm('${p._id}')">OK</button>
                    </div>
                </div>
            </div>`
        }).join('');
        window.loadStories();
    };

    // === СИСТЕМА СТОРИС И АРХИВА (ЛОКАЛЬНАЯ) ===
    window.loadStories = async () => {
        // Так как на сервере нет /stories, работаем с локальным кэшем, чтобы фича жила
        const local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        const list = document.getElementById('st-list');
        list.innerHTML = "";
        
        // Оставляем только сторис за последние 24 часа в ленте
        const now = Date.now();
        const activeStories = local.filter(s => now - s.id < 86400000); 

        activeStories.forEach(i => {
            const safeAva = sec(getAva(i.author));
            // Сохраняем данные сторис в data-атрибуты для открытия
            list.innerHTML += `<img src="${i.imageUrl || safeAva}" class="story-ring" 
                onclick="window.viewStory('${i.imageUrl}', '${i.caption || ''}', '${i.author}')">`;
        });
    };

    // ЗАГРУЗКА СТОРИС С ПОДПИСЬЮ
    window.uploadSt = async (el) => {
        const f = el.files[0]; if(!f) return;
        const img = await window.pack(f);
        
        // Запрашиваем подпись
        const caption = prompt("Добавьте подпись к истории (или оставьте пустым):");
        
        // Сохраняем в локальный архив
        const local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        local.push({ id: Date.now(), author: me, imageUrl: img, caption: caption });
        localStorage.setItem('local_stories', JSON.stringify(local));
        
        window.loadFeed();
    };

    // ПРОСМОТР СТОРИС НА ВЕСЬ ЭКРАН
    window.viewStory = (imgUrl, caption, author) => {
        const viewer = document.getElementById('story-viewer');
        document.getElementById('sv-img').src = sec(imgUrl);
        
        const capEl = document.getElementById('sv-caption');
        if(caption && caption !== "null") {
            capEl.innerText = caption;
            capEl.classList.remove('hidden');
        } else {
            capEl.classList.add('hidden');
        }
        
        document.getElementById('sv-author').innerHTML = `<img src="${sec(getAva(author))}" style="width:35px; border-radius:50%; border:2px solid var(--primary)"> ${author}`;
        viewer.style.display = 'flex';
    };

    // АРХИВ СТОРИС
    window.openArchive = () => {
        const modal = document.getElementById('archive-modal');
        const grid = document.getElementById('archive-grid');
        const local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        
        // Фильтруем только МОИ истории
        const myStories = local.filter(s => s.author === me).reverse();
        
        grid.innerHTML = myStories.length === 0 ? "<p style='padding: 20px; opacity: 0.5'>Архив пуст.</p>" : myStories.map(s => `
            <div class="arch-item">
                <img src="${s.imageUrl}">
                <button class="arch-del" onclick="window.delStory(${s.id})">УДАЛИТЬ</button>
            </div>
        `).join('');
        
        modal.style.display = 'flex';
    };

    window.delStory = (id) => {
        if(!confirm("Точно удалить историю?")) return;
        let local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        local = local.filter(s => s.id !== id);
        localStorage.setItem('local_stories', JSON.stringify(local));
        window.openArchive(); // обновляем архив
        window.loadFeed(); // обновляем ленту
    };
    // ============================================

    window.addComm = async (id) => {
        const inp = document.getElementById('comm-in-'+id);
        if(!inp.value) return;
        await call(`/posts/${id}/comment`, 'POST', {text: inp.value});
        inp.value = ""; window.loadFeed();
    };

    window.like = async (id) => { await call(`/posts/${id}/like`, 'POST'); window.loadFeed(); };

    // ПРОФИЛЬ
    window.loadProfile = async () => {
        const u = await call('/users/profile/'+me);
        if(!u || u.error) return;
        myPosts = u.posts || [];
        
        const banner = localStorage.getItem('k_banner') || '';
        const safeAva = sec(getAva(me));
        
        document.getElementById('p-card').innerHTML = `
            <div class="p-banner" style="background-image: ${banner ? `url(${banner})` : 'none'}"></div>
            <img src="${safeAva}" class="p-ava-main">
            <h2 style="margin-top:10px;">${u.displayName || me}</h2>
            <p style="opacity:0.5;">@${me}</p>
        `;
        
        // ФИЛЬТР: ТОЛЬКО ПОСТЫ С КАРТИНКАМИ В ПРОФИЛЕ
        const mediaPosts = myPosts.filter(p => p.imageUrl);
        
        document.getElementById('p-grid').innerHTML = mediaPosts.length === 0 ? 
            "<p style='grid-column: span 3; text-align: center; opacity: 0.5; padding: 20px;'>Нет фото или видео</p>" : 
            mediaPosts.map(p => `
            <div class="grid-item">
                ${isVid(p.imageUrl) ? `<video src="${sec(p.imageUrl)}"></video>` : `<img src="${sec(p.imageUrl)}">`}
            </div>
        `).join('');
    };

    window.createPost = async () => {
        const t = document.getElementById('post-text').value, f = document.getElementById('post-media').files[0];
        let img = ""; if(f) img = await window.pack(f);
        await call('/posts', 'POST', {text:t, imageUrl:img});
        document.getElementById('post-text').value = "";
        window.switchTab('feed');
    };

    window.loadChats = async () => {
        const d = await call('/chats');
        if(!d || !d.users) return;
        document.getElementById('chats-list').innerHTML = d.users.map(u => `
            <div class="glass" onclick="window.openChat('${u.username}')" style="padding:15px; margin-bottom:10px; display:flex; align-items:center; gap:15px; cursor:pointer;">
                <img src="${sec(getAva(u.username))}" style="width:40px; border-radius:50%;">
                <b>${u.username}</b>
            </div>
        `).join('');
    };

    window.openChat = async (n) => {
        curChat = n; document.getElementById('chat-user').innerText = n;
        document.getElementById('chat-window').style.display = 'flex';
        const box = document.getElementById('chat-msgs');
        
        const wall = localStorage.getItem('k_wall');
        if (wall) box.style.backgroundImage = `url(${wall})`;
        else box.style.background = `linear-gradient(180deg, var(--bg-body) 0%, rgba(0,0,0,0.5) 100%)`;
        
        const m = await call('/messages/'+n);
        if(Array.isArray(m)) box.innerHTML = m.map(msg => `<div class="msg ${msg.sender===me?'me':'them'}">${msg.text}</div>`).join('');
        else box.innerHTML = '';
        box.scrollTop = box.scrollHeight;
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-in'); if(!i.value) return;
        await call('/messages', 'POST', {recipient:curChat, text:i.value});
        i.value = ""; window.openChat(curChat);
    };

    window.saveSettings = async () => {
        const nick = document.getElementById('set-nick').value;
        const wall = document.getElementById('set-wall').value;
        if(nick) await call('/users/update', 'POST', {displayName: nick});
        if(wall) localStorage.setItem('k_wall', wall);
        alert("Настройки сохранены!");
        location.reload();
    };

    window.saveBanner = async (el) => {
        const f = el.files[0]; if(!f) return;
        const img = await window.pack(f);
        localStorage.setItem('k_banner', img);
        alert("Баннер загружен!");
    };

    window.setAccent = (c) => { document.documentElement.style.setProperty('--primary', c); localStorage.setItem('k_accent', c); };
    window.setBlur = (val) => { document.documentElement.style.setProperty('--blur', val + 'px'); localStorage.setItem('k_blur', val); };
    window.toggleTheme = () => {
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next); localStorage.setItem('k_theme', next);
    };
    window.pack = (f) => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = e => r(e.target.result); });
    window.logOut = () => { localStorage.clear(); location.reload(); };

    if(token) {
        document.getElementById('scr-auth').classList.add('hidden');
        document.getElementById('scr-app').classList.remove('hidden');
        window.switchTab('feed');
    }

    window.setAccent(localStorage.getItem('k_accent') || '#ff0000');
    window.setBlur(localStorage.getItem('k_blur') || '15');
    document.body.setAttribute('data-theme', localStorage.getItem('k_theme') || 'dark');
    document.getElementById('set-wall').value = localStorage.getItem('k_wall') || '';
    document.getElementById('blur-range').value = localStorage.getItem('k_blur') || '15';
</script>
</body>
</html>
