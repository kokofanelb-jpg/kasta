<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASTA LIQUID GLASS</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        :root {
            --primary: #a044ff;
            --bg-grad: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --blur: blur(25px);
            --text: #ffffff;
            --text-mut: rgba(255, 255, 255, 0.6);
        }

        [data-theme="light"] {
            --bg-grad: linear-gradient(135deg, #e0eafc, #cfdef3);
            --glass: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text: #1a1a1a;
            --text-mut: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: var(--bg-grad); 
            background-attachment: fixed;
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow-x: hidden;
            transition: all 0.5s ease;
        }

        .app-shell { width: 100%; max-width: 500px; padding-bottom: 120px; position: relative; }

        /* ЭФФЕКТ СТЕКЛА */
        .glass { 
            background: var(--glass); 
            backdrop-filter: var(--blur); 
            -webkit-backdrop-filter: var(--blur); 
            border: 1px solid var(--glass-border); 
            border-radius: 28px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .glass:active { transform: scale(0.98); }

        .hidden { display: none !important; }

        /* КНОПКИ И ВВОД */
        input, textarea { 
            width: 100%; padding: 16px; border-radius: 20px; border: 1px solid var(--glass-border); 
            background: rgba(255, 255, 255, 0.05); color: var(--text); outline: none; margin-bottom: 12px;
            transition: 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.1); border-color: var(--primary); }
        
        .btn-main { 
            background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 20px; 
            font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(160, 68, 255, 0.4);
        }

        /* HEADER И МЕТАДАННЫЕ (КАК НА ФОТО) */
        .meta-header { 
            padding: 20px; display: flex; justify-content: space-between; 
            font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--text-mut);
            letter-spacing: 2px;
        }

        /* LIQUID NAV (НИЖНЯЯ ПАНЕЛЬ) */
        .nav-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; z-index: 1000;
        }
        .nav-liquid {
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px; height: 75px;
        }
        .nav-item { 
            text-align: center; cursor: pointer; color: var(--text-mut); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; flex: 1;
        }
        .nav-item b { display: block; font-size: 24px; margin-bottom: 4px; }
        .nav-item span { font-size: 9px; font-weight: 700; opacity: 0; transition: 0.3s; }
        .nav-item.active { color: var(--text); transform: translateY(-10px); }
        .nav-item.active span { opacity: 1; }

        /* ПОСТЫ */
        .post { margin: 15px; overflow: hidden; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .p-ava { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .post-info b { display: block; font-size: 14px; }
        .post-info small { font-size: 10px; color: var(--text-mut); }
        
        .post-img { width: 100%; border-radius: 0; max-height: 450px; object-fit: cover; }
        .post-act { padding: 15px; display: flex; gap: 20px; }
        .act-btn { background: none; border: none; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 6px; cursor: pointer; }

        .comm-box { padding: 0 15px 15px; border-top: 1px solid var(--glass-border); }
        .comm-item { font-size: 12px; margin-top: 8px; }
        .comm-item b { color: var(--primary); }

        /* ПРОФИЛЬ & АНАЛИТИКА */
        .profile-hero { padding: 40px 20px; text-align: center; }
        .p-ava-main { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 15px; box-shadow: 0 0 20px rgba(160, 68, 255, 0.3); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .stat-card { padding: 15px; text-align: center; }
        .stat-card b { display: block; font-size: 18px; }
        .stat-card span { font-size: 10px; color: var(--text-mut); text-transform: uppercase; }

        /* НАСТРОЙКИ (ПО ТВОЕМУ СПИСКУ) */
        .settings-section { margin-bottom: 25px; }
        .settings-label { font-size: 11px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin: 15px 0 10px 10px; letter-spacing: 1px; }
        .setting-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px; margin-bottom: 8px;
        }

        /* ЧАТ */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-grad); z-index: 2000; display: none; flex-direction: column; }
        .chat-h { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .m.me { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .m.them { align-self: flex-start; background: var(--glass); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }

        /* СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body data-theme="dark">

<div class="app-shell">
    <div class="meta-header">
        <div>KASTA / UI-SYSTEM</div>
        <div id="cur-date">APRIL 2026</div>
    </div>

    <div id="scr-auth" style="padding: 40px 20px; display: flex; flex-direction: column; justify-content: center; min-height: 80vh;">
        <div class="glass" style="padding: 40px; text-align: center;">
            <h1 style="font-size: 40px; letter-spacing: -2px; margin-bottom: 10px;">KASTA</h1>
            <p style="font-size: 12px; color: var(--text-mut); margin-bottom: 30px;">LIQUID GLASS INTERFACE</p>
            <input id="login-u" placeholder="Username">
            <input id="login-p" type="password" placeholder="Password">
            <button class="btn-main" onclick="window.doAuth('login')">Войти</button>
            <p onclick="window.doAuth('register')" style="margin-top: 20px; font-size: 11px; cursor: pointer; font-weight: 800; opacity: 0.7;">REGISTRATION</p>
        </div>
    </div>

    <div id="scr-app" class="hidden">
        
        <div id="view-feed">
            <div class="glass" id="st-list" style="margin: 15px; display: flex; gap: 15px; padding: 15px; overflow-x: auto;">
                <div onclick="document.getElementById('st-input').click()" style="min-width: 65px; height: 65px; border-radius: 50%; border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer;">+</div>
                <input type="file" id="st-input" hidden onchange="window.uploadStory(this)">
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="view-chats" class="hidden" style="padding: 15px;">
            <div class="glass" style="padding: 5px 15px; margin-bottom: 20px; display: flex; align-items: center;">
                <span>🔍</span>
                <input id="search-input" oninput="window.doSearch(this.value)" placeholder="Search friends..." style="border:none; background:none; margin:0;">
            </div>
            <div id="chats-container"></div>
        </div>

        <div id="view-profile" class="hidden">
            <div id="profile-card" class="glass profile-hero" style="margin: 15px;"></div>
            
            <div class="glass" style="margin: 15px; padding: 20px;">
                <p class="settings-label" style="margin: 0 0 15px 0;">New Publication</p>
                <textarea id="post-text" placeholder="What's on your mind?" rows="3"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main" style="background: var(--glass); border: 1px solid var(--glass-border); flex: 1;" onclick="document.getElementById('post-img').click()">Media</button>
                    <input type="file" id="post-img" hidden>
                    <button class="btn-main" style="flex: 2;" onclick="window.createPost()">Publish</button>
                </div>
            </div>

            <div id="profile-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px;"></div>
        </div>

        <div id="view-settings" class="hidden" style="padding: 15px;">
            
            <div class="settings-section">
                <p class="settings-label">Аналитика и активность</p>
                <div class="glass stat-card" style="margin-bottom: 10px; display: flex; justify-content: space-around;">
                    <div><b id="stat-views">1.2k</b><span>Просмотры</span></div>
                    <div><b id="stat-reach">850</b><span>Охват</span></div>
                    <div><b id="stat-inter">12%</b><span>Взаимодействие</span></div>
                </div>
            </div>

            <div class="settings-section">
                <p class="settings-label">Настройка оповещений</p>
                <div class="glass setting-item">
                    <span>Push-уведомления</span>
                    <input type="checkbox" checked style="width: 20px; margin: 0;">
                </div>
                <div class="glass setting-item">
                    <span>Мгновенные оповещения</span>
                    <input type="checkbox" style="width: 20px; margin: 0;">
                </div>
            </div>

            <div class="settings-section">
                <p class="settings-label">Приватность и профиль</p>
                <input id="edit-name" class="glass" placeholder="Отображаемое имя">
                <textarea id="edit-bio" class="glass" placeholder="Расскажите о себе..."></textarea>
                <button class="btn-main" onclick="window.saveProfile()">Сохранить изменения</button>
            </div>

            <div class="settings-section">
                <p class="settings-label">Внешний вид</p>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main" style="background: #fff; color: #000;" onclick="window.switchTheme('light')">Light</button>
                    <button class="btn-main" style="background: #111;" onclick="window.switchTheme('dark')">Dark</button>
                </div>
            </div>

            <button class="btn-main" style="background: #ff3b30; margin-top: 30px;" onclick="window.logOut()">Выйти из системы</button>
        </div>

        <div class="nav-container">
            <div class="nav-liquid glass">
                <div class="nav-item active" id="n-feed" onclick="window.switchTab('feed')"><b>🏠</b><span>Home</span></div>
                <div class="nav-item" id="n-chats" onclick="window.switchTab('chats')"><b>💬</b><span>Chats</span></div>
                <div class="nav-item" id="n-profile" onclick="window.switchTab('profile')"><b>👤</b><span>Profile</span></div>
                <div class="nav-item" id="n-settings" onclick="window.switchTab('settings')"><b>⚙️</b><span>Settings</span></div>
            </div>
        </div>
    </div>
</div>

<div id="chat-window">
    <div class="chat-h glass" style="border-radius: 0 0 28px 28px;">
        <button onclick="document.getElementById('chat-window').style.display='none'" style="background:none; border:none; font-size:24px; color:white;">✕</button>
        <b id="active-chat-name" style="margin-left: 20px;">User</b>
    </div>
    <div id="chat-msgs" class="chat-body"></div>
    <div class="glass" style="padding: 15px; margin: 15px; display: flex; gap: 10px;">
        <input id="chat-input" placeholder="Message..." style="margin: 0; border: none;">
        <button class="btn-main" style="width: auto; padding: 0 20px;" onclick="window.sendMsg()">➤</button>
    </div>
</div>

<script>
    const API = "https://kasta-l49s.onrender.com";
    let token = localStorage.getItem('token'), me = localStorage.getItem('me'), curChat = "";

    const clean = u => u ? u.replace('http://', 'https://') : 'https://ui-avatars.com/api/?background=random&name=U';
    const fmtTime = d => new Date(d).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    // БАЗОВЫЙ ВЫЗОВ
    async function call(p, m='GET', b=null) {
        try {
            const r = await fetch(API+p, {
                method: m, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: b ? JSON.stringify(b) : null
            });
            if(r.status === 401) window.logOut();
            return await r.json();
        } catch(e) { return {error: true}; }
    }

    // АУТЕНТИФИКАЦИЯ
    window.doAuth = async (type) => {
        const u = document.getElementById('login-u').value, p = document.getElementById('login-p').value;
        const r = await fetch(`${API}/${type}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username:u, password:p})
        });
        const d = await r.json();
        if(r.ok) {
            localStorage.setItem('token', d.token); localStorage.setItem('me', d.username);
            location.reload();
        } else alert(d.message);
    };

    window.logOut = () => { localStorage.clear(); location.reload(); };

    // НАВИГАЦИЯ
    window.switchTab = (id) => {
        ['feed','chats','profile','settings'].forEach(t => {
            document.getElementById('view-'+t).classList.add('hidden');
            document.getElementById('n-'+t).classList.remove('active');
        });
        document.getElementById('view-'+id).classList.remove('hidden');
        document.getElementById('n-'+id).classList.add('active');
        
        if(id==='feed') window.loadFeed();
        if(id==='chats') window.loadChats();
        if(id==='profile') window.loadProfile();
    };

    // ЛЕНТА И ПОСТЫ
    window.loadFeed = async () => {
        const d = await call('/posts');
        if(!Array.isArray(d)) return;
        document.getElementById('feed-container').innerHTML = [...d].reverse().map(p => `
            <div class="post glass">
                <div class="post-h">
                    <img src="${clean(p.authorAvatar)}" class="p-ava">
                    <div class="post-info"><b>${p.author}</b><small>${fmtTime(p.createdAt)}</small></div>
                    ${p.author === me ? `<button class="btn-del" style="margin-left:auto; background:none; border:none; color:red; font-size:10px;" onclick="window.delPost('${p._id}')">DELETE</button>` : ''}
                </div>
                ${p.imageUrl ? `<img src="${clean(p.imageUrl)}" class="post-img">` : ''}
                <div class="post-act">
                    <div class="act-btn" onclick="window.like('${p._id}')">${p.likes.includes(me)?'❤️':'🤍'} ${p.likes.length}</div>
                    <div class="act-btn">💬 ${p.comments.length}</div>
                </div>
                <div style="padding:0 15px 15px; font-size:14px;">${p.text || ''}</div>
                <div class="comm-box">
                    ${(p.comments || []).slice(-3).map(c => `<div class="comm-item"><b>${c.author}</b> ${c.text}</div>`).join('')}
                    <input class="comm-in" placeholder="Write comment..." style="margin-top:10px; padding:10px; font-size:12px;" onkeydown="if(event.key==='Enter' && this.value){ window.addComm('${p._id}', this.value); this.value='' }">
                </div>
            </div>
        `).join('');
    };

    window.like = async (id) => { await call(`/posts/${id}/like`, 'POST'); window.loadFeed(); };
    window.addComm = async (id, text) => { await call(`/posts/${id}/comment`, 'POST', {text}); window.loadFeed(); };
    window.delPost = async (id) => { if(confirm("Delete post?")) { await call('/posts/'+id, 'DELETE'); window.loadFeed(); } };

    // СТОРИЗ
    window.loadStories = async () => {
        const res = await call('/stories');
        const list = document.getElementById('st-list');
        if(Array.isArray(res)) {
            res.forEach(s => {
                list.innerHTML += `<div style="text-align:center; min-width:65px;"><img src="${clean(s.userAva)}" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--primary); object-fit:cover; padding:2px;"></div>`;
            });
        }
    };

    window.uploadStory = async (el) => {
        const f = el.files[0]; if(!f) return;
        const img = await window.pack(f);
        await call('/stories', 'POST', {image:img});
        location.reload();
    };

    // ЧАТЫ
    window.loadChats = async () => {
        const d = await call('/chats');
        if(!d.users) return;
        document.getElementById('chats-container').innerHTML = d.users.map(u => `
            <div class="glass chat-item chat-row" style="margin-bottom:10px;" data-name="${u.username.toLowerCase()}" onclick="window.openChat('${u.username}')">
                <img src="${clean(u.avatarUrl)}" class="p-ava">
                <div style="flex:1">
                    <b>${u.username}</b>
                    <p style="font-size:10px; color:var(--text-mut)">Click to start messaging</p>
                </div>
            </div>
        `).join('');
    };

    window.doSearch = (val) => {
        const q = val.toLowerCase();
        document.querySelectorAll('.chat-row').forEach(r => {
            r.style.display = r.getAttribute('data-name').includes(q) ? 'flex' : 'none';
        });
    };

    window.openChat = async (name) => {
        curChat = name;
        document.getElementById('active-chat-name').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        const msgs = await call('/messages/'+name);
        if(Array.isArray(msgs)) {
            document.getElementById('chat-msgs').innerHTML = msgs.map(m => `
                <div class="m ${m.sender===me?'me':'them'}">${m.text}<div style="font-size:8px; opacity:0.5; margin-top:4px; text-align:right;">${fmtTime(m.createdAt)}</div></div>
            `).join('');
            const b = document.getElementById('chat-msgs'); b.scrollTop = b.scrollHeight;
        }
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input'); if(!i.value) return;
        await call('/messages', 'POST', {recipient:curChat, text:i.value});
        i.value = ""; window.openChat(curChat);
    };

    // ПРОФИЛЬ
    window.loadProfile = async () => {
        const u = await call('/users/profile/'+me);
        if(!u || u.error) return;
        
        document.getElementById('profile-card').innerHTML = `
            <img src="${clean(u.avatarUrl)}" class="p-ava-main">
            <h2 style="font-size:24px;">${u.displayName || u.username}</h2>
            <p style="color:var(--text-mut); font-size:13px; margin: 5px 0 20px;">${u.bio || 'New member'}</p>
            <div class="stats-grid">
                <div class="glass stat-card"><b>${u.posts ? u.posts.length : 0}</b><span>Posts</span></div>
                <div class="glass stat-card"><b>${u.subscribersCount || 0}</b><span>Following</span></div>
                <div class="glass stat-card"><b>${u.subscribersCount || 0}</b><span>Activity</span></div>
            </div>
        `;
        if(u.posts) {
            document.getElementById('profile-grid').innerHTML = u.posts.map(p => `
                <div class="glass" style="aspect-ratio:1; overflow:hidden;"><img src="${clean(p.imageUrl)}" style="width:100%; height:100%; object-fit:cover;"></div>
            `).join('');
        }
        document.getElementById('edit-name').value = u.displayName || '';
        document.getElementById('edit-bio').value = u.bio || '';
    };

    window.saveProfile = async () => {
        const n = document.getElementById('edit-name').value, b = document.getElementById('edit-bio').value;
        await call('/users/update', 'POST', {displayName:n, bio:b});
        alert("Success!");
    };

    window.createPost = async () => {
        const t = document.getElementById('post-text').value, f = document.getElementById('post-img').files[0];
        let img = f ? await window.pack(f) : "";
        await call('/posts', 'POST', {text:t, imageUrl:img});
        document.getElementById('post-text').value = "";
        window.switchTab('feed');
    };

    // ВСПОМОГАТЕЛЬНОЕ
    window.switchTheme = (t) => { document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
    window.pack = (f) => new Promise(r => {
        const rd = new FileReader(); rd.readAsDataURL(f);
        rd.onload = e => {
            const i = new Image(); i.src = e.target.result;
            i.onload = () => {
                const c = document.createElement('canvas');
                c.width = 800; c.height = (i.height/i.width)*800;
                c.getContext('2d').drawImage(i,0,0,800,c.height);
                r(c.toDataURL('image/jpeg', 0.6));
            };
        };
    });

    // START
    if(token && me) {
        document.getElementById('scr-auth').classList.add('hidden');
        document.getElementById('scr-app').classList.remove('hidden');
        window.switchTab('feed');
        window.loadStories();
    }
    window.switchTheme(localStorage.getItem('theme') || 'dark');
    document.getElementById('cur-date').innerText = new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'}).toUpperCase();
</script>
</body>
</html>
