<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0095f6; --bg: #ffffff; --border: #dbdbdb; --text: #262626; --gray: #8e8e8e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .hidden { display: none !important; }

        /* ВЕРХНЯЯ ПАНЕЛЬ (Только для ПК) */
        .desktop-nav { border-right: 1px solid var(--border); width: 250px; height: 100vh; position: fixed; left: 0; top: 0; padding: 20px; display: flex; flex-direction: column; }

        /* НИЖНЯЯ ПАНЕЛЬ (ДЛЯ ТЕЛЕФОНА) */
        .mobile-nav { 
            display: none; position: fixed; bottom: 0; width: 100%; height: 60px; 
            background: #fff; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 1000;
        }

        /* КОНТЕНТ */
        .main-container { margin-left: 250px; padding: 20px; display: flex; justify-content: center; }
        .feed-container { width: 100%; max-width: 500px; padding-bottom: 80px; }

        /* ПОСТЫ */
        .post { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; background: #fff; }
        .post-header { padding: 12px; display: flex; align-items: center; font-weight: 600; cursor: pointer; }
        .post-img { width: 100%; display: block; background: #fafafa; }
        .post-content { padding: 12px; }

        /* ПРОФИЛЬ */
        .profile-header { text-align: center; padding: 20px 0; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .stats-row { display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .stat-btn { background: none; border: none; cursor: pointer; text-align: center; }
        .stat-btn b { display: block; font-size: 16px; }

        /* КНОПКИ */
        .btn-main { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .mobile-nav { display: flex; }
            .main-container { margin-left: 0; padding: 10px; }
        }
    </style>
</head>
<body>

    <nav class="desktop-nav">
        <h2 style="color: var(--accent);">Kasta</h2>
        <div onclick="showTab('feed')">Лента</div>
        <div onclick="showTab('chats')">Чаты</div>
        <div onclick="showTab('search')">Поиск</div>
        <div onclick="showTab('profile')">Профиль</div>
        <div onclick="logout()" style="margin-top: auto; color: red;">Выйти</div>
    </nav>

    <nav class="mobile-nav">
        <div onclick="showTab('chats')">💬</div>
        <div onclick="showTab('feed')">🏠</div>
        <div onclick="showTab('profile')">👤</div>
        <div onclick="showTab('search')">🔍</div>
    </nav>

    <div class="main-container">
        <div class="feed-container">
            
            <div id="auth-screen">
                <h2>Вход</h2>
                <input id="u-name" placeholder="Юзернейм">
                <input id="u-pass" type="password" placeholder="Пароль">
                <button class="btn-main" onclick="handleAuth('login')">Войти</button>
                <button class="btn-main" style="background: #333;" onclick="handleAuth('register')">Регистрация</button>
            </div>

            <div id="app-screens" class="hidden">
                
                <div id="tab-feed">
                    <div style="padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px;">
                        <textarea id="post-txt" placeholder="Напиши что-нибудь..."></textarea>
                        <input id="post-img-url" placeholder="Ссылка на фото (URL)">
                        <button class="btn-main" onclick="publishPost()">Опубликовать</button>
                    </div>
                    <div id="feed-items"></div>
                </div>

                <div id="tab-search" class="hidden">
                    <h2>Поиск по юзернейму</h2>
                    <input oninput="runSearch(this.value)" placeholder="Начни писать @username...">
                    <div id="search-list"></div>
                </div>

                <div id="tab-chats" class="hidden">
                    <div id="chats-list"><h2>Сообщения</h2><div id="active-dialogs"></div></div>
                    <div id="chat-box" class="hidden">
                        <button onclick="closeChat()">← Назад</button>
                        <h3 id="chat-title">Чат</h3>
                        <div id="msg-history" style="height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; display: flex; flex-direction: column;"></div>
                        <input id="msg-input" placeholder="Сообщение...">
                        <button class="btn-main" onclick="sendMsg()">Отправить</button>
                    </div>
                </div>

                <div id="tab-profile" class="hidden">
                    <div class="profile-header">
                        <img id="my-ava" class="profile-avatar" src="https://via.placeholder.com/80">
                        <h3 id="my-name">Имя</h3>
                        <p id="my-handle" style="color: var(--gray);">@username</p>
                    </div>
                    <div class="stats-row">
                        <div class="stat-btn"><b id="s-p">0</b>посты</div>
                        <div class="stat-btn" onclick="alert('Список подписчиков')"><b id="s-subers">0</b>подписчики</div>
                        <div class="stat-btn" onclick="alert('Список подписок')"><b id="s-subing">0</b>подписки</div>
                    </div>
                    <button class="btn-main" onclick="showTab('settings')">Изменить профиль</button>
                    <div id="my-posts" style="margin-top: 20px;"></div>
                </div>

                <div id="tab-settings" class="hidden">
                    <h2>Настройки</h2>
                    <input id="set-name" placeholder="Новый никнейм">
                    <input id="set-ava" placeholder="Ссылка на новую аватарку">
                    <button class="btn-main" onclick="saveSettings()">Сохранить изменения</button>
                    <button class="btn-main" style="background: red;" onclick="logout()">Выйти из аккаунта</button>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
