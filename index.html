<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASTA - PERFECTION FIXED</title>
    <link rel="icon" href="data:image/x-icon;base64,">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        :root {
            --primary: #007aff;
            --bg-body: #f0f2f5;
            --bg-card: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #1a1a1a;
        }

        [data-theme="dark"] {
            --bg-body: #080808;
            --bg-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        /* МЯГКИЕ АНИМАЦИИ */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg-body); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; display: flex; }

        .nav-side {
            position: fixed; left: 0; top: 0; width: 80px; height: 100vh;
            background: var(--bg-card); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px;
            transition: all 0.3s ease;
        }
        
        .main-wrapper { flex: 1; display: flex; justify-content: center; padding-left: 80px; transition: 0.3s; }
        .app-shell { width: 100%; max-width: 680px; padding: 20px; }
        
        @media (max-width: 700px) {
            .nav-side { top: auto; bottom: 0; width: 100%; height: 70px; flex-direction: row; justify-content: space-around; border-right: none; border-top: 1px solid var(--glass-border); padding: 0; }
            .main-wrapper { padding-left: 0; padding-bottom: 70px; }
        }

        .glass { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); transition: all 0.3s ease; }
        .hidden { display: none !important; }

        .nav-item { cursor: pointer; color: var(--text); opacity: 0.4; transition: all 0.3s ease; padding: 12px; border-radius: 15px; }
        .nav-item.active { opacity: 1; color: var(--primary); background: rgba(128,128,128,0.1); transform: scale(1.05); }
        .nav-item svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; }

        .post { margin-bottom: 25px; overflow: hidden; position: relative; }
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .p-ava { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: var(--bg-card); }
        .post-meta { display: flex; flex-direction: column; }
        .post-time { font-size: 11px; opacity: 0.5; margin-top: 2px; }
        .post-del { position: absolute; right: 15px; top: 20px; background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.2s; color: var(--text); }
        .post-del:hover { opacity: 1; color: #ff3b30; }

        /* КАРУСЕЛЬ МЕДИА ИНСТАГРАМ */
        .media-box { width: 100%; background: #000; position: relative; }
        .media-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        .media-carousel::-webkit-scrollbar { display: none; }
        .carousel-item { flex: 0 0 100%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; max-height: 550px; }
        .carousel-item img, .carousel-item video { max-width: 100%; max-height: 550px; object-fit: contain; display: block; }
        .carousel-dots { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 10; pointer-events: none; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.2); }

        .post-act { padding: 15px; display: flex; gap: 20px; border-bottom: 1px solid var(--glass-border); }
        .act-btn { background: none; border: none; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .act-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; transition: all 0.2s; }
        .act-btn.liked { color: var(--primary); }
        .act-btn.liked svg { fill: var(--primary); transform: scale(1.1); }

        .comments-section { padding: 15px; font-size: 14px; }
        .comment-item { margin-bottom: 8px; background: rgba(128,128,128,0.1); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--glass-border); color: var(--text); animation: fadeIn 0.3s ease; }
        
        .p-banner { width: 100%; height: 160px; background-color: var(--primary); background-size: cover; background-position: center; border-radius: 20px 20px 0 0; transition: background 0.3s; }
        .p-ava-main { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--primary); margin-top: -50px; object-fit: cover; background: var(--bg-card); position: relative; z-index: 2; }
        
        /* КАСТОМНЫЙ АУДИО ПЛЕЕР */
        .custom-audio { width: 90%; margin: 15px auto; padding: 10px 15px; background: rgba(128,128,128,0.1); border-radius: 20px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--glass-border); }
        .audio-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .audio-btn:active { transform: scale(0.9); }
        .audio-track { flex: 1; height: 4px; background: rgba(128,128,128,0.3); border-radius: 2px; position: relative; overflow: hidden; cursor: pointer; }
        .audio-progress { position: absolute; left: 0; top: 0; height: 100%; background: var(--primary); width: 0%; transition: width 0.1s linear; }

        .p-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .grid-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--bg-card); position: relative; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.2s; }
        .grid-item:hover { transform: scale(0.98); opacity: 0.8; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        #chat-window { position: fixed; inset: 0; background: var(--bg-body); z-index: 2000; display: none; flex-direction: column; animation: fadeIn 0.3s; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-size: cover; background-position: center; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; backdrop-filter: blur(5px); display: flex; flex-direction: column; color: #fff; animation: fadeIn 0.2s ease forwards; }
        .msg-time { font-size: 10px; opacity: 0.8; margin-top: 4px; text-align: right; }
        .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: rgba(128,128,128,0.5); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; color: var(--text); }

        input:not([type="file"], [type="range"]), textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--bg-card); color: var(--text); outline: none; margin-bottom: 12px; transition: all 0.3s ease; }
        input:focus, textarea:focus { border-color: var(--primary); }
        ::placeholder { color: var(--text); opacity: 0.5; }
        
        .btn-main { background: var(--primary); color: #ffffff; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: all 0.2s; text-align: center; }
        .btn-main:active { transform: scale(0.96); }
        .btn-sec { background: var(--bg-card); color: var(--text); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: all 0.2s; text-align: center; margin-bottom: 10px; }
        .btn-sec:active { transform: scale(0.96); }
        
        /* ИСТОРИИ */
        .story-ring { padding: 3px; border-radius: 50%; width: 68px; height: 68px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; border: 3px solid var(--primary); }
        .story-ring.viewed { border-color: #8e8e93; } 
        .story-ring img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid var(--bg-card); background: var(--bg-card); }
        
        #story-viewer { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.2s; }
        .sv-media { max-width: 100%; max-height: 80vh; object-fit: contain; }
        
        .story-tap-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 3001; }
        #tap-left { left: 0; }
        #tap-right { right: 0; }

        #sv-caption { position: absolute; bottom: 40px; width: 90%; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; text-align: center; color: #fff; font-size: 16px; backdrop-filter: blur(10px); z-index: 3002; }
        #sv-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; z-index: 3003; }
        #sv-author { position: absolute; top: 25px; left: 20px; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 10px; z-index: 3002; }
        .story-progress { position: absolute; top: 10px; left: 10px; right: 10px; height: 3px; background: rgba(255,255,255,0.3); z-index: 3002; border-radius: 3px; display: flex; gap: 4px; }
        .story-progress-bar { flex: 1; height: 100%; background: rgba(255,255,255,0.4); border-radius: 3px; overflow: hidden; }
        .story-progress-fill { width: 0%; height: 100%; background: #fff; transition: width linear; }

        #archive-modal { position: fixed; inset: 0; background: var(--bg-body); z-index: 2500; display: none; flex-direction: column; animation: fadeIn 0.3s; }
        .archive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; overflow-y: auto; }
        .arch-item { position: relative; border-radius: 15px; overflow: hidden; height: 250px; background: #222; }
        .arch-item img, .arch-item video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .arch-del { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); color: white; border: none; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .loading-text { text-align: center; padding: 30px; opacity: 0.6; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--glass-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .checkmarks { display: inline-flex; align-items: center; margin-left: 6px; color: rgba(255,255,255,0.6); }
        .checkmarks.read { color: #4ade80; }
        .check-tick { opacity: 0; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .check-tick:nth-child(2) { animation-delay: 0.15s; margin-left: -8px; }
        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>

<script>
    window.API = "https://kasta-l49s.onrender.com";
    window.token = localStorage.getItem('token');
    window.me = localStorage.getItem('me');
    window.curChat = "";
    window.myPosts = [];
    window.storyTimeout = null;
    window.storyQueue = [];
    window.storyQueueIndex = 0;

    window.setSafeData = function(key, val) {
        try { localStorage.setItem(key, val); return true; }
        catch(e) { alert("Файл слишком большой. Выбери файл поменьше."); return false; }
    };

    window.sec = function(u) { if (!u) return ''; if (u.startsWith('http://')) return u.replace('http://', 'https://'); return u; };
    window.isVid = function(u) { return u && (u.includes('.mp4') || u.includes('.webm') || u.startsWith('data:video')); };
    
    window.getAva = function(n) {
        const local = localStorage.getItem('k_ava_' + n);
        return local ? local : 'https://ui-avatars.com/api/?name=' + n + '&background=random&color=fff&size=128';
    };
    
    window.formatTime = function(d) {
        const date = new Date(d);
        return date.toLocaleString('ru-RU', {hour: '2-digit', minute:'2-digit', day:'numeric', month:'short'});
    };

    // Надежный перехват ошибок CORS и падений
    window.call = async function(p, m='GET', b=null) {
        try {
            const r = await fetch(window.API + p, { 
                method: m, 
                headers: { 'Authorization': 'Bearer ' + window.token, 'Content-Type': 'application/json' }, 
                body: b ? JSON.stringify(b) : null 
            });
            if (!r.ok) return { error: true, status: r.status };
            if (m === 'DELETE') return { success: true };
            
            const text = await r.text();
            try { return text ? JSON.parse(text) : { success: true }; } 
            catch(e) { return { success: true, text: text }; }
        } catch(e) { 
            console.error("Fetch error/CORS:", e);
            return { error: true, message: "Ошибка соединения с сервером (CORS или сервер спит)." }; 
        }
    };

    window.doAuth = async function(t) {
        document.getElementById('auth-loader').classList.remove('hidden');
        const u = document.getElementById('login-u').value;
        const p = document.getElementById('login-p').value;
        const d = await window.call('/' + t, 'POST', {username:u, password:p});
        document.getElementById('auth-loader').classList.add('hidden');
        if(d && !d.error && d.token) { 
            localStorage.setItem('token', d.token); 
            localStorage.setItem('me', d.username); 
            location.reload(); 
        } else {
            alert(d ? (d.message || "Ошибка авторизации") : "Сервер недоступен");
        }
    };

    window.switchTab = function(id, e) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(e && e.currentTarget) e.currentTarget.classList.add('active');
        document.querySelectorAll('#scr-app > div').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + id).classList.remove('hidden');
        if(id === 'feed') window.loadFeed();
        if(id === 'chats') window.loadChats();
        if(id === 'profile') window.loadProfile();
    };

    // ГЕНЕРАТОР ПОСТА
    window.renderPostHtml = function(p) {
        const safeAva = window.sec(window.getAva(p.author));
        const timeStr = p.createdAt ? window.formatTime(p.createdAt) : window.formatTime(Date.now());
        const delBtn = p.author === window.me ? `<button class="post-del" onclick="window.delPost('${p._id}')">🗑</button>` : '';
        
        let mediaHtml = '';
        if (p.imageUrl) {
            let mediaArr = [];
            try {
                let parsed = JSON.parse(p.imageUrl);
                if(Array.isArray(parsed)) mediaArr = parsed; else mediaArr = [p.imageUrl];
            } catch(e) { mediaArr = [p.imageUrl]; }

            if (mediaArr.length === 1) {
                mediaHtml = `<div class="media-box">${window.isVid(mediaArr[0]) ? `<video src="${window.sec(mediaArr[0])}" controls></video>` : `<img src="${window.sec(mediaArr[0])}">`}</div>`;
            } else if (mediaArr.length > 1) {
                let dots = mediaArr.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
                mediaHtml = `
                <div class="media-box" onscroll="window.updateDots(this)">
                    <div class="media-carousel">
                        ${mediaArr.map(m => `<div class="carousel-item">${window.isVid(m) ? `<video src="${window.sec(m)}" controls></video>` : `<img src="${window.sec(m)}">`}</div>`).join('')}
                    </div>
                    <div class="carousel-dots">${dots}</div>
                </div>`;
            }
        }

        const commentsHtml = (p.comments || []).map(c => `<div class="comment-item"><b>${c.author}:</b> ${c.text}</div>`).join('');
        const likesCount = (p.likes || []).length;
        const commsCount = (p.comments || []).length;
        const isLiked = p.likes && p.likes.includes(window.me);

        return `
        <div class="glass post fade-in" id="post-${p._id}">
            ${delBtn}
            <div class="post-h">
                <img src="${safeAva}" class="p-ava">
                <div class="post-meta">
                    <b>${p.author}</b>
                    <span class="post-time">${timeStr}</span>
                </div>
            </div>
            ${mediaHtml}
            <div class="post-act">
                <button class="act-btn ${isLiked?'liked':''}" onclick="window.like('${p._id}', this)">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span class="l-count">${likesCount}</span>
                </button>
                <button class="act-btn" onclick="document.getElementById('comm-in-${p._id}').focus()">
                    <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    <span class="c-count">${commsCount}</span>
                </button>
            </div>
            <div class="comments-section">
                <p style="margin-bottom: 10px; font-size: 15px; color: var(--text);">${p.text || ''}</p>
                <div id="c-list-${p._id}" style="margin-bottom: 10px;">${commentsHtml}</div>
                <div style="display:flex; gap:10px; width: 100%;">
                    <input id="comm-in-${p._id}" placeholder="Комментарий..." style="flex: 1; margin:0; padding:10px;">
                    <button class="btn-main" style="width:60px; padding:0; height: 40px;" onclick="window.addComm('${p._id}', this)">ОК</button>
                </div>
            </div>
        </div>`;
    };

    window.updateDots = function(el) {
        const carousel = el.querySelector('.media-carousel');
        const dots = el.querySelectorAll('.dot');
        const index = Math.round(carousel.scrollLeft / carousel.offsetWidth);
        dots.forEach((d, i) => { if(i===index) d.classList.add('active'); else d.classList.remove('active'); });
    };

    window.loadFeed = async function() {
        const container = document.getElementById('feed-cont');
        if(container.innerHTML === "") container.innerHTML = `<div class="loading-text"><div class="spinner"></div>Загрузка постов...<br><span style="font-size:10px; opacity:0.6;">(Если сервер спит, жди до 2 мин)</span></div>`;
        
        const d = await window.call('/posts');
        if(!d || d.error || !Array.isArray(d)) {
            container.innerHTML = `<div class="loading-text">Не удалось загрузить ленту (CORS / Сервер спит).<br><span style="font-size:10px; opacity:0.6;">(Подробности: ${d?d.message:'Нет ответа'})</span></div>`;
            return;
        }
        
        const now = Date.now();
        const activePosts = [...d].filter(p => (now - (p.createdAt ? new Date(p.createdAt).getTime() : now)) < 172800000);
        const sortedPosts = activePosts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        container.innerHTML = sortedPosts.length === 0 ? "<p style='text-align:center; opacity:0.5;'>Нет постов за последние 48 часов</p>" : sortedPosts.map(window.renderPostHtml).join('');
        window.loadStories();
    };

    window.createPost = async function() {
        const textInp = document.getElementById('post-text');
        const mediaInp = document.getElementById('post-media');
        const text = textInp.value;
        const files = mediaInp.files;
        
        if(!text && files.length === 0) return;
        
        const btn = document.getElementById('pub-btn');
        btn.innerText = "ЗАГРУЗКА...";
        btn.disabled = true;

        let mediaData = null;
        if(files.length > 0) {
            let b64Arr = [];
            for(let i=0; i<Math.min(files.length, 5); i++) { b64Arr.push(await window.pack(files[i])); }
            mediaData = b64Arr.length > 1 ? JSON.stringify(b64Arr) : b64Arr[0];
        }

        await window.call('/posts', 'POST', { text: text, imageUrl: mediaData });
        
        textInp.value = "";
        mediaInp.value = "";
        btn.innerText = "ОПУБЛИКОВАТЬ";
        btn.disabled = false;
        
        window.loadProfile(); window.loadFeed();
    };

    window.delPost = async function(id) {
        if(!confirm("Удалить пост?")) return;
        await window.call('/posts/' + id, 'DELETE');
        window.loadFeed(); window.loadProfile();
    };

    window.loadStories = async function() {
        const local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        const viewed = JSON.parse(localStorage.getItem('k_viewed_stories') || '[]');
        const list = document.getElementById('st-list');
        list.innerHTML = "";
        
        const now = Date.now();
        const activeStories = local.filter(s => now - s.id < 86400000); 
        
        const byAuthor = {};
        activeStories.forEach(s => {
            if(!byAuthor[s.author]) byAuthor[s.author] = [];
            byAuthor[s.author].push(s);
        });

        Object.keys(byAuthor).forEach(author => {
            const authorStories = byAuthor[author];
            const allViewed = authorStories.every(s => viewed.includes(s.id));
            const safeAva = window.sec(window.getAva(author));
            
            list.innerHTML += `
            <div class="story-ring ${allViewed ? 'viewed' : ''}" onclick="window.startStoryQueue('${author}')">
                <img src="${safeAva}">
            </div>`;
        });
    };

    window.uploadSt = async function(el) {
        const f = el.files[0]; if(!f) return;
        const img = await window.pack(f);
        const caption = prompt("Подпись (необязательно):");
        const local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        local.push({ id: Date.now(), author: window.me, imageUrl: img, caption: caption });
        window.setSafeData('local_stories', JSON.stringify(local));
        window.loadFeed();
    };

    window.startStoryQueue = function(author) {
        const local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        const now = Date.now();
        window.storyQueue = local.filter(s => s.author === author && (now - s.id < 86400000));
        window.storyQueueIndex = 0;
        
        if(window.storyQueue.length > 0) {
            document.getElementById('story-viewer').style.display = 'flex';
            window.playCurrentStory();
        }
    };

    window.playCurrentStory = function() {
        clearTimeout(window.storyTimeout);
        const vidEl = document.getElementById('sv-vid');
        vidEl.pause(); vidEl.onended = null;
        
        if(window.storyQueueIndex >= window.storyQueue.length) {
            window.closeStory(); return;
        }
        if(window.storyQueueIndex < 0) window.storyQueueIndex = 0;
        
        const s = window.storyQueue[window.storyQueueIndex];
        
        let viewed = JSON.parse(localStorage.getItem('k_viewed_stories') || '[]');
        if(!viewed.includes(s.id)) { viewed.push(s.id); localStorage.setItem('k_viewed_stories', JSON.stringify(viewed)); }
        
        const imgEl = document.getElementById('sv-img');
        const capEl = document.getElementById('sv-caption');
        const progEl = document.getElementById('sv-progress');
        
        imgEl.classList.add('hidden'); vidEl.classList.add('hidden');
        
        progEl.innerHTML = window.storyQueue.map((_, i) => `
            <div class="story-progress-bar">
                <div class="story-progress-fill" style="width: ${i < window.storyQueueIndex ? '100%' : '0%'}"></div>
            </div>
        `).join('');

        if (!window.isVid(s.imageUrl)) {
            setTimeout(() => {
                const currentFill = progEl.children[window.storyQueueIndex].querySelector('.story-progress-fill');
                if(currentFill) { currentFill.style.transition = 'width 15s linear'; currentFill.style.width = '100%'; }
            }, 50);
        }

        if (window.isVid(s.imageUrl)) { 
            vidEl.src = window.sec(s.imageUrl); vidEl.classList.remove('hidden'); 
            vidEl.play().catch(e=>console.log(e)); vidEl.onended = window.playNextStory;
        } else { 
            imgEl.src = window.sec(s.imageUrl); imgEl.classList.remove('hidden'); 
            window.storyTimeout = setTimeout(window.playNextStory, 15000);
        }
        
        if(s.caption && s.caption !== "null") { capEl.innerText = s.caption; capEl.classList.remove('hidden'); } else capEl.classList.add('hidden');
        document.getElementById('sv-author').innerHTML = `<img src="${window.sec(window.getAva(s.author))}" style="width:35px; height:35px; object-fit:cover; border-radius:50%; border:2px solid var(--primary)"> ${s.author}`;
    };

    window.playNextStory = function() { window.storyQueueIndex++; window.playCurrentStory(); };
    window.playPrevStory = function() { window.storyQueueIndex--; window.playCurrentStory(); };

    window.closeStory = function() {
        clearTimeout(window.storyTimeout);
        document.getElementById('story-viewer').style.display='none'; 
        document.getElementById('sv-vid').pause();
        window.loadStories();
    };

    window.openArchive = function() {
        const grid = document.getElementById('archive-grid');
        const local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        const myStories = local.filter(s => s.author === window.me).reverse();
        grid.innerHTML = myStories.length === 0 ? "<p style='padding: 20px; opacity: 0.5; color: var(--text);'>Пусто</p>" : myStories.map(s => `
            <div class="arch-item fade-in">
                ${window.isVid(s.imageUrl) ? `<video src="${s.imageUrl}"></video>` : `<img src="${s.imageUrl}">`}
                <button class="arch-del" onclick="window.delStory(${s.id})">УДАЛИТЬ</button>
            </div>
        `).join('');
        document.getElementById('archive-modal').style.display = 'flex';
    };

    window.delStory = function(id) {
        let local = JSON.parse(localStorage.getItem('local_stories') || '[]');
        window.setSafeData('local_stories', JSON.stringify(local.filter(s => s.id !== id)));
        window.openArchive(); window.loadFeed();
    };

    window.addComm = function(id, btnEl) { 
        const inp = document.getElementById('comm-in-'+id); 
        const text = inp.value;
        if(!text) return; 
        
        const list = document.getElementById('c-list-'+id);
        list.innerHTML += `<div class="comment-item fade-in"><b>${window.me}:</b> ${text}</div>`;
        inp.value = "";
        
        const postDiv = document.getElementById('post-'+id);
        const cCount = postDiv.querySelector('.c-count');
        if(cCount) cCount.innerText = parseInt(cCount.innerText) + 1;

        window.call('/posts/'+id+'/comment', 'POST', {text: text}); 
    };

    window.like = function(id, btn) { 
        const isLiked = btn.classList.contains('liked');
        const span = btn.querySelector('.l-count');
        let count = parseInt(span.innerText);
        
        if (isLiked) { btn.classList.remove('liked'); span.innerText = count - 1; } 
        else { btn.classList.add('liked'); span.innerText = count + 1; }
        
        window.call('/posts/'+id+'/like', 'POST'); 
    };

    window.loadProfile = async function() {
        if(document.getElementById('p-card').innerHTML === "") {
            document.getElementById('p-card').innerHTML = `<div class="loading-text"><div class="spinner"></div>Загрузка...</div>`;
        }
        
        const u = await window.call('/users/profile/' + window.me);
        if(!u || u.error) return;
        
        const banner = localStorage.getItem('k_banner_' + window.me) || '';
        const audio = localStorage.getItem('k_audio_' + window.me);
        const bio = localStorage.getItem('k_bio_' + window.me) || '';
        // ВАЖНО: Аватарку теперь достаем из backend, если он ее отдает, иначе берем локальную/генерацию
        const safeAva = window.sec(u.avatarUrl || window.getAva(window.me)); 
        
        let audioHtml = '';
        if(audio) {
            audioHtml = `
            <div class="custom-audio" onclick="event.stopPropagation()">
                <button id="profile-audio-btn" class="audio-btn" onclick="window.toggleProfileAudio()">▶</button>
                <div class="audio-track" onclick="window.seekProfileAudio(event)">
                    <div id="profile-audio-prog" class="audio-progress"></div>
                </div>
                <audio id="profile-audio-el" src="${audio}" ontimeupdate="window.updateAudioProg()" onended="window.resetAudio()"></audio>
            </div>`;
        }
        
        document.getElementById('p-card').innerHTML = `
            <div class="p-banner" style="background-image: ${banner ? `url(${banner})` : 'none'}"></div>
            <img src="${safeAva}" class="p-ava-main">
            <h2 style="margin-top:10px; color: var(--text);">${u.displayName || window.me}</h2>
            <p style="opacity:0.5; margin-bottom: 5px; color: var(--text);">@${window.me}</p>
            ${audioHtml}
        `;

        const bioCard = document.getElementById('p-bio-card');
        if (bio) { bioCard.innerHTML = `<b>Обо мне:</b><br><span style="opacity:0.8;">${bio}</span>`; bioCard.classList.remove('hidden'); }
        else { bioCard.classList.add('hidden'); }
        
        window.myPosts = u.posts || [];
        const sortedMyPosts = window.myPosts.sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0));
        
        const mediaPosts = sortedMyPosts.filter(p => p.imageUrl);
        document.getElementById('p-grid').innerHTML = mediaPosts.length === 0 ? "<p style='grid-column: span 3; text-align: center; opacity: 0.5; padding: 20px; color: var(--text);'>Нет фото</p>" : mediaPosts.map(p => {
            let firstImg = p.imageUrl;
            try { let parsed = JSON.parse(p.imageUrl); if(Array.isArray(parsed)) firstImg = parsed[0]; } catch(e){}
            return `<div class="grid-item">${window.isVid(firstImg) ? `<video src="${window.sec(firstImg)}"></video>` : `<img src="${window.sec(firstImg)}">`}</div>`;
        }).join('');

        document.getElementById('p-feed-cont').innerHTML = sortedMyPosts.length === 0 ? "<p style='text-align: center; opacity: 0.5;'>Нет постов</p>" : sortedMyPosts.map(window.renderPostHtml).join('');
    };

    window.toggleProfileAudio = function() {
        const audio = document.getElementById('profile-audio-el');
        const btn = document.getElementById('profile-audio-btn');
        if(audio.paused) { audio.play(); btn.innerText = '⏸'; }
        else { audio.pause(); btn.innerText = '▶'; }
    };
    window.updateAudioProg = function() {
        const audio = document.getElementById('profile-audio-el');
        const prog = document.getElementById('profile-audio-prog');
        if(audio.duration) { prog.style.width = (audio.currentTime / audio.duration * 100) + '%'; }
    };
    window.seekProfileAudio = function(e) {
        const audio = document.getElementById('profile-audio-el');
        const track = e.currentTarget;
        const rect = track.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        if(audio.duration) audio.currentTime = pct * audio.duration;
    };
    window.resetAudio = function() {
        const btn = document.getElementById('profile-audio-btn');
        const prog = document.getElementById('profile-audio-prog');
        btn.innerText = '▶'; prog.style.width = '0%';
    };

    window.loadChats = async function() {
        const listEl = document.getElementById('chats-list');
        if(listEl.innerHTML === "") listEl.innerHTML = `<div class="loading-text"><div class="spinner"></div>Поиск чатов...</div>`;
        const d = await window.call('/chats');
        if(!d || !d.users) { listEl.innerHTML = `<div class="loading-text">Пусто</div>`; return; }
        
        const chats = d.users.map(u => ({ ...u, lastTime: parseInt(localStorage.getItem('k_chat_last_time_' + u.username) || '0') }));
        chats.sort((a, b) => b.lastTime - a.lastTime);

        listEl.innerHTML = chats.map(u => `
            <div class="glass fade-in" onclick="window.openChat('${u.username}')" style="padding:15px; margin-bottom:10px; display:flex; align-items:center; gap:15px; cursor:pointer; transition:0.2s;">
                <img src="${window.sec(window.getAva(u.username))}" style="width:40px; height:40px; object-fit:cover; border-radius:50%; background: var(--bg-card);">
                <b style="color: var(--text);">${u.username}</b>
            </div>
        `).join('');
    };

    window.getCheckmarks = function(isMe, msgTime) {
        if(!isMe) return '';
        const isRead = (Date.now() - new Date(msgTime).getTime()) > 3000; 
        const tickSvg = `<svg class="check-tick" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        return `<span class="checkmarks ${isRead ? 'read' : ''}">${isRead ? tickSvg+tickSvg : tickSvg}</span>`;
    };

    window.openChat = async function(n) {
        window.curChat = n; 
        document.getElementById('chat-user').innerText = n;
        document.getElementById('chat-window').style.display = 'flex';
        
        const box = document.getElementById('chat-msgs');
        const wall = localStorage.getItem('k_wall');
        if (wall) box.style.backgroundImage = `url(${wall})`;
        else box.style.background = `linear-gradient(135deg, var(--bg-body), rgba(0, 122, 255, 0.1))`;

        box.innerHTML = `<div class="loading-text"><div class="spinner"></div>Загрузка переписки...</div>`;
        
        // Фоновый запрос
        const m = await window.call('/messages/' + n);
        localStorage.setItem('k_chat_last_time_' + n, Date.now());

        if(Array.isArray(m)) {
            box.innerHTML = m.map(msg => {
                const t = msg.createdAt || Date.now();
                return `<div class="msg ${msg.sender === window.me ? 'me' : 'them'}">
                            ${msg.text} 
                            <div style="display:flex; justify-content:flex-end; align-items:center; margin-top:4px;">
                                <span class="msg-time" style="margin:0;">${window.formatTime(t)}</span>${window.getCheckmarks(msg.sender === window.me, t)}
                            </div>
                        </div>`;
            }).join('');
        } else { box.innerHTML = ''; }
        box.scrollTop = box.scrollHeight;
    };

    window.sendMsg = async function() { 
        const i = document.getElementById('chat-in'); 
        const text = i.value;
        if(!text) return; 

        localStorage.setItem('k_chat_last_time_' + window.curChat, Date.now());
        i.value = ""; 
        const box = document.getElementById('chat-msgs');
        const t = Date.now();

        // Оптимистичный UI
        box.innerHTML += `<div class="msg me" style="opacity: 0.9;">
                            ${text} 
                            <div style="display:flex; justify-content:flex-end; align-items:center; margin-top:4px;">
                                <span class="msg-time" style="margin:0;">${window.formatTime(t)}</span>${window.getCheckmarks(true, t)}
                            </div>
                          </div>`;
        box.scrollTop = box.scrollHeight;

        await window.call('/messages', 'POST', {recipient: window.curChat, receiver: window.curChat, text: text}); 
        
        // Фоновое обновление (чтобы галочки перекрасились в прочитанные)
        setTimeout(async () => {
            if(document.getElementById('chat-window').style.display === 'flex' && window.curChat) {
                const m = await window.call('/messages/' + window.curChat);
                if(Array.isArray(m)) {
                    box.innerHTML = m.map(msg => {
                        const msgTime = msg.createdAt || Date.now();
                        return `<div class="msg ${msg.sender === window.me ? 'me' : 'them'}">
                                    ${msg.text} 
                                    <div style="display:flex; justify-content:flex-end; align-items:center; margin-top:4px;">
                                        <span class="msg-time" style="margin:0;">${window.formatTime(msgTime)}</span>${window.getCheckmarks(msg.sender === window.me, msgTime)}
                                    </div>
                                </div>`;
                    }).join('');
                    box.scrollTop = box.scrollHeight;
                }
            }
        }, 3500); 
    };

    window.saveLocalFile = async function(el, type) {
        const f = el.files[0]; if(!f) return;
        const b64 = await window.pack(f);
        if(type === 'ava') {
            window.setSafeData('k_ava_' + window.me, b64);
            // Пытаемся отправить и на сервер, чтобы другие видели
            window.call('/users/update', 'POST', { avatarUrl: b64 }).catch(()=>{});
        }
        if(type === 'banner') {
            window.setSafeData('k_banner_' + window.me, b64);
            window.call('/users/update', 'POST', { bannerUrl: b64 }).catch(()=>{});
        }
        if(type === 'audio') window.setSafeData('k_audio_' + window.me, b64);
        if(type === 'wall') window.setSafeData('k_wall', b64);
        alert("Обновлено!");
        window.loadProfile();
    };

    window.saveSettings = async function() {
        const nick = document.getElementById('set-nick').value;
        const bio = document.getElementById('set-bio').value;
        
        if(nick) await window.call('/users/update', 'POST', {displayName: nick});
        if(bio) localStorage.setItem('k_bio_' + window.me, bio);
        
        alert("Сохранено!"); 
        window.switchTab('profile');
    };

    window.setAccent = function(c) { document.documentElement.style.setProperty('--primary', c); localStorage.setItem('k_accent', c); window.loadStories(); };
    window.toggleTheme = function() { 
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; 
        document.body.setAttribute('data-theme', next); localStorage.setItem('k_theme', next); 
    };
    
    window.pack = function(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = e => r(e.target.result); }); };
    window.logOut = function() { localStorage.clear(); location.reload(); };

    // СТАРТ ПРИЛОЖЕНИЯ
    if(window.token) { 
        document.getElementById('scr-auth').classList.add('hidden'); 
        document.getElementById('scr-app').classList.remove('hidden'); 
        window.switchTab('feed'); 
    }
    window.setAccent(localStorage.getItem('k_accent') || '#007aff');
    document.body.setAttribute('data-theme', localStorage.getItem('k_theme') || 'light');
</script>
</body>
</html>
