<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta</title>
    <style>
        :root { 
            --accent: #0095f6; 
            --bg: #fafafa; 
            --border: #dbdbdb; 
            --sidebar: #ffffff; 
            --text: #262626; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .hidden { display: none !important; }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar { 
            width: 70px; 
            background: var(--sidebar); 
            border-right: 1px solid var(--border); 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            padding: 20px 0; 
            white-space: nowrap; 
            overflow: hidden;
            z-index: 1000;
        }
        .sidebar:hover { width: 250px; }
        
        .sidebar-header { 
            padding: 0 20px; 
            margin-bottom: 30px; 
            font-weight: bold; 
            font-size: 20px; 
            color: var(--accent); 
        }

        .sidebar-user { 
            display: flex; 
            align-items: center; 
            padding: 10px 15px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 20px; 
            cursor: pointer;
        }
        .sidebar-user img { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin-right: 15px; 
            background: #eee; 
        }
        .sidebar-user-info { display: flex; flex-direction: column; }

        .nav-item { 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.2s; 
            color: var(--text); 
        }
        .nav-item:hover { background: #f0f0f0; }
        .nav-icon { font-size: 24px; min-width: 30px; text-align: center; }
        .nav-text { margin-left: 15px; font-weight: 500; opacity: 0; transition: opacity 0.2s; }
        .sidebar:hover .nav-text { opacity: 1; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }

        /* СТИЛИ ЧАТА */
        #messages-container { 
            height: 400px; 
            overflow-y: auto; 
            border: 1px solid var(--border); 
            padding: 15px; 
            border-radius: 12px; 
            background: white; 
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: white; }
        .msg.received { align-self: flex-start; background: #eee; color: black; }

        /* КНОПКИ И ПОЛЯ */
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }

        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100% !important; 
                height: 60px; 
                flex-direction: row; 
                justify-content: space-around; 
                padding: 0; 
                border-right: none; 
                border-top: 1px solid var(--border); 
                position: fixed; 
                bottom: 0; 
                background: var(--sidebar); 
            }
            .sidebar-header, .sidebar-user, .nav-text { display: none !important; }
            .nav-item { padding: 10px; flex: 1; justify-content: center; }
            .main-content { padding-bottom: 70px; height: calc(100vh - 60px); }
        }
    </style>
</head>
<body>

    <aside class="sidebar hidden" id="app-sidebar">
        <div class="sidebar-header">YOUR PANEL</div>
        
        <div class="sidebar-user" onclick="showTab('profile')">
            <img id="nav-avatar" src="https://via.placeholder.com/40" alt="Avatar">
            <div class="sidebar-user-info">
                <b id="nav-display-name">Имя</b>
                <small id="nav-username">@username</small>
            </div>
        </div>

        <div class="nav-item" onclick="showTab('feed')">
            <span class="nav-icon">🏠</span><span class="nav-text">Дом</span>
        </div>
        <div class="nav-item" onclick="showTab('chats')">
            <span class="nav-icon">💬</span><span class="nav-text">Мои чаты</span>
        </div>
        <div class="nav-item" onclick="showTab('friends')">
            <span class="nav-icon">👥</span><span class="nav-text">Друзья</span>
        </div>
        <div class="nav-item" onclick="showTab('settings')">
            <span class="nav-icon">⚙️</span><span class="nav-text">Настройки</span>
        </div>
        <div class="nav-item" onclick="logout()" style="color: red; margin-top: auto;">
            <span class="nav-icon">🚪</span><span class="nav-text">Выйти</span>
        </div>
    </aside>

    <main class="main-content">
        <div class="container">
            
            <div id="auth-screen">
                <div style="text-align: center; margin-top: 50px; background: white; padding: 40px; border-radius: 20px; border: 1px solid var(--border);">
                    <h2 id="auth-title">Вход в Kasta</h2>
                    <input type="text" id="login-username" placeholder="Юзернейм">
                    <input type="password" id="login-password" placeholder="Пароль">
                    <button id="auth-submit-btn" class="btn-main" onclick="authUser('login')">Войти</button>
                    <p style="font-size: 14px; margin-top: 20px;">
                        Нет аккаунта? <a href="javascript:void(0)" onclick="showRegister()">Зарегистрироваться</a>
                    </p>
                </div>
            </div>

            <div id="main-screens" class="hidden">
                
                <div id="tab-feed">
                    <h2>Лента</h2>
                    <div id="all-posts"></div>
                </div>

                <div id="tab-chats" class="hidden">
                    <div id="chats-list-view">
                        <h2>Сообщения</h2>
                        <div id="active-chats-list"></div>
                    </div>

                    <div id="chat-window" class="hidden">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                            <button class="btn-outline" onclick="backToChatsList()">←</button>
                            <h3 id="chat-with-name" style="margin:0;">Чат</h3>
                        </div>
                        <div id="messages-container"></div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="chat-input" placeholder="Сообщение..." style="margin:0;">
                            <button onclick="sendMessage()" class="btn-main" style="width: auto;">Отправить</button>
                        </div>
                    </div>
                </div>

                <div id="tab-settings" class="hidden">
                    <h2>Настройки</h2>
                    <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
                        <h4>Язык</h4>
                        <select id="lang-select">
                            <option value="ru">Русский</option>
                            <option value="en">English</option>
                        </select>
                        <button class="btn-main" style="margin-top: 20px;">Сохранить</button>
                    </div>
                </div>

                <div id="tab-profile" class="hidden">
                    <h2>Мой профиль</h2>
                    <div id="profile-info"></div>
                </div>

            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
