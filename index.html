<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta</title>
    <style>
        /* ЭТОТ БЛОК ОТВЕЧАЕТ ЗА ТО, ЧТОБЫ НИЧЕГО НЕ ПЕРЕМЕШИВАЛОСЬ */
        .hidden { display: none !important; }
        
        body { font-family: sans-serif; background: #fafafa; margin: 0; display: flex; justify-content: center; }
        #auth-screen { background: white; border: 1px solid #dbdbdb; padding: 40px; margin-top: 50px; width: 350px; text-align: center; }
        #main-screen { width: 100%; max-width: 600px; padding: 20px; }
        nav { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px; position: sticky; top: 0; display: flex; justify-content: space-around; margin-bottom: 20px; }
        .post { background: white; border: 1px solid #dbdbdb; margin-bottom: 20px; padding: 15px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; border: 1px solid #dbdbdb; }
        button { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 id="auth-title">Kasta</h1>
        <div id="auth-inputs">
            <input type="text" id="username" placeholder="Логин">
            <input type="password" id="password" placeholder="Пароль">
            <button id="authBtn" onclick="authUser('login')">Войти</button>
        </div>
        <p id="toggleText" style="font-size: 14px; margin-top: 20px;">
            Нет аккаунта? <a href="#" onclick="switchAuth('reg')">Зарегистрироваться</a>
        </p>
        <p id="authMessage" style="color: red; font-size: 12px;"></p>
    </div>

    <div id="main-screen" class="hidden">
        <nav>
            <span onclick="showTab('feed')" style="cursor:pointer">🏠 Лента</span>
            <span onclick="showTab('search')" style="cursor:pointer">🔍 Поиск</span>
            <span onclick="showTab('profile')" style="cursor:pointer">👤 Профиль</span>
            <span onclick="logout()" style="cursor:pointer; color:red">🚪 Выйти</span>
        </nav>

        <div id="tab-feed">
            <form id="postForm">
                <textarea id="postText" placeholder="Что нового?"></textarea>
                <input type="file" id="postFile">
                <button type="submit">Опубликовать</button>
            </form>
            <div id="posts-container"></div>
        </div>

        <div id="tab-search" class="hidden">
            <input type="text" id="searchInput" oninput="searchUsers()" placeholder="Поиск людей...">
            <div id="searchResults"></div>
        </div>

        <div id="tab-profile" class="hidden">
            <h2 id="profile-name"></h2>
            <p>Это ваш личный уголок в Kasta.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
