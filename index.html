<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta</title>
    <style>
        :root { --accent: #0095f6; --bg: #fafafa; --border: #dbdbdb; --sidebar: #ffffff; --text: #262626; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* САЙДБАР */
        .sidebar { width: 70px; background: var(--sidebar); border-right: 1px solid var(--border); transition: 0.3s; display: flex; flex-direction: column; padding: 20px 0; white-space: nowrap; overflow: hidden; z-index: 1000; }
        .sidebar:hover { width: 250px; }
        .sidebar-header { padding: 0 20px; margin-bottom: 30px; font-weight: bold; font-size: 20px; color: var(--accent); }
        .sidebar-user { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--border); margin-bottom: 20px; cursor: pointer; }
        .sidebar-user img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { background: #f0f0f0; }
        .nav-icon { font-size: 24px; min-width: 30px; text-align: center; }
        .nav-text { margin-left: 15px; font-weight: 500; opacity: 0; transition: 0.2s; }
        .sidebar:hover .nav-text { opacity: 1; }

        /* КОНТЕНТ */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }

        /* ЧАТ */
        #messages-container { height: 400px; overflow-y: auto; border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: white; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: white; }
        .msg.received { align-self: flex-start; background: #eee; }

        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100% !important; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; position: fixed; bottom: 0; border-right: none; border-top: 1px solid var(--border); }
            .sidebar-header, .sidebar-user, .nav-text { display: none; }
            .main-content { padding-bottom: 70px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar hidden" id="app-sidebar">
        <div class="sidebar-header">YOUR PANEL</div>
        <div class="sidebar-user" onclick="showTab('profile')">
            <img id="nav-avatar" src="https://via.placeholder.com/40">
            <div class="sidebar-user-info"><b id="nav-display-name">...</b><br><small id="nav-username">@...</small></div>
        </div>
        <div class="nav-item" onclick="showTab('feed')"><span class="nav-icon">🏠</span><span class="nav-text">Дом</span></div>
        <div class="nav-item" onclick="showTab('chats')"><span class="nav-icon">💬</span><span class="nav-text">Чаты</span></div>
        <div class="nav-item" onclick="showTab('settings')"><span class="nav-icon">⚙️</span><span class="nav-text">Настройки</span></div>
        <div class="nav-item" onclick="logout()" style="color:red; margin-top:auto;"><span class="nav-icon">🚪</span><span class="nav-text">Выйти</span></div>
    </aside>

    <main class="main-content">
        <div class="container">
            <div id="auth-screen">
                <div style="background:white; padding:40px; border-radius:20px; border:1px solid var(--border); text-align:center; margin-top:50px;">
                    <h2 id="auth-title">Вход в Kasta</h2>
                    <input type="text" id="login-username" placeholder="Юзернейм">
                    <input type="password" id="login-password" placeholder="Пароль">
                    <button id="auth-submit-btn" class="btn-main" onclick="authUser('login')">Войти</button>
                    <p style="margin-top:20px; font-size:14px;">
                        <a href="javascript:void(0)" id="switch-auth-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</a>
                    </p>
                </div>
            </div>

            <div id="main-screens" class="hidden">
                <div id="tab-feed"><h2>Лента</h2><div id="all-posts"></div></div>
                
                <div id="tab-chats" class="hidden">
                    <div id="chats-list-view"><h2>Сообщения</h2><div id="active-chats-list"></div></div>
                    <div id="chat-window" class="hidden">
                        <button onclick="backToChatsList()">← Назад</button>
                        <h3 id="chat-with-name"></h3>
                        <div id="messages-container"></div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="chat-input" placeholder="Сообщение...">
                            <button onclick="sendMessage()" class="btn-main" style="width:auto;">Отправить</button>
                        </div>
                    </div>
                </div>

                <div id="tab-settings" class="hidden">
                    <h2>Настройки</h2>
                    <p>Язык: <select><option>Русский</option><option>English</option></select></p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
