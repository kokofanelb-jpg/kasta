<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0095f6; --bg: #ffffff; --border: #dbdbdb; --text: #262626; --gray: #8e8e8e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .desktop-nav { border-right: 1px solid var(--border); width: 250px; height: 100vh; position: fixed; left: 0; top: 0; padding: 20px; display: flex; flex-direction: column; background: #fff; z-index: 1000; }
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 1000; font-size: 24px; }
        .main-container { margin-left: 250px; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .content-width { width: 100%; max-width: 500px; padding-bottom: 80px; }
        .post { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; background: #fff; overflow: hidden; }
        .post-header { padding: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        @media (max-width: 768px) { .desktop-nav { display: none; } .mobile-nav { display: flex; } .main-container { margin-left: 0; padding: 10px; } }
    </style>
</head>
<body>

    <nav class="desktop-nav">
        <h2 style="color: var(--accent);">Kasta</h2>
        <div onclick="showTab('feed')" style="cursor:pointer; padding:10px;">🏠 Лента</div>
        <div onclick="showTab('chats')" style="cursor:pointer; padding:10px;">💬 Чаты</div>
        <div onclick="showTab('search')" style="cursor:pointer; padding:10px;">🔍 Поиск</div>
        <div onclick="showTab('profile')" style="cursor:pointer; padding:10px;">👤 Профиль</div>
        <div onclick="logout()" style="margin-top: auto; color: red; cursor:pointer; padding:10px;">🚪 Выйти</div>
    </nav>

    <nav class="mobile-nav">
        <div onclick="showTab('chats')">💬</div>
        <div onclick="showTab('feed')">🏠</div>
        <div onclick="showTab('profile')">👤</div>
        <div onclick="showTab('search')">🔍</div>
    </nav>

    <div class="main-container">
        <div class="content-width">
            <div id="auth-screen">
                <h2>Вход в Kasta</h2>
                <input id="u-name" placeholder="Юзернейм">
                <input id="u-pass" type="password" placeholder="Пароль">
                <button class="btn-main" onclick="handleAuth('login')">Войти</button>
                <button class="btn-main" style="background:#333;" onclick="handleAuth('register')">Создать аккаунт</button>
            </div>

            <div id="app-screens" class="hidden">
                <div id="tab-feed">
                    <textarea id="post-txt" placeholder="Что нового?"></textarea>
                    <label style="cursor:pointer; color:var(--accent);">📷 Прикрепить фото
                        <input type="file" id="post-file" accept="image/*" style="display:none;" onchange="previewFile('post-file', 'post-preview')">
                    </label>
                    <img id="post-preview" style="width:100%; display:none; border-radius:8px; margin:10px 0;">
                    <button class="btn-main" onclick="publishPost()">Опубликовать</button>
                    <div id="feed-items"></div>
                </div>

                <div id="tab-search" class="hidden">
                    <input oninput="runSearch(this.value)" placeholder="Поиск @username...">
                    <div id="search-list"></div>
                </div>

                <div id="tab-profile" class="hidden">
                    <div style="text-align:center">
                        <img id="my-ava" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:1px solid #ddd;">
                        <h3 id="my-name"></h3>
                        <p id="my-handle"></p>
                        <div id="profile-stats" style="display:flex; justify-content:center; gap:20px; margin:10px 0;">
                            <span>Посты: <b id="s-p">0</b></span>
                            <span>Подписчики: <b id="s-subers">0</b></span>
                        </div>
                    </div>
                    <div id="profile-actions"></div>
                </div>

                <div id="tab-settings" class="hidden">
                    <input id="set-name" placeholder="Новое имя">
                    <label style="cursor:pointer; display:block; padding:10px; background:#eee; border-radius:8px; text-align:center;">👤 Выбрать аватаку
                        <input type="file" id="set-ava-file" accept="image/*" style="display:none;" onchange="previewFile('set-ava-file', 'ava-preview-mini')">
                    </label>
                    <img id="ava-preview-mini" style="width:50px; height:50px; border-radius:50%; display:none; margin:10px auto;">
                    <button class="btn-main" onclick="saveSettings()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com"; // Убедись, что ссылка верная!
        let token = localStorage.getItem('token');
        let me = localStorage.getItem('currentUser');

        async function handleAuth(type) {
            const username = document.getElementById('u-name').value;
            const password = document.getElementById('u-pass').value;
            if(!username || !password) return alert("Заполни поля!");
            try {
                const res = await fetch(`${API}/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('currentUser', username);
                    location.reload();
                } else alert(data.message);
            } catch(e) { alert("Сервер спит, подожди 30 сек."); }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });

        async function previewFile(inputId, imgId) {
            const file = document.getElementById(inputId).files[0];
            if (file) {
                const base64 = await toBase64(file);
                const img = document.getElementById(imgId);
                img.src = base64; img.style.display = 'block';
            }
        }

        async function publishPost() {
            const text = document.getElementById('post-txt').value;
            const file = document.getElementById('post-file').files[0];
            let imageUrl = file ? await toBase64(file) : "";
            await fetch(`${API}/posts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({text, imageUrl})
            });
            location.reload();
        }

        async function loadFeed() {
            const res = await fetch(`${API}/posts`);
            const posts = await res.json();
            document.getElementById('feed-items').innerHTML = posts.map(p => `
                <div class="post">
                    <div class="post-header" onclick="openUser('${p.author}')">
                        <img src="${p.authorAvatar || 'https://via.placeholder.com/30'}" style="width:30px; height:30px; border-radius:50%;">
                        <b>@${p.author}</b>
                    </div>
                    ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%">` : ''}
                    <div style="padding:10px">${p.text}</div>
                </div>
            `).join('');
        }

        async function openUser(username) {
            showTab('profile');
            const res = await fetch(`${API}/users/profile/${username}`);
            const d = await res.json();
            document.getElementById('my-ava').src = d.avatarUrl || 'https://via.placeholder.com/100';
            document.getElementById('my-name').innerText = d.displayName || d.username;
            document.getElementById('my-handle').innerText = '@' + d.username;
            document.getElementById('s-p').innerText = d.postsCount;
            document.getElementById('s-subers').innerText = d.subscribersCount;

            const actions = document.getElementById('profile-actions');
            if(username !== me) {
                const isSub = d.subscribers.includes(me);
                actions.innerHTML = `<button class="btn-main" onclick="toggleFollow('${username}')">${isSub ? 'Отписаться' : 'Подписаться'}</button>`;
            } else {
                actions.innerHTML = `<button class="btn-main" onclick="showTab('settings')">Настройки</button>`;
            }
        }

        async function toggleFollow(username) {
            await fetch(`${API}/users/follow/${username}`, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${token}`}
            });
            openUser(username);
        }

        async function saveSettings() {
            const displayName = document.getElementById('set-name').value;
            const file = document.getElementById('set-ava-file').files[0];
            let avatarUrl = file ? await toBase64(file) : undefined;
            await fetch(`${API}/users/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({displayName, avatarUrl})
            });
            location.reload();
        }

        function showTab(t) {
            ['feed', 'profile', 'settings', 'search'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            if(t === 'feed') loadFeed();
        }

        function logout() { localStorage.clear(); location.reload(); }

        if(token) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screens').classList.remove('hidden');
            loadFeed();
        }
    </script>
</body>
</html>
