<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0088cc; --bg: #f0f2f5; --white: #ffffff; --border: #dddfe2; --text: #1c1e21; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { cursor: pointer; font-size: 24px; padding: 10px; transition: 0.2s; -webkit-tap-highlight-color: transparent; filter: grayscale(1); }
        .nav-item:hover { filter: grayscale(0); }
        .nav-item.active { filter: grayscale(0); color: var(--accent); }

        .container { max-width: 550px; margin: 0 auto; padding: 15px 15px 80px 15px; }
        
        .post { background: #fff; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .post-ava { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; flex-shrink: 0; }
        .post-img { width: 100%; display: block; background: #f9f9f9; max-height: 550px; object-fit: cover; }
        .post-content { padding: 12px; font-size: 15px; line-height: 1.4; white-space: pre-wrap; }
        .del-btn { margin-left: auto; color: #ccc; border: none; background: none; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .del-btn:hover { color: #ff4d4d; }

        .profile-card { background: #fff; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .big-ava { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 10px; background: #eee; }
        
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn-sec { background: #e4e6eb; color: #050505; }
        
        input, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; box-sizing: border-box; font-size: 16px; outline: none; }
        
        #msg-history { height: 60vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #e5ddd5; border-radius: 10px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 15px; }
        .msg-out { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .msg-in { align-self: flex-start; background: #fff; border-bottom-left-radius: 2px; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay hidden">⏳ Загрузка...</div>

    <div id="auth-screen" class="container">
        <h1 style="text-align:center; color: var(--accent); font-size: 42px; margin: 20px 0;">Kasta</h1>
        <div style="background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border);">
            <input id="u-name" placeholder="Логин">
            <input id="u-pass" type="password" placeholder="Пароль">
            <button class="btn" onclick="auth('login')">Войти</button>
            <button class="btn btn-sec" onclick="auth('register')">Создать аккаунт</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="container">
            <div id="page-feed">
                <div style="background:#fff; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:15px;">
                    <textarea id="p-txt" placeholder="Что нового?" rows="2"></textarea>
                    <input type="file" id="p-img" accept="image/*">
                    <button class="btn" id="publish-btn" onclick="createPost()">Опубликовать</button>
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="page-search" class="hidden">
                <input oninput="doSearch(this.value)" placeholder="Поиск людей...">
                <div id="search-results"></div>
            </div>

            <div id="page-chats" class="hidden">
                <div id="chat-list" style="text-align:center; color:gray; padding-top:40px;">Активных чатов пока нет</div>
                <div id="active-chat" class="hidden">
                    <button class="btn btn-sec" onclick="backToChats()">← Назад</button>
                    <h4 id="chat-title" style="margin: 10px 0; text-align: center;"></h4>
                    <div id="msg-history"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input id="m-input" placeholder="Сообщение...">
                        <button class="btn" style="width:60px; margin:0;" onclick="sendMsg()">></button>
                    </div>
                </div>
            </div>

            <div id="page-profile" class="hidden">
                <div class="profile-card">
                    <img id="view-ava" class="big-ava">
                    <h2 id="view-name" style="margin:5px 0"></h2>
                    <p id="view-handle" style="color:gray; margin:0"></p>
                    <p id="view-stats" style="font-weight:bold; margin:12px 0"></p>
                    <div id="profile-btns"></div>
                </div>
                <div id="profile-posts" style="margin-top:15px;"></div>
            </div>

            <div id="page-settings" class="hidden">
                <h3>Настройки</h3>
                <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
                    <input id="new-display-name" placeholder="Имя в профиле">
                    <p style="font-size: 13px; color: gray;">Сменить аватарку:</p>
                    <input type="file" id="new-ava-file" accept="image/*">
                    <button class="btn" onclick="updateProfile()">Сохранить изменения</button>
                    <button class="btn btn-sec" onclick="logout()" style="color:red; margin-top:30px;">Выйти</button>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="nav('feed')">🏠</div>
            <div class="nav-item" onclick="nav('search')">🔍</div>
            <div class="nav-item" onclick="nav('chats')">💬</div>
            <div class="nav-item" onclick="openUser(localStorage.getItem('currentUser'))">👤</div>
            <div class="nav-item" onclick="nav('settings')">⚙️</div>
        </nav>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        // Встроенный SVG, чтобы не зависеть от внешних сайтов
        const DEFAULT_AVA = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2NjYyI+PHBhdGggZD0iTTEyIDJDMi41IDIgMCA0LjUgMCA3LjV2OWMwIDMgMi41IDUuNSA2LjUgNS41czYuNS0yLjUgNi41LTUuNXYtOWMwLTMtMi41LTUuNS02LjUtNS41em0wIDNhMyAzIDAgMSAxIDAgNiAzIDMgMCAwIDEgMC02em03LjUgMTAuNWMwIDIuNS0zLjQgNC41LTcuNSA0LjVzLTcuNS0yLTcuNS00LjV2LS41YzAtMS41IDMtMyA3LjUtMyA0LjUgMCA3LjUgMS41IDcuNSAzdi41eiIvPjwvc3ZnPg==";

        let token = localStorage.getItem('token');
        let me = localStorage.getItem('currentUser');
        let currentChat = null;
        let chatTimer = null;

        async function auth(type) {
            const username = document.getElementById('u-name').value.trim();
            const password = document.getElementById('u-pass').value.trim();
            if(!username || !password) return alert("Заполни поля");
            try {
                const res = await fetch(`${API}/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const d = await res.json();
                if(res.ok && d.token) {
                    localStorage.setItem('token', d.token);
                    localStorage.setItem('currentUser', d.username);
                    location.reload();
                } else alert(d.message || "Ошибка!");
            } catch(e) { alert("Сервер просыпается... Подожди 10 секунд."); }
        }

        function nav(page) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + page).classList.remove('hidden');
            if(page === 'feed') loadFeed();
            if(page !== 'chats') backToChats();
            window.scrollTo(0,0);
        }

        const toB64 = file => new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });

        async function createPost() {
            const txt = document.getElementById('p-txt').value;
            const file = document.getElementById('p-img').files[0];
            if(!txt && !file) return;
            
            document.getElementById('publish-btn').disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            let img = file ? await toB64(file) : "";
            await fetch(`${API}/posts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({text: txt, imageUrl: img})
            });
            
            document.getElementById('p-txt').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('publish-btn').disabled = false;
            document.getElementById('loader').classList.add('hidden');
            loadFeed();
        }

        async function loadFeed() {
            try {
                const res = await fetch(`${API}/posts`);
                const posts = await res.json();
                document.getElementById('feed-container').innerHTML = posts.map(p => renderPost(p)).join('');
            } catch(e) {}
        }

        function renderPost(p) {
            return `
                <div class="post">
                    <div class="post-header">
                        <img class="post-ava" src="${p.authorAvatar || DEFAULT_AVA}">
                        <span onclick="openUser('${p.author}')" style="cursor:pointer">@${p.author}</span>
                        ${p.author === me ? `<button class="del-btn" onclick="delPost('${p._id}')">×</button>` : ''}
                    </div>
                    ${p.imageUrl ? `<img class="post-img" src="${p.imageUrl}">` : ''}
                    ${p.text ? `<div class="post-content">${p.text}</div>` : ''}
                </div>`;
        }

        async function delPost(id) {
            if(!confirm("Удалить этот пост?")) return;
            await fetch(`${API}/posts/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            loadFeed();
            // Если мы в профиле, обновляем и его
            if(!document.getElementById('page-profile').classList.contains('hidden')) openUser(me);
        }

        async function openUser(user) {
            if(!user || user === "null") return logout();
            nav('profile');
            try {
                const res = await fetch(`${API}/users/profile/${user}`);
                const d = await res.json();
                
                document.getElementById('view-ava').src = d.avatarUrl || DEFAULT_AVA;
                document.getElementById('view-name').innerText = d.displayName || d.username;
                document.getElementById('view-handle').innerText = '@' + d.username;
                document.getElementById('view-stats').innerText = `${d.subscribersCount} подписчиков`;
                
                let btns = document.getElementById('profile-btns');
                if(user === me) {
                    btns.innerHTML = `<button class="btn btn-sec" onclick="nav('settings')">Настройки</button>`;
                } else {
                    const isSub = d.subscribers && d.subscribers.includes(me);
                    btns.innerHTML = `
                        <button class="btn" onclick="follow('${user}')">${isSub ? 'Отписаться' : 'Подписаться'}</button>
                        <button class="btn btn-sec" onclick="startChat('${user}')">Написать</button>
                    `;
                }
                document.getElementById('profile-posts').innerHTML = d.posts.map(p => renderPost(p)).join('');
            } catch(e) {}
        }

        async function updateProfile() {
            const name = document.getElementById('new-display-name').value;
            const file = document.getElementById('new-ava-file').files[0];
            let ava = file ? await toB64(file) : undefined;

            document.getElementById('loader').classList.remove('hidden');
            await fetch(`${API}/users/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({displayName: name, avatarUrl: ava})
            });
            alert("Профиль обновлен!");
            location.reload();
        }

        async function doSearch(q) {
            if(!q) return document.getElementById('search-results').innerHTML = "";
            const res = await fetch(`${API}/users/search?q=${q}`);
            const users = await res.json();
            document.getElementById('search-results').innerHTML = users.map(u => `
                <div onclick="openUser('${u.username}')" style="display:flex; align-items:center; gap:10px; background:#fff; padding:12px; margin-top:5px; border-radius:10px; border:1px solid #ddd; cursor:pointer;">
                    <img src="${u.avatarUrl || DEFAULT_AVA}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <b>${u.displayName || u.username}</b>
                </div>
            `).join('');
        }

        function startChat(user) {
            currentChat = user;
            nav('chats');
            document.getElementById('chat-list').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('chat-title').innerText = "Чат с @" + user;
            loadMsgs();
            if(chatTimer) clearInterval(chatTimer);
            chatTimer = setInterval(loadMsgs, 3000);
        }

        function backToChats() {
            currentChat = null;
            clearInterval(chatTimer);
            document.getElementById('active-chat').classList.add('hidden');
            document.getElementById('chat-list').classList.remove('hidden');
        }

        async function loadMsgs() {
            if(!currentChat) return;
            const res = await fetch(`${API}/messages/${currentChat}`, {headers: {'Authorization': `Bearer ${token}`}});
            const msgs = await res.json();
            document.getElementById('msg-history').innerHTML = msgs.map(m => `
                <div class="msg ${m.sender === me ? 'msg-out' : 'msg-in'}">${m.text}</div>
            `).join('');
            const h = document.getElementById('msg-history');
            h.scrollTop = h.scrollHeight;
        }

        async function sendMsg() {
            const txt = document.getElementById('m-input').value;
            if(!txt) return;
            await fetch(`${API}/messages`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({receiver: currentChat, text: txt})
            });
            document.getElementById('m-input').value = "";
            loadMsgs();
        }

        function logout() { localStorage.clear(); location.reload(); }

        if(token && me) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadFeed();
        }
    </script>
</body>
</html>
