<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta</title>
    <style>
        :root { --accent: #0088cc; --bg: #f0f2f5; --white: #ffffff; --border: #dddfe2; --text: #1c1e21; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.4; -webkit-font-smoothing: antialiased; }
        .hidden { display: none !important; }
        
        /* МОБИЛЬНАЯ НАВИГАЦИЯ */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { cursor: pointer; font-size: 26px; flex: 1; text-align: center; padding: 10px; transition: 0.2s; -webkit-tap-highlight-color: transparent; filter: grayscale(1); }
        .nav-item.active { filter: grayscale(0); color: var(--accent); }

        .container { max-width: 600px; margin: 0 auto; padding: 0 0 70px 0; }
        
        /* ПОСТЫ: На телефоне от края до края */
        .post { background: #fff; margin-bottom: 15px; border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); position: relative; }
        .post-header { padding: 15px; display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .post-ava { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #eee; border: 1px solid #ddd; flex-shrink: 0; }
        .post-img { width: 100%; display: block; background: #f9f9f9; max-height: 80vh; object-fit: cover; }
        .post-content { padding: 15px; font-size: 16px; white-space: pre-wrap; word-wrap: break-word; }
        .del-btn { position: absolute; top: 12px; right: 15px; background: transparent; border: none; font-size: 24px; color: #aaa; cursor: pointer; padding: 5px; }

        /* ПРОФИЛЬ */
        .profile-card { background: #fff; padding: 30px 15px; text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .big-ava { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 10px; background: #eee; }
        .stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stats div { display: flex; flex-direction: column; font-size: 14px; color: #65676b; }
        .stats b { font-size: 20px; color: var(--text); }

        /* КНОПКИ и ИНПУТЫ */
        .btn { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 16px; -webkit-tap-highlight-color: transparent; }
        .btn-sec { background: #e4e6eb; color: #050505; }
        
        input, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; font-size: 16px; outline: none; background: #f0f2f5; -webkit-appearance: none; }
        
        /* ЧАТ */
        #msg-history { height: 65vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; border-radius: 0; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 16px; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-out { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 4px; }
        .msg-in { align-self: flex-start; background: #fff; border-bottom-left-radius: 4px; }

        /* Десктопные отступы (возвращаем скругления на компах) */
        @media (min-width: 600px) {
            .container { padding: 20px 20px 80px 20px; }
            .post { border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
            .profile-card { border-radius: 12px; border: 1px solid var(--border); }
            #msg-history { border-radius: 12px; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="container" style="padding-top: 40px;">
        <h1 style="text-align:center; color: var(--accent); font-size: 48px; margin: 20px 0;">Kasta</h1>
        <div style="background: white; padding: 25px; border-radius: 15px; border: 1px solid var(--border); margin: 0 15px;">
            <input id="u-name" placeholder="Логин" autocomplete="off">
            <input id="u-pass" type="password" placeholder="Пароль">
            <button class="btn" onclick="auth('login')">Войти</button>
            <button class="btn btn-sec" onclick="auth('register')">Создать аккаунт</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="container">
            
            <div id="page-feed">
                <div style="background:#fff; padding:15px; border-bottom:1px solid var(--border); margin-bottom:15px;">
                    <textarea id="p-txt" placeholder="Расскажите что-нибудь..." rows="2"></textarea>
                    <input type="file" id="p-img" accept="image/*" style="font-size:14px; background:none; border:none; padding:10px 0;">
                    <button class="btn" onclick="createPost()">Опубликовать</button>
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="page-search" class="hidden">
                <div style="padding: 15px; background: #fff; border-bottom: 1px solid var(--border);">
                    <input oninput="doSearch(this.value)" placeholder="Поиск людей...">
                </div>
                <div id="search-results"></div>
            </div>

            <div id="page-chats" class="hidden">
                <div id="chat-list" style="text-align:center; padding-top:40px; color:gray;">Сообщений нет</div>
                <div id="active-chat" class="hidden">
                    <div style="background: #fff; padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;">
                        <button class="btn btn-sec" style="width: auto; margin: 0; padding: 8px 15px;" onclick="backToChats()">←</button>
                        <h4 id="chat-title" style="margin: 0; font-size: 18px;"></h4>
                    </div>
                    <div id="msg-history"></div>
                    <div style="display:flex; gap:10px; padding: 15px; background: #f0f2f5;">
                        <input id="m-input" placeholder="Сообщение..." style="margin: 0;">
                        <button class="btn" style="width:70px; margin:0;" onclick="sendMsg()">></button>
                    </div>
                </div>
            </div>

            <div id="page-profile" class="hidden">
                <div id="profile-content"></div> 
                <div id="profile-posts"></div>
            </div>

            <div id="page-settings" class="hidden">
                <div style="background: white; padding: 25px; border-bottom: 1px solid var(--border);">
                    <h3 style="margin-top:0;">Настройки</h3>
                    <input id="new-display-name" placeholder="Отображаемое имя">
                    <p style="font-size:14px; color:gray; margin-bottom:5px;">Изменить фото:</p>
                    <input type="file" id="new-ava-file" accept="image/*" style="background:none; border:none; padding:0;">
                    <button class="btn" onclick="updateProfile()">Сохранить</button>
                    <button class="btn btn-sec" onclick="logout()" style="color:red; margin-top:30px;">Выйти из аккаунта</button>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="nav('feed')" id="nav-feed">🏠</div>
            <div class="nav-item" onclick="nav('search')" id="nav-search">🔍</div>
            <div class="nav-item" onclick="nav('chats')" id="nav-chats">💬</div>
            <div class="nav-item" onclick="openUser(localStorage.getItem('currentUser'))" id="nav-profile">👤</div>
        </nav>
    </div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        const DEF_AVA = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2NjYyI+PHBhdGggZD0iTTEyIDJDMi41IDIgMCA0LjUgMCA3LjV2OWMwIDMgMi41IDUuNSA2LjUgNS41czYuNS0yLjUgNi41LTUuNXYtOWMwLTMtMi41LTUuNS02LjUtNS41em0wIDNhMyAzIDAgMSAxIDAgNiAzIDMgMCAwIDEgMC02em03LjUgMTAuNWMwIDIuNS0zLjQgNC41LTcuNSA0LjVzLTcuNS0yLTcuNS00LjV2LS41YzAtMS41IDMtMyA3LjUtMyA0LjUgMCA3LjUgMS41IDcuNSAzdi41eiIvPjwvc3ZnPg==";

        let token = localStorage.getItem('token');
        let me = localStorage.getItem('currentUser');
        let chatTimer = null;
        let currentChat = null;

        const fixUrl = (url) => {
            if(!url) return DEF_AVA;
            if(url.includes('localhost')) return ""; 
            return url.replace("http://", "https://");
        };

        async function auth(type) {
            const username = document.getElementById('u-name').value.trim();
            const password = document.getElementById('u-pass').value.trim();
            if(!username || !password) return alert("Заполните все поля");
            
            const res = await fetch(`${API}/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const d = await res.json();
            if(res.ok) {
                localStorage.setItem('token', d.token);
                localStorage.setItem('currentUser', d.username); // Сохраняем имя ровно так, как отдаст сервер
                location.reload();
            } else alert(d.message);
        }

        function nav(page) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('page-' + page).classList.remove('hidden');
            const navBtn = document.getElementById('nav-' + page);
            if(navBtn) navBtn.classList.add('active');

            if(page === 'feed') loadFeed();
            if(page !== 'chats') backToChats();
            window.scrollTo(0,0);
        }

        const toB64 = file => new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });

        async function createPost() {
            const txt = document.getElementById('p-txt').value;
            const file = document.getElementById('p-img').files[0];
            let img = file ? await toB64(file) : "";
            await fetch(`${API}/posts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({text: txt, imageUrl: img})
            });
            document.getElementById('p-txt').value = "";
            document.getElementById('p-img').value = "";
            loadFeed();
        }

        async function loadFeed() {
            const res = await fetch(`${API}/posts`);
            const posts = await res.json();
            document.getElementById('feed-container').innerHTML = posts.map(p => renderPost(p)).join('');
        }

        function renderPost(p) {
            const isMyPost = p.author.toLowerCase() === me.toLowerCase();
            const postImg = fixUrl(p.imageUrl);
            return `
                <div class="post">
                    <div class="post-header" onclick="openUser('${p.author}')">
                        <img class="post-ava" src="${fixUrl(p.authorAvatar)}">
                        <span>@${p.author}</span>
                        ${isMyPost ? `<button class="del-btn" onclick="event.stopPropagation(); delPost('${p._id}')">×</button>` : ''}
                    </div>
                    ${postImg && !postImg.includes('data:image/svg') ? `<img class="post-img" src="${postImg}">` : ''}
                    ${p.text ? `<div class="post-content">${p.text}</div>` : ''}
                </div>`;
        }

        async function delPost(id) {
            if(!confirm("Удалить?")) return;
            await fetch(`${API}/posts/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            loadFeed();
            if(!document.getElementById('page-profile').classList.contains('hidden')) openUser(me);
        }

        async function openUser(username) {
            if(!username) return;
            nav('profile');
            document.getElementById('nav-profile').classList.add('active'); // Подсветка кнопки
            const cont = document.getElementById('profile-content');
            cont.innerHTML = "<p style='text-align:center; padding: 20px;'>Загрузка...</p>";
            document.getElementById('profile-posts').innerHTML = "";
            
            try {
                const res = await fetch(`${API}/users/profile/${username}`);
                if(!res.ok) throw new Error();
                const d = await res.json();
                
                const isMe = d.username.toLowerCase() === me.toLowerCase();
                const isSub = d.subscribers && d.subscribers.includes(me);

                cont.innerHTML = `
                    <div class="profile-card">
                        <img class="big-ava" src="${fixUrl(d.avatarUrl)}">
                        <h2 style="margin:5px 0">${d.displayName || d.username}</h2>
                        <p style="color:gray; margin:0">@${d.username}</p>
                        <div class="stats">
                            <div><b>${d.postsCount}</b><span>постов</span></div>
                            <div><b>${d.subscribersCount}</b><span>подписчиков</span></div>
                            <div><b>${d.subscriptionsCount}</b><span>подписок</span></div>
                        </div>
                        <div id="profile-btns-area" style="padding: 0 15px;">
                            ${isMe ? 
                                `<button class="btn btn-sec" onclick="nav('settings')">Настройки</button>` : 
                                `<div style="display:flex; gap:10px;">
                                    <button class="btn" style="flex:1;" onclick="follow('${d.username}')">${isSub ? 'Отписаться' : 'Подписаться'}</button>
                                    <button class="btn btn-sec" style="flex:1;" onclick="startChat('${d.username}')">Написать</button>
                                </div>`
                            }
                        </div>
                    </div>
                `;
                document.getElementById('profile-posts').innerHTML = d.posts.map(p => renderPost(p)).join('');
            } catch(e) {
                cont.innerHTML = "<p style='text-align:center; padding:40px;'>Пользователь не найден</p>";
            }
        }

        async function follow(username) {
            await fetch(`${API}/users/follow/${username}`, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${token}`}
            });
            openUser(username);
        }

        async function updateProfile() {
            const name = document.getElementById('new-display-name').value;
            const file = document.getElementById('new-ava-file').files[0];
            let ava = file ? await toB64(file) : undefined;
            await fetch(`${API}/users/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({displayName: name, avatarUrl: ava})
            });
            alert("Обновлено!");
            location.reload();
        }

        async function doSearch(q) {
            if(!q) return document.getElementById('search-results').innerHTML = "";
            const res = await fetch(`${API}/users/search?q=${q}`);
            const users = await res.json();
            document.getElementById('search-results').innerHTML = users.map(u => `
                <div onclick="openUser('${u.username}')" style="display:flex; align-items:center; gap:15px; background:#fff; padding:15px; border-bottom:1px solid #eee; cursor:pointer;">
                    <img src="${fixUrl(u.avatarUrl)}" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                    <b style="font-size:16px;">${u.displayName || u.username}</b>
                </div>
            `).join('');
        }

        function startChat(username) {
            currentChat = username;
            nav('chats');
            document.getElementById('chat-list').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('chat-title').innerText = username;
            loadMsgs();
            if(chatTimer) clearInterval(chatTimer);
            chatTimer = setInterval(loadMsgs, 3000);
        }

        function backToChats() {
            currentChat = null;
            clearInterval(chatTimer);
            document.getElementById('active-chat').classList.add('hidden');
            document.getElementById('chat-list').classList.remove('hidden');
        }

        async function loadMsgs() {
            if(!currentChat) return;
            const res = await fetch(`${API}/messages/${currentChat}`, {headers: {'Authorization': `Bearer ${token}`}});
            const msgs = await res.json();
            document.getElementById('msg-history').innerHTML = msgs.map(m => `
                <div class="msg ${m.sender.toLowerCase() === me.toLowerCase() ? 'msg-out' : 'msg-in'}">${m.text}</div>
            `).join('');
            const h = document.getElementById('msg-history');
            h.scrollTop = h.scrollHeight;
        }

        async function sendMsg() {
            const txt = document.getElementById('m-input').value;
            if(!txt) return;
            await fetch(`${API}/messages`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({receiver: currentChat, text: txt})
            });
            document.getElementById('m-input').value = "";
            loadMsgs();
        }

        function logout() { localStorage.clear(); location.reload(); }

        if(token && me) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadFeed();
        }
    </script>
</body>
</html>
