<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta</title>
    <style>
        /* Базовые стили для красоты и скрытия блоков */
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        .post { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        nav { display: flex; gap: 15px; margin-bottom: 20px; background: #f0f0f0; padding: 10px; border-radius: 8px;}
        nav a { cursor: pointer; color: blue; text-decoration: underline; }
    </style>
</head>
<body>

<div id="auth-screen">
        <h2>Добро пожаловать!</h2>
        <form id="authForm">
            <input type="text" id="username" placeholder="Никнейм" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <br><br>
            <button type="button" id="btnLogin">Войти</button>
            <button type="button" id="btnRegister">Регистрация</button>
        </form>
        <p id="authMessage" style="color: rgb(180, 72, 72);"></p>
    </div>

    <div id="main-screen" class="hidden">
        
        <nav>
            <a id="nav-feed">Лента</a>
            <a id="nav-profile">Мой профиль</a>
            <a id="nav-logout" style="color: red;">Выйти</a>
        </nav>

<form id="postForm">
    <textarea id="postText" placeholder="Что нового?" required></textarea>
    <br>
    <input type="file" id="postFile" accept="image/*"> <br><br>
    <button type="submit">Опубликовать</button>
</form>

        <div id="tab-profile" class="hidden">
            <h3>Мой профиль</h3>
            <p>Имя пользователя: <b id="profile-name"></b></p>
            <p>Мои публикации:</p>
            <div id="my-posts"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
