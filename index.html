<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <h2 id="auth-title">Вход в Kasta</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button id="authBtn" onclick="authUser('login')">Войти</button>
        <p id="toggleText">Нет аккаунта? <a href="#" onclick="switchAuth('reg')">Зарегистрироваться</a></p>
        <p id="authMessage" style="color: red;"></p>
    </div>

    <div id="main-screen" class="hidden">
        <nav>
            <button onclick="showTab('feed')">Лента</button>
            <button onclick="showTab('search')">Поиск</button>
            <button onclick="showTab('profile')">Аккаунт</button>
            <button onclick="logout()" style="color: red;">Выйти</button>
        </nav>

        <div id="tab-feed">
            <form id="postForm">
                <textarea id="postText" placeholder="Что нового?"></textarea>
                <input type="file" id="postFile" accept="image/*">
                <button type="submit">Опубликовать</button>
            </form>
            <div id="posts-container"></div>
        </div>

        <div id="tab-search" class="hidden">
            <input type="text" id="searchInput" oninput="searchUsers()" placeholder="Поиск @юзера...">
            <div id="searchResults"></div>
        </div>

        <div id="tab-profile" class="hidden">
            <h3>Мой аккаунт</h3>
            <p>Логин: <b id="profile-name"></b></p>
            <p>Handle: <span id="profile-handle" style="color: gray;"></span></p>
            <p>Здесь скоро будет аватарка и описание!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
