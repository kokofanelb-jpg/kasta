<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASTA - ПОЛНАЯ ВЕРСИЯ</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        /* ПЕРЕМЕННЫЕ ТЕМЫ */
        :root {
            --primary: #ff0000;
            --bg-body: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-mut: rgba(255, 255, 255, 0.5);
            --icon-color: #ffffff;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #1c1e21;
            --text-mut: rgba(0, 0, 0, 0.5);
            --icon-color: #1c1e21;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* БОКОВАЯ НАВИГАЦИЯ */
        .nav-side {
            position: fixed; top: 0; left: 0; width: 80px; height: 100vh;
            background: var(--bg-card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 35px;
        }
        
        .app-shell { margin-left: 80px; width: calc(100% - 80px); max-width: 680px; padding: 25px; position: relative; }
        
        @media (max-width: 700px) {
            .nav-side { top: auto; bottom: 0; width: 100%; height: 75px; flex-direction: row; justify-content: space-around; border-right: none; border-top: 1px solid var(--glass-border); padding: 0; }
            .app-shell { margin-left: 0; width: 100%; padding-bottom: 100px; }
        }

        /* СТИЛИ ГЛАССМОРФИЗМА */
        .glass { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 22px; backdrop-filter: blur(15px); }
        .hidden { display: none !important; }

        /* ИКОНКИ МЕНЮ */
        .nav-item { cursor: pointer; position: relative; color: var(--icon-color); opacity: 0.5; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; border-radius: 15px; }
        .nav-item.active { opacity: 1; color: var(--primary); background: rgba(255,255,255,0.05); }
        .nav-item svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--primary); color: #fff; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--bg-body); }

        /* ПОСТЫ */
        .post { margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .post-h { padding: 15px 20px; display: flex; align-items: center; gap: 12px; }
        .p-ava { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: #222; }
        
        .media-container { width: 100%; background: #000; position: relative; display: block; min-height: 200px; }
        .post-img, .post-video { width: 100%; display: block; max-height: 600px; object-fit: contain; }
        
        .post-actions { padding: 15px 20px; display: flex; gap: 25px; border-bottom: 1px solid var(--glass-border); }
        .act-btn { background: none; border: none; color: var(--icon-color); display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.2s; }
        .act-btn:active { transform: scale(0.9); }
        .act-btn svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2; }
        .act-btn.liked { color: var(--primary); }
        .act-btn.liked svg { fill: var(--primary); stroke: var(--primary); }

        /* КОММЕНТАРИИ */
        .comm-wrap { padding: 15px 20px; max-height: 300px; overflow-y: auto; }
        .comm-item { margin-bottom: 12px; font-size: 14px; line-height: 1.4; }
        .comm-item b { color: var(--primary); margin-right: 6px; }

        /* ПРОФИЛЬ */
        .p-header { position: relative; padding-bottom: 20px; text-align: center; }
        .p-banner { width: 100%; height: 160px; background: #333; border-radius: 22px 22px 0 0; background-size: cover; background-position: center; }
        .p-ava-main { width: 110px; height: 110px; border-radius: 50%; border: 6px solid var(--bg-body); margin-top: -55px; position: relative; background: #222; object-fit: cover; }
        
        .p-tabs { display: flex; margin: 20px 0; border-bottom: 1px solid var(--glass-border); }
        .p-tab { flex: 1; text-align: center; padding: 15px; font-size: 13px; font-weight: 800; color: var(--text-mut); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .p-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* СЕТКА ПРОФИЛЯ (С ФИКСОМ ТЕКСТА) */
        .p-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--bg-card); border: 1px solid var(--glass-border); position: relative; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .grid-item-text { padding: 10px; font-size: 11px; color: var(--text); overflow: hidden; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* НАСТРОЙКИ КРАСИВО */
        .set-card { padding: 20px; margin-bottom: 20px; }
        .set-title { font-size: 12px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        .color-row { display: flex; justify-content: space-between; padding: 10px 0; }
        .color-opt { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .color-opt.active { border-color: var(--text); transform: scale(1.1); }

        /* ИНПУТЫ */
        input, textarea, select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border); background: var(--bg-card); color: var(--text); outline: none; margin-bottom: 15px; font-size: 15px; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; font-size: 15px; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-main:active { transform: translateY(0); }

        /* ЧАТ ОКНО */
        #chat-window { position: fixed; inset: 0; background: var(--bg-body); z-index: 2000; display: none; flex-direction: column; }
        .chat-h { padding: 18px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--glass-border); }
        .chat-b { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background-size: cover; background-position: center; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--bg-card); border-bottom-left-radius: 4px; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body data-theme="dark">

<nav class="nav-side">
    <div class="nav-item active" onclick="window.switchTab('feed', event)">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
    </div>
    <div class="nav-item" onclick="window.switchTab('chats', event)">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        <span class="badge" id="chat-badge">0</span>
    </div>
    <div class="nav-item" onclick="window.switchTab('notifs', event)">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    </div>
    <div class="nav-item" onclick="window.switchTab('profile', event)">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
    <div class="nav-item" onclick="window.switchTab('settings', event)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </div>
</nav>

<div class="app-shell">

    <div id="scr-auth" style="display: flex; flex-direction: column; justify-content: center; min-height: 80vh;">
        <div class="glass" style="padding: 40px; text-align: center;">
            <h1 style="color: var(--primary); letter-spacing: 8px; margin-bottom: 30px;">KASTA</h1>
            <input id="login-u" placeholder="Логин">
            <input id="login-p" type="password" placeholder="Пароль">
            <button class="btn-main" onclick="window.doAuth('login')">ВОЙТИ</button>
            <p onclick="window.doAuth('register')" style="margin-top: 25px; font-size: 13px; opacity: 0.6; cursor: pointer;">Нет аккаунта? Зарегистрироваться</p>
        </div>
    </div>

    <div id="scr-app" class="hidden">
        
        <div id="view-feed">
            <div id="st-list" class="glass" style="display: flex; gap: 15px; padding: 18px; margin-bottom: 25px; overflow-x: auto;">
                <div onclick="document.getElementById('st-in').click()" style="min-width: 65px; height: 65px; border-radius: 50%; border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); font-size: 28px;">+</div>
                <input type="file" id="st-in" hidden accept="image/*" onchange="window.uploadSt(this)">
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="view-chats" class="hidden">
            <h2 style="margin-bottom: 20px;">Сообщения</h2>
            <div id="chats-list"></div>
        </div>

        <div id="view-notifs" class="hidden">
            <h2 style="margin-bottom: 20px;">Уведомления</h2>
            <div id="notifs-list"></div>
        </div>

        <div id="view-profile" class="hidden">
            <div id="p-card" class="glass p-header" style="margin-bottom: 25px; overflow: hidden;"></div>
            
            <div class="glass" style="padding: 20px; margin-bottom: 25px;">
                <textarea id="post-text" placeholder="Расскажите что-нибудь..." rows="3"></textarea>
                <div style="display: flex; gap: 12px;">
                    <button class="btn-main" style="background: var(--bg-card); flex: 1;" onclick="document.getElementById('post-file').click()">ФОТО / ВИДЕО</button>
                    <input type="file" id="post-file" hidden accept="image/*,video/*">
                    <button class="btn-main" style="flex: 1;" onclick="window.createPost()">ОПУБЛИКОВАТЬ</button>
                </div>
            </div>

            <div class="p-tabs">
                <div class="p-tab active" onclick="window.switchPTab('media', this)">Медиа</div>
                <div class="p-tab" onclick="window.switchPTab('all', this)">Все публикации</div>
            </div>
            <div id="p-grid" class="p-grid"></div>
        </div>

        <div id="view-settings" class="hidden">
            <div class="glass set-card">
                <span class="set-title">Внешний вид</span>
                <p style="font-size: 11px; margin-bottom: 10px; opacity: 0.7;">ЦВЕТ АКЦЕНТА</p>
                <div class="color-row">
                    <div class="color-opt" style="background: #ff0000;" onclick="window.setAccent('#ff0000', this)"></div>
                    <div class="color-opt" style="background: #007aff;" onclick="window.setAccent('#007aff', this)"></div>
                    <div class="color-opt" style="background: #34c759;" onclick="window.setAccent('#34c759', this)"></div>
                    <div class="color-opt" style="background: #ff9500;" onclick="window.setAccent('#ff9500', this)"></div>
                    <div class="color-opt" style="background: #a044ff;" onclick="window.setAccent('#a044ff', this)"></div>
                </div>
                
                <p style="font-size: 11px; margin: 20px 0 10px; opacity: 0.7;">ТЕМА СИСТЕМЫ</p>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main" style="background: #eee; color: #000;" onclick="window.setTheme('light')">Светлая</button>
                    <button class="btn-main" style="background: #111; color: #fff;" onclick="window.setTheme('dark')">Темная</button>
                </div>
            </div>

            <div class="glass set-card">
                <span class="set-title">Редактировать профиль</span>
                <input id="set-disp-name" placeholder="Отображаемое имя">
                <textarea id="set-bio" placeholder="О себе..."></textarea>
                <button class="btn-main" style="background: var(--bg-card); margin-bottom: 10px;" onclick="document.getElementById('banner-in').click()">СМЕНИТЬ БАННЕР</button>
                <input type="file" id="banner-in" hidden onchange="window.saveBanner(this)">
                <button class="btn-main" onclick="window.saveBaseProfile()">СОХРАНИТЬ</button>
            </div>

            <div class="glass set-card">
                <span class="set-title">Обои чатов</span>
                <input id="chat-wall-url" placeholder="URL картинки для фона...">
                <button class="btn-main" onclick="window.saveChatWall()">ПРИМЕНИТЬ</button>
            </div>

            <button class="btn-main" style="background: #ff3b30; margin-top: 20px;" onclick="window.logOut()">ВЫЙТИ ИЗ АККАУНТА</button>
        </div>
    </div>
</div>

<div id="chat-window">
    <div class="chat-h">
        <button onclick="document.getElementById('chat-window').style.display='none'" style="background:none; border:none; color:var(--text); font-size: 30px; cursor: pointer;">←</button>
        <b id="chat-name" style="font-size: 18px;">Чат</b>
    </div>
    <div id="chat-body" class="chat-b"></div>
    <div style="padding: 20px; border-top: 1px solid var(--glass-border); display: flex; gap: 12px;">
        <input id="chat-in" style="margin: 0;" placeholder="Сообщение...">
        <button class="btn-main" style="width: 70px;" onclick="window.sendMsg()">></button>
    </div>
</div>

<script>
    const API = "https://kasta-l49s.onrender.com";
    let token = localStorage.getItem('token'), me = localStorage.getItem('me'), curChat = "";
    let profilePosts = [];

    // ХЕЛПЕРЫ
    const isVid = (url) => url && (url.includes('.mp4') || url.includes('.webm') || url.includes('.mov') || url.startsWith('data:video'));

    async function call(p, m='GET', b=null) {
        try {
            const r = await fetch(API+p, {
                method: m, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: b ? JSON.stringify(b) : null
            });
            return await r.json();
        } catch(e) { return { error: true }; }
    }

    // АВТОРИЗАЦИЯ
    window.doAuth = async (t) => {
        const u = document.getElementById('login-u').value, p = document.getElementById('login-p').value;
        const res = await fetch(`${API}/${t}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const d = await res.json();
        if(res.ok) { localStorage.setItem('token', d.token); localStorage.setItem('me', d.username); location.reload(); } else alert(d.message);
    };

    window.switchTab = (id, e) => {
        // Фикс ошибки currentTarget
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (e && e.currentTarget) {
            e.currentTarget.classList.add('active');
        } else {
            // Если вызвано не через клик, ищем иконку по атрибуту (но тут проще по порядку)
            const items = document.querySelectorAll('.nav-item');
            const map = {feed:0, chats:1, notifs:2, profile:3, settings:4};
            if (items[map[id]]) items[map[id]].classList.add('active');
        }

        document.querySelectorAll('#scr-app > div').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-'+id).classList.remove('hidden');
        
        if(id === 'feed') window.loadFeed();
        if(id === 'chats') window.loadChats();
        if(id === 'profile') window.loadProfile();
    };

    // ЛЕНТА (С НОВЫМИ СВЕРХУ)
    window.loadFeed = async () => {
        const d = await call('/posts');
        if(!Array.isArray(d)) return;
        const sorted = d.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        document.getElementById('feed-container').innerHTML = sorted.map(p => `
            <div class="glass post">
                <div class="post-h">
                    <img src="${p.authorAvatar || 'https://ui-avatars.com/api/?name='+p.author}" class="p-ava">
                    <b style="font-size: 15px;">${p.author}</b>
                </div>
                ${p.imageUrl ? `
                    <div class="media-container">
                        ${isVid(p.imageUrl) ? 
                            `<video src="${p.imageUrl}" class="post-video" controls playsinline></video>` : 
                            `<img src="${p.imageUrl}" class="post-img" loading="lazy">`
                        }
                    </div>` : ''}
                <div class="post-actions">
                    <button class="act-btn ${p.likes.includes(me)?'liked':''}" onclick="window.like('${p._id}')">
                        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        ${p.likes.length}
                    </button>
                    <button class="act-btn" onclick="document.getElementById('ci-${p._id}').focus()">
                        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        ${p.comments.length}
                    </button>
                </div>
                <div style="padding: 10px 20px 20px;">
                    <p style="font-size: 15px; margin-bottom: 10px;">${p.text || ''}</p>
                    <div class="comm-wrap">
                        ${(p.comments || []).map(c => `<div class="comm-item"><b>${c.author}</b> ${c.text}</div>`).join('')}
                    </div>
                    <input id="ci-${p._id}" placeholder="Добавить комментарий..." style="margin-top:10px; padding:10px;" onkeydown="if(event.key==='Enter') window.addComm('${p._id}', this.value)">
                </div>
            </div>
        `).join('');
        window.loadStories();
    };

    window.loadStories = async () => {
        try {
            const s = await call('/stories');
            const list = document.getElementById('st-list');
            list.innerHTML = `<div onclick="document.getElementById('st-in').click()" style="min-width: 65px; height: 65px; border-radius: 50%; border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); font-size: 28px;">+</div>`;
            if(Array.isArray(s)) s.forEach(item => {
                list.innerHTML += `<img src="${item.userAva}" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--primary); padding:2px; flex-shrink:0;">`;
            });
        } catch(e){}
    };

    window.like = async (id) => { await call(`/posts/${id}/like`, 'POST'); window.loadFeed(); };
    window.addComm = async (id, text) => { if(!text) return; await call(`/posts/${id}/comment`, 'POST', {text}); window.loadFeed(); };

    // ПРОФИЛЬ
    window.loadProfile = async () => {
        const u = await call('/users/profile/'+me);
        if(!u || u.error) return;
        profilePosts = u.posts || [];
        
        const ban = localStorage.getItem('k_banner') || '';
        document.getElementById('p-card').innerHTML = `
            <div class="p-banner" style="${ban ? `background-image:url(${ban})` : `background:var(--primary); opacity:0.3;`}"></div>
            <img src="${u.avatarUrl || 'https://ui-avatars.com/api/?name='+me}" class="p-ava-main">
            <h2 style="margin-top:10px;">${u.displayName || me}</h2>
            <p style="opacity:0.6; font-size:14px; margin-top:5px;">${u.bio || 'Пользователь KASTA'}</p>
        `;
        window.switchPTab('media', document.querySelector('.p-tab.active'));
    };

    window.switchPTab = (type, el) => {
        document.querySelectorAll('.p-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const grid = document.getElementById('p-grid');
        
        const filtered = type === 'media' ? profilePosts.filter(p => p.imageUrl) : profilePosts;
        
        grid.innerHTML = filtered.map(p => `
            <div class="grid-item">
                ${p.imageUrl ? 
                    (isVid(p.imageUrl) ? `<video src="${p.imageUrl}"></video>` : `<img src="${p.imageUrl}" loading="lazy">`) : 
                    `<div class="grid-item-text">${p.text || 'Текстовый пост'}</div>`
                }
            </div>
        `).join('');
    };

    window.createPost = async () => {
        const t = document.getElementById('post-text').value, f = document.getElementById('post-file').files[0];
        let img = ""; if(f) img = await window.pack(f);
        await call('/posts', 'POST', {text:t, imageUrl:img});
        document.getElementById('post-text').value = "";
        window.switchTab('feed');
    };

    // ЧАТЫ
    window.loadChats = async () => {
        const d = await call('/chats');
        if(!d.users) return;
        document.getElementById('chats-list').innerHTML = d.users.map(u => `
            <div class="glass" onclick="window.openChat('${u.username}')" style="padding:18px; margin-bottom:12px; display:flex; align-items:center; gap:15px; cursor:pointer;">
                <img src="https://ui-avatars.com/api/?name=${u.username}" style="width:45px; border-radius:50%;">
                <b style="font-size:16px;">${u.username}</b>
            </div>
        `).join('');
    };

    window.openChat = async (n) => {
        curChat = n; document.getElementById('chat-name').innerText = n;
        document.getElementById('chat-window').style.display = 'flex';
        const box = document.getElementById('chat-body');
        const wall = localStorage.getItem('k_chat_wall');
        if(wall) box.style.backgroundImage = `url(${wall})`;
        else box.style.background = `linear-gradient(to bottom, var(--primary)11, var(--bg-body))`;
        
        const msgs = await call('/messages/'+n);
        if(Array.isArray(msgs)) box.innerHTML = msgs.map(m => `<div class="msg ${m.sender===me?'me':'them'}">${m.text}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-in'); if(!i.value) return;
        await call('/messages', 'POST', {recipient:curChat, text:i.value});
        i.value = ""; window.openChat(curChat);
    };

    // НАСТРОЙКИ
    window.setAccent = (c, el) => {
        document.documentElement.style.setProperty('--primary', c);
        localStorage.setItem('k_accent', c);
        document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active'));
        if(el) el.classList.add('active');
    };
    window.setTheme = (t) => {
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('k_theme', t);
    };
    window.saveChatWall = () => localStorage.setItem('k_chat_wall', document.getElementById('chat-wall-url').value);
    window.saveBaseProfile = async () => {
        const n = document.getElementById('set-disp-name').value, b = document.getElementById('set-bio').value;
        await call('/users/update', 'POST', {displayName:n, bio:b});
        alert("Обновлено!");
    };
    window.saveBanner = async (el) => {
        const f = el.files[0]; if(!f) return;
        const img = await window.pack(f);
        localStorage.setItem('k_banner', img);
        window.loadProfile();
    };

    window.pack = (f) => new Promise(r => {
        const rd = new FileReader(); rd.readAsDataURL(f);
        rd.onload = e => r(e.target.result);
    });

    window.logOut = () => { localStorage.clear(); location.reload(); };

    // ЗАПУСК
    if(token) {
        document.getElementById('scr-auth').classList.add('hidden');
        document.getElementById('scr-app').classList.remove('hidden');
        window.switchTab('feed');
    }

    // ВОССТАНОВЛЕНИЕ НАСТРОЕК
    const savedAccent = localStorage.getItem('k_accent') || '#ff0000';
    window.setAccent(savedAccent);
    window.setTheme(localStorage.getItem('k_theme') || 'dark');
    document.getElementById('chat-wall-url').value = localStorage.getItem('k_chat_wall') || '';
</script>
</body>
</html>
