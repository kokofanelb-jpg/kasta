<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASTA PRO MAX</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        :root {
            --primary: #8a2be2;
            --bg: #0a0a0b;
            --surface: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-mut: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
            --glass: blur(25px);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --surface: rgba(255, 255, 255, 0.7);
            --text: #1c1e21;
            --text-mut: #65676b;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; overflow-x: hidden; }

        .app-shell { width: 100%; max-width: 550px; position: relative; padding-bottom: 100px; }
        
        .glass { background: var(--surface); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: 24px; }
        .hidden { display: none !important; }

        /* STORIES */
        .st-bar { display: flex; gap: 15px; padding: 15px; overflow-x: auto; scrollbar-width: none; margin: 10px 0; }
        .st-bar::-webkit-scrollbar { display: none; }
        .st-item { flex-shrink: 0; width: 75px; text-align: center; cursor: pointer; }
        .st-ring { width: 70px; height: 70px; border-radius: 50%; padding: 3px; border: 2px solid var(--primary); margin-bottom: 5px; }
        .st-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #333; }

        /* POSTS */
        .post { margin: 15px; overflow: hidden; }
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .p-ava { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .post-img { width: 100%; display: block; max-height: 600px; object-fit: cover; }
        .post-act { padding: 10px 15px; display: flex; gap: 20px; }
        .act-btn { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 16px; }
        .btn-del { background: #ff3b30; color: #fff; border: none; padding: 6px 12px; border-radius: 12px; font-size: 11px; margin-left: auto; cursor: pointer; }

        /* COMMENTS */
        .comm-box { padding: 10px 15px 15px; }
        .comm-in { width: 100%; padding: 12px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; margin-top: 10px; }
        .comm-text { font-size: 13px; margin-bottom: 5px; }

        /* NAV */
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .nav-btn { cursor: pointer; color: var(--text-mut); text-align: center; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); transform: translateY(-3px); }
        .nav-btn b { display: block; font-size: 24px; margin-bottom: 2px; }
        .nav-btn span { font-size: 10px; font-weight: 800; text-transform: uppercase; }

        /* PROFILE */
        .p-card { padding: 30px 20px; text-align: center; margin-top: 10px; }
        .p-ava-big { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--primary); padding: 4px; margin-bottom: 15px; }
        .p-stats { display: flex; justify-content: center; gap: 40px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .p-stats b { display: block; font-size: 20px; }
        .p-stats span { font-size: 12px; color: var(--text-mut); }

        /* CHATS & SEARCH */
        .search-wrap { margin: 15px; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 16px; width: 100%; }
        .chat-item { margin: 10px 15px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        /* CHAT WINDOW */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .chat-h { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); border-radius: 0; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }

        /* INPUTS */
        input, textarea { width: 100%; padding: 16px; border-radius: 18px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; margin-bottom: 15px; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body data-theme="dark">

<div class="app-shell">
    <div id="scr-auth" style="display:flex; align-items:center; min-height:100vh;">
        <div class="glass" style="padding:40px; width:90%; margin:auto; text-align:center;">
            <h1 style="font-size:45px; color:var(--primary); margin-bottom:5px;">KASTA</h1>
            <p style="margin-bottom:30px; color:var(--text-mut); font-size:14px;">Social Network</p>
            <input id="login-u" placeholder="Никнейм">
            <input id="login-p" type="password" placeholder="Пароль">
            <button class="btn-main" onclick="doAuth('login')">Войти</button>
            <p onclick="doAuth('register')" style="margin-top:20px; font-size:13px; cursor:pointer; color:var(--text-mut);">Нет аккаунта? Зарегистрируйся</p>
        </div>
    </div>

    <div id="scr-app" class="hidden">
        
        <div id="view-feed">
            <div class="st-bar glass" id="st-list">
                <div class="st-item" onclick="document.getElementById('st-input').click()">
                    <div class="st-ring" style="border-style:dashed; border-color:var(--text-mut); display:flex; align-items:center; justify-content:center; font-size:30px;">+</div>
                    <span style="font-size:10px;">Твоя стори</span>
                    <input type="file" id="st-input" hidden accept="image/*" onchange="uploadStory(this)">
                </div>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="view-chats" class="hidden">
            <div class="glass search-wrap">
                <span>🔍</span>
                <input oninput="doSearch(this.value)" placeholder="Найти чат (введите имя)...">
            </div>
            <div id="chats-container"></div>
        </div>

        <div id="view-profile" class="hidden">
            <div id="profile-card" class="glass p-card"></div>
            
            <div class="glass" style="margin:15px; padding:20px;">
                <textarea id="new-post-text" placeholder="О чем вы думаете?" rows="2"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <button class="act-btn" onclick="document.getElementById('post-img-input').click()">🖼️ Фото</button>
                    <input type="file" id="post-img-input" hidden accept="image/*">
                    <button class="btn-main" style="width:auto; padding:10px 25px;" onclick="createPost()">Пост</button>
                </div>
            </div>
            <div id="profile-grid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:3px; padding:0 15px;"></div>
        </div>

        <div id="view-settings" class="hidden">
            <div class="glass" style="margin:15px; padding:30px;">
                <h3>Настройки</h3>
                <div style="margin-top: 20px;">
                    <label style="font-size:12px; color:var(--text-mut);">Отображаемое имя</label>
                    <input id="edit-name" placeholder="Имя">
                    <label style="font-size:12px; color:var(--text-mut);">О себе</label>
                    <textarea id="edit-bio" placeholder="Bio"></textarea>
                    <button class="btn-main" onclick="saveProfile()">Сохранить профиль</button>
                </div>
                
                <h4 style="margin-top: 30px; margin-bottom: 15px;">Тема оформления</h4>
                <div style="display:flex; gap:10px;">
                    <button class="btn-main" style="background:#e0e0e0; color:#000;" onclick="switchTheme('light')">Светлая</button>
                    <button class="btn-main" style="background:#111; color:#fff;" onclick="switchTheme('dark')">Темная</button>
                </div>

                <button class="btn-main" style="background:#ff3b30; margin-top:40px;" onclick="logOut()">Выйти из аккаунта</button>
            </div>
        </div>

        <nav class="nav glass">
            <div class="nav-btn active" id="n-feed" onclick="switchTab('feed')"><b>🏠</b><span>Лента</span></div>
            <div class="nav-btn" id="n-chats" onclick="switchTab('chats')"><b>💬</b><span>Чаты</span></div>
            <div class="nav-btn" id="n-profile" onclick="switchTab('profile')"><b>👤</b><span>Профиль</span></div>
            <div class="nav-btn" id="n-settings" onclick="switchTab('settings')"><b>⚙️</b><span>Опции</span></div>
        </nav>
    </div>
</div>

<div id="chat-window">
    <div class="chat-h glass">
        <button onclick="document.getElementById('chat-window').style.display='none'" style="background:none; border:none; font-size:28px; color:var(--text); cursor:pointer;">←</button>
        <b id="active-chat-name">Имя пользователя</b>
    </div>
    <div id="chat-msgs" class="chat-body"></div>
    <div class="glass" style="padding:15px; display:flex; gap:10px; border-radius:0;">
        <input id="chat-input" placeholder="Введите сообщение..." style="margin:0;">
        <button class="btn-main" style="width:auto; padding:0 20px;" onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
    const API = "https://kasta-l49s.onrender.com";
    let token = localStorage.getItem('token'), me = localStorage.getItem('me'), currentChat = "";

    function clean(u) { return u ? u.replace('http://', 'https://') : 'https://ui-avatars.com/api/?background=random&name=U'; }

    async function call(path, method='GET', body=null) {
        const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        try {
            const res = await fetch(API+path, { method, headers, body: body ? JSON.stringify(body) : null });
            if(res.status === 401) logOut();
            return await res.json();
        } catch(e) { return { error: true }; }
    }

    // --- АВТОРИЗАЦИЯ ---
    async function doAuth(type) {
        const u = document.getElementById('login-u').value, p = document.getElementById('login-p').value;
        if(!u || !p) return alert("Заполните поля!");
        const res = await fetch(`${API}/${type}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p}) });
        const d = await res.json();
        if(res.ok) {
            localStorage.setItem('token', d.token); localStorage.setItem('me', d.username);
            location.reload();
        } else alert(d.message);
    }
    function logOut() { localStorage.clear(); location.reload(); }

    // --- НАВИГАЦИЯ ---
    function switchTab(id) {
        ['feed', 'chats', 'profile', 'settings'].forEach(t => {
            const scr = document.getElementById('view-' + t);
            const btn = document.getElementById('n-' + t);
            if(scr) scr.classList.add('hidden');
            if(btn) btn.classList.remove('active');
        });
        document.getElementById('view-' + id).classList.remove('hidden');
        document.getElementById('n-' + id).classList.add('active');

        if(id === 'feed') { loadFeed(); loadStories(); }
        if(id === 'chats') loadChats();
        if(id === 'profile') loadProfile();
    }

    // --- ЛЕНТА, ПОСТЫ, КОММЕНТАРИИ ---
    async function loadFeed() {
        const data = await call('/posts');
        if(!Array.isArray(data)) return;
        
        // ВАЖНО: сначала новые посты!
        const reversedPosts = [...data].reverse();

        document.getElementById('feed-container').innerHTML = reversedPosts.map(p => `
            <div class="post glass">
                <div class="post-h">
                    <img src="${clean(p.authorAvatar)}" class="p-ava">
                    <b>${p.author}</b>
                    ${p.author === me ? `<button class="btn-del" onclick="deletePost('${p._id}')">Удалить</button>` : ''}
                </div>
                ${p.imageUrl ? `<img src="${clean(p.imageUrl)}" class="post-img">` : ''}
                <div class="post-act">
                    <button class="act-btn" onclick="likePost('${p._id}')">${p.likes.includes(me)?'❤️':'🤍'} ${p.likes.length}</button>
                    <button class="act-btn">💬 ${p.comments.length}</button>
                </div>
                <div style="padding:0 15px; font-size:14px;"><b>${p.author}</b> ${p.text || ''}</div>
                
                <div class="comm-box">
                    ${p.comments.map(c => `<div class="comm-text"><b>${c.author}:</b> ${c.text}</div>`).join('')}
                    <input class="comm-in" placeholder="Написать комментарий (Enter)" onkeydown="if(event.key==='Enter' && this.value) { addComment('${p._id}', this.value); this.value=''; }">
                </div>
            </div>
        `).join('');
    }

    async function likePost(id) { await call(`/posts/${id}/like`, 'POST'); loadFeed(); }
    async function deletePost(id) { if(confirm("Удалить пост?")) { await call('/posts/'+id, 'DELETE'); loadFeed(); } }
    async function addComment(id, text) { await call(`/posts/${id}/comment`, 'POST', {text}); loadFeed(); }

    async function createPost() {
        const t = document.getElementById('new-post-text').value;
        const f = document.getElementById('post-img-input').files[0];
        let img = f ? await packImage(f) : "";
        await call('/posts', 'POST', {text:t, imageUrl:img});
        document.getElementById('new-post-text').value = ""; 
        switchTab('profile');
    }

    // --- СТОРИС ---
    async function loadStories() {
        try {
            const res = await call('/stories');
            if(res.error) return; // Если 404 - просто выходим, ошибки не будет
            
            const list = document.getElementById('st-list');
            list.innerHTML =
