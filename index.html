<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta</title>
    <style>
        :root { --accent: #0095f6; --bg: #fafafa; --border: #dbdbdb; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 60px; }
        .hidden { display: none !important; }
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        
        /* Стили постов */
        .post { background: white; border: 1px solid var(--border); margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
        .post-header { padding: 10px; font-weight: bold; border-bottom: 1px solid #efefef; }
        .post-img { width: 100%; display: block; }
        .post-content { padding: 10px; }

        /* Профиль */
        .profile-card { background: white; border: 1px solid var(--border); padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        
        /* Навигация */
        nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; }
        nav button { background: none; border: none; font-size: 20px; cursor: pointer; }
        
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="container" style="margin-top: 100px; text-align: center; background: white; border: 1px solid var(--border); padding: 30px;">
            <h1>Kasta</h1>
            <input type="text" id="username" placeholder="Логин">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn-main" style="width:100%" onclick="authUser('login')">Войти</button>
            <p onclick="switchAuth('reg')" style="cursor:pointer; color: var(--accent); font-size: 14px;">Создать аккаунт</p>
            <p id="authMessage" style="color: red; font-size: 12px;"></p>
        </div>
    </div>

    <div id="main-screen" class="hidden">
        <nav>
            <button onclick="showTab('feed')">🏠</button>
            <button onclick="showTab('search')">🔍</button>
            <button onclick="showTab('profile')">👤</button>
        </nav>

        <div class="container">
            <div id="tab-feed">
                <h3 style="text-align: center;">Общая лента</h3>
                <div id="all-posts"></div>
            </div>

            <div id="tab-search" class="hidden">
                <input type="text" id="searchInput" oninput="searchUsers()" placeholder="Поиск людей...">
                <div id="searchResults"></div>
            </div>

            <div id="tab-profile" class="hidden">
                <div class="profile-card">
                    <h2 id="profile-name">Имя Фамилия</h2>
                    <p id="profile-handle" style="color: gray;"></p>
                    <button onclick="document.getElementById('edit-fields').classList.toggle('hidden')">Настройки ⚙️</button>
                    
                    <div id="edit-fields" class="hidden" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                        <input type="text" id="new-username" placeholder="Новый никнейм">
                        <button class="btn-main" onclick="updateProfile()">Обновить данные</button>
                    </div>
                </div>

                <div style="background: white; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <h4>Новая публикация</h4>
                    <form id="postForm">
                        <textarea id="postText" placeholder="Что нового?"></textarea>
                        <input type="file" id="postFile">
                        <button type="submit" class="btn-main" style="width:100%">Опубликовать</button>
                    </form>
                </div>

                <h3>Мои посты</h3>
                <div id="my-posts"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
