<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASTA</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        :root {
            --primary: #007aff;
            --bg-body: #f0f2f5;
            --bg-card: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #1a1a1a;
        }

        [data-theme="dark"] {
            --bg-body: #080808;
            --bg-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg-body); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: 0.3s; display: flex; }

        /* Навигация */
        .nav-side {
            position: fixed; left: 0; top: 0; width: 80px; height: 100vh;
            background: var(--bg-card); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px;
        }
        
        .main-wrapper { flex: 1; display: flex; justify-content: center; padding-left: 80px; }
        .app-shell { width: 100%; max-width: 680px; padding: 20px; }
        
        @media (max-width: 700px) {
            .nav-side { top: auto; bottom: 0; width: 100%; height: 70px; flex-direction: row; justify-content: space-around; border-right: none; border-top: 1px solid var(--glass-border); padding: 0; }
            .main-wrapper { padding-left: 0; padding-bottom: 70px; }
        }

        .glass { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .hidden { display: none !important; }

        .nav-item { cursor: pointer; color: var(--text); opacity: 0.4; transition: 0.3s; padding: 12px; border-radius: 15px; }
        .nav-item.active { opacity: 1; color: var(--primary); background: rgba(128,128,128,0.1); }
        .nav-item svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Посты */
        .post { margin-bottom: 25px; overflow: hidden; position: relative; }
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .p-ava { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: var(--bg-card); }
        .post-meta { display: flex; flex-direction: column; }
        .post-time { font-size: 11px; opacity: 0.5; margin-top: 2px; }
        .post-del { position: absolute; right: 15px; top: 20px; background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.2s; color: var(--text); }
        .post-del:hover { opacity: 1; color: #ff3b30; }

        .media-box { width: 100%; background: #000; }
        .media-box img, .media-box video { width: 100%; display: block; max-height: 550px; object-fit: contain; }
        
        .post-act { padding: 15px; display: flex; gap: 20px; border-bottom: 1px solid var(--glass-border); }
        .act-btn { background: none; border: none; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: bold; }
        .act-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; }
        .act-btn.liked { color: var(--primary); }
        .act-btn.liked svg { fill: var(--primary); }

        .comments-section { padding: 15px; font-size: 14px; }
        .comment-item { margin-bottom: 8px; background: rgba(128,128,128,0.05); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--glass-border); color: var(--text); }
        
        /* Профиль */
        .p-banner { width: 100%; height: 160px; background-color: var(--primary); background-size: cover; background-position: center; border-radius: 20px 20px 0 0; }
        .p-ava-main { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--bg-body); margin-top: -50px; object-fit: cover; background: var(--bg-card); position: relative; z-index: 2; }
        .audio-player { width: 90%; margin: 15px auto; border-radius: 15px; outline: none; }

        .p-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--bg-card); position: relative; border: 1px solid var(--glass-border); }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* Чат */
        #chat-window { position: fixed; inset: 0; background: var(--bg-body); z-index: 2000; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-size: cover; background-position: center; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; backdrop-filter: blur(5px); display: flex; flex-direction: column; color: #fff; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: rgba(128,128,128,0.5); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }

        /* Формы */
        input:not([type="file"], [type="range"]), textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--bg-card); color: var(--text); outline: none; margin-bottom: 12px; }
        ::placeholder { color: var(--text); opacity: 0.5; }
        
        .btn-main { background: var(--primary); color: #ffffff; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; text-align: center; }
        .btn-main:active { transform: scale(0.98); }
        .btn-sec { background: var(--bg-card); color: var(--text); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; text-align: center; margin-bottom: 10px; }
        
        /* Истории */
        .story-ring { border: 2px solid var(--primary); padding: 2px; border-radius: 50%; width: 64px; height: 64px; object-fit: cover; cursor: pointer; background: var(--bg-card); }
        #story-viewer { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .sv-media { max-width: 100%; max-height: 80vh; object-fit: contain; }
    </style>
</head>
<body data-theme="light">

<nav class="nav-side">
    <div class="nav-item active" id="nav-feed" onclick="window.switchTab('feed')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
    <div class="nav-item" id="nav-chats" onclick="window.switchTab('chats')"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></div>
    <div class="nav-item" id="nav-profile" onclick="window.switchTab('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
    <div class="nav-item" id="nav-settings" onclick="window.switchTab('settings')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div>
</nav>

<div class="main-wrapper">
    <div class="app-shell">
        <div id="scr-auth" style="display: flex; flex-direction: column; justify-content: center; min-height: 80vh;">
            <div class="glass" style="padding: 40px; text-align: center;">
                <h1 style="color: var(--primary); letter-spacing: 5px; margin-bottom: 30px;">KASTA</h1>
                <input id="login-u" placeholder="Логин">
                <input id="login-p" type="password" placeholder="Пароль">
                <button class="btn-main" onclick="window.doAuth('login')">ВОЙТИ</button>
                <p onclick="window.doAuth('register')" style="margin-top: 20px; font-size: 13px; opacity: 0.5; cursor: pointer;">Регистрация</p>
            </div>
        </div>

        <div id="scr-app" class="hidden">
            <div id="view-feed">
                <div id="st-row" class="glass" style="display: flex; gap: 15px; padding: 15px; margin-bottom: 20px; overflow-x: auto;">
                    <div onclick="document.getElementById('st-in').click()" style="min-width: 60px; height: 60px; border-radius: 50%; border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); font-size: 24px;">+</div>
                    <input type="file" id="st-in" hidden accept="image/*,video/*" onchange="window.uploadSt(this)">
                    <div id="st-list" style="display: flex; gap: 10px;"></div>
                </div>
                <div id="feed-cont"></div>
            </div>

            <div id="view-chats" class="hidden">
                <h2 style="margin-bottom: 20px;">Чаты</h2>
                <div id="chats-list"></div>
            </div>

            <div id="view-profile" class="hidden">
                <div id="p-card" class="glass" style="text-align: center; margin-bottom: 20px; padding-bottom: 20px;"></div>
                <button class="btn-sec" onclick="window.openArchive()">📦 Архив Историй</button>
                <div class="glass" style="padding: 15px; margin-bottom: 20px;">
                    <textarea id="post-text" placeholder="Что нового?" rows="2"></textarea>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-sec" style="flex: 1; margin: 0;" onclick="document.getElementById('post-media').click()">МЕДИА</button>
                        <input type="file" id="post-media" hidden accept="image/*,video/*">
                        <button class="btn-main" style="flex: 1;" onclick="window.createPost()">ОПУБЛИКОВАТЬ</button>
                    </div>
                </div>
                <div class="p-grid" id="p-grid"></div>
            </div>

            <div id="view-settings" class="hidden">
                <div class="glass" style="padding: 20px;">
                    <h3>Настройки</h3>
                    <button class="btn-sec" onclick="document.getElementById('ava-in').click()">📸 АВАТАРКА</button>
                    <input type="file" id="ava-in" hidden onchange="window.saveLocalFile(this, 'ava')">
                    <button class="btn-sec" onclick="document.getElementById('audio-in').click()">🎵 МУЗЫКА В ПРОФИЛЬ</button>
                    <input type="file" id="audio-in" hidden onchange="window.saveLocalFile(this, 'audio')">
                    <button class="btn-sec" onclick="window.toggleTheme()">Сменить тему</button>
                    <button class="btn-main" style="background: #ff3b30; margin-top: 20px;" onclick="window.logOut()">ВЫЙТИ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="chat-window">
    <div style="padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: var(--bg-card);">
        <button onclick="document.getElementById('chat-window').style.display='none'" style="background:none; border:none; color:var(--text); font-size: 24px;">←</button>
        <b id="chat-user">Чат</b>
    </div>
    <div id="chat-msgs" class="chat-body"></div>
    <div style="padding: 15px; display: flex; gap: 10px; background: var(--bg-card);">
        <input id="chat-in" style="margin: 0;" placeholder="Сообщение...">
        <button class="btn-main" style="width: 60px; padding: 0;" onclick="window.sendMsg()">></button>
    </div>
</div>

<div id="story-viewer">
    <button style="position:absolute; top:20px; right:20px; color:#fff; background:none; border:none; font-size:30px;" onclick="document.getElementById('story-viewer').style.display='none';">×</button>
    <img id="sv-img" class="sv-media hidden">
    <video id="sv-vid" class="sv-media hidden" controls autoplay></video>
</div>

<script>
    window.API = "https://kasta-l49s.onrender.com";
    window.token = localStorage.getItem('token');
    window.me = localStorage.getItem('me');
    window.curChat = "";

    // Универсальный вызов API
    window.call = async function(p, m='GET', b=null) {
        try {
            const r = await fetch(window.API + p, { 
                method: m, 
                headers: { 'Authorization': 'Bearer ' + window.token, 'Content-Type': 'application/json' }, 
                body: b ? JSON.stringify(b) : null 
            });
            if (m === 'DELETE' && r.ok) return { success: true };
            return await r.json();
        } catch(e) { return { error: true }; }
    };

    window.doAuth = async function(t) {
        const u = document.getElementById('login-u').value;
        const p = document.getElementById('login-p').value;
        const d = await window.call('/' + t, 'POST', {username:u, password:p});
        if(d.token) { 
            localStorage.setItem('token', d.token); 
            localStorage.setItem('me', d.username); 
            location.reload(); 
        } else alert("Ошибка входа");
    };

    window.switchTab = function(id) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('nav-' + id).classList.add('active');
        document.querySelectorAll('#scr-app > div').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + id).classList.remove('hidden');
        if(id === 'feed') window.loadFeed();
        if(id === 'chats') window.loadChats();
        if(id === 'profile') window.loadProfile();
    };

    window.loadFeed = async function() {
        const d = await window.call('/posts');
        if(!Array.isArray(d)) return;
        
        // СОРТИРОВКА: Новые сверху
        const sorted = d.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        document.getElementById('feed-cont').innerHTML = sorted.map(p => {
            const isMy = p.author === window.me;
            const delBtn = isMy ? `<button class="post-del" onclick="window.delPost('${p._id}')">🗑</button>` : '';
            const ava = localStorage.getItem('k_ava_' + p.author) || 'https://ui-avatars.com/api/?name=' + p.author;
            
            return `
            <div class="glass post">
                ${delBtn}
                <div class="post-h">
                    <img src="${ava}" class="p-ava">
                    <div class="post-meta"><b>${p.author}</b><span class="post-time">${new Date(p.createdAt).toLocaleString()}</span></div>
                </div>
                ${p.imageUrl ? `<div class="media-box"><img src="${p.imageUrl}"></div>` : ''}
                <div class="comments-section">
                    <p style="margin-bottom:10px;">${p.text || ''}</p>
                    <div style="display:flex; gap:10px;">
                        <input id="comm-in-${p._id}" placeholder="Коммент..." style="margin:0; padding:10px;">
                        <button class="btn-main" style="width:60px; padding:0;" onclick="window.addComm('${p._id}')">OK</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    };

    window.delPost = async function(id) {
        if(!confirm("Удалить пост?")) return;
        const res = await window.call('/posts/' + id, 'DELETE');
        window.loadFeed();
    };

    window.addComm = async function(id) {
        const inp = document.getElementById('comm-in-' + id);
        if(!inp.value) return;
        await window.call('/posts/'+id+'/comment', 'POST', {text: inp.value});
        inp.value = ""; window.loadFeed();
    };

    window.loadChats = async function() {
        const d = await window.call('/chats');
        if(!d.users) return;
        document.getElementById('chats-list').innerHTML = d.users.map(u => `
            <div class="glass" onclick="window.openChat('${u.username}')" style="padding:15px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:15px;">
                <img src="${localStorage.getItem('k_ava_'+u.username) || 'https://ui-avatars.com/api/?name='+u.username}" style="width:40px; border-radius:50%;">
                <b>${u.username}</b>
            </div>
        `).join('');
    };

    window.openChat = async function(n) {
        window.curChat = n;
        document.getElementById('chat-user').innerText = n;
        document.getElementById('chat-window').style.display = 'flex';
        const msgs = await window.call('/messages/' + n);
        document.getElementById('chat-msgs').innerHTML = msgs.map(m => `
            <div class="msg ${m.sender === window.me ? 'me' : 'them'}">${m.text}</div>
        `).join('');
        const box = document.getElementById('chat-msgs');
        box.scrollTop = box.scrollHeight;
    };

    window.sendMsg = async function() {
        const i = document.getElementById('chat-in');
        if(!i.value) return;
        await window.call('/messages', 'POST', {recipient: window.curChat, text: i.value});
        i.value = ""; window.openChat(window.curChat);
    };

    window.loadProfile = async function() {
        const u = await window.call('/users/profile/' + window.me);
        const ava = localStorage.getItem('k_ava_' + window.me) || 'https://ui-avatars.com/api/?name=' + window.me;
        const audio = localStorage.getItem('k_audio_' + window.me);
        document.getElementById('p-card').innerHTML = `
            <div class="p-banner"></div>
            <img src="${ava}" class="p-ava-main">
            <h2>${window.me}</h2>
            ${audio ? `<audio controls class="audio-player" src="${audio}"></audio>` : ''}
        `;
        const media = (u.posts || []).filter(p => p.imageUrl);
        document.getElementById('p-grid').innerHTML = media.map(p => `
            <div class="grid-item"><img src="${p.imageUrl}"></div>
        `).join('');
    };

    window.createPost = async function() {
        const t = document.getElementById('post-text').value;
        const f = document.getElementById('post-media').files[0];
        let img = ""; if(f) img = await window.pack(f);
        await window.call('/posts', 'POST', {text:t, imageUrl:img});
        document.getElementById('post-text').value = "";
        window.switchTab('feed');
    };

    window.saveLocalFile = async function(el, type) {
        const f = el.files[0]; if(!f) return;
        const b64 = await window.pack(f);
        localStorage.setItem('k_'+type+'_'+window.me, b64);
        alert("Сохранено!"); location.reload();
    };

    window.pack = function(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = e => r(e.target.result); }); };
    window.toggleTheme = function() { 
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next); 
    };
    window.logOut = function() { localStorage.clear(); location.reload(); };

    // Запуск
    if(window.token) {
        document.getElementById('scr-auth').classList.add('hidden');
        document.getElementById('scr-app').classList.remove('hidden');
        window.switchTab('feed');
    }
</script>
</body>
</html>
