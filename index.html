<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        :root { --blue: #0088cc; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding-bottom: 80px; }
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; }
        .btn { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-gray { background: #e4e6eb; color: #000; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
        
        .post { background: #fff; margin-bottom: 10px; border-bottom: 1px solid #ddd; position: relative; }
        .post-h { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .p-ava-s { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
        .post-img { width: 100%; display: block; cursor: zoom-in; }
        
        .comm-sec { padding: 10px; background: #fafafa; border-top: 1px solid #eee; font-size: 14px; }
        .comm { margin-bottom: 5px; }

        .prof-top { background: #fff; padding: 20px; text-align: center; }
        .p-ava-l { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); }
        .p-stats { display: flex; justify-content: center; gap: 20px; margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px; }
        .p-stats div { text-align: center; }
        .p-stats b { display: block; font-size: 18px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; border-top: 1px solid #ddd; display: flex; z-index: 1000; }
        .nav-btn { flex: 1; border: none; background: none; font-size: 24px; position: relative; }
        .badge { position: absolute; top: 10px; right: 20%; background: red; color: white; border-radius: 10px; padding: 2px 6px; font-size: 10px; }

        #msg-box { height: calc(100vh - 160px); overflow-y: auto; padding: 15px; background: #e5ddd5; display: flex; flex-direction: column; gap: 5px; }
        .m { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px #0002; }
        .m-out { align-self: flex-end; background: #dcf8c6; }
        .m-in { align-self: flex-start; background: #fff; }

        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="view-auth" class="container" style="padding: 50px 20px; text-align: center;">
        <h1 style="color:var(--blue); margin-bottom:30px;">KASTA</h1>
        <input id="auth-u" placeholder="Логин">
        <input id="auth-p" type="password" placeholder="Пароль">
        <button class="btn" style="width:100%" onclick="handleAuth('login')">Войти</button>
        <button class="btn btn-gray" style="width:100%; margin-top:10px;" onclick="handleAuth('register')">Регистрация</button>
    </div>

    <div id="view-app" class="hidden">
        <div class="container">
            <div id="sec-feed">
                <div style="background:#fff; padding:15px; border-bottom:1px solid #ddd;">
                    <textarea id="p-txt" placeholder="Расскажи что-нибудь..."></textarea>
                    <input type="file" id="p-img" accept="image/*">
                    <button class="btn" onclick="doPost()" id="btn-post">Опубликовать</button>
                </div>
                <div id="feed-list"></div>
            </div>

            <div id="sec-search" class="hidden">
                <div style="padding:15px;"><input oninput="doSearch(this.value)" placeholder="Поиск друзей..."></div>
                <div id="search-list"></div>
            </div>

            <div id="sec-chats" class="hidden">
                <div id="chats-list"></div>
                <div id="chat-active" class="hidden">
                    <div style="padding:10px; background:#fff; display:flex; gap:10px; align-items:center; border-bottom:1px solid #ddd;">
                        <button onclick="backToChats()" style="font-size:24px; border:none; background:none;">←</button>
                        <b id="chat-name"></b>
                    </div>
                    <div id="msg-box"></div>
                    <div style="padding:10px; display:flex; gap:10px; background:#fff;">
                        <input id="m-in" placeholder="Сообщение..." style="margin:0;">
                        <button class="btn" style="padding:10px 20px;" onclick="sendMsg()">➤</button>
                    </div>
                </div>
            </div>

            <div id="sec-profile" class="hidden">
                <div id="prof-ui"></div>
                <div id="prof-edit" class="hidden" style="padding:20px; background:#fff;">
                    <h3>Настройки</h3>
                    <input id="edit-name" placeholder="Отображаемое имя">
                    <input type="file" id="edit-ava" accept="image/*">
                    <button class="btn" onclick="saveProfile()" id="btn-save">Сохранить</button>
                    <button class="btn btn-gray" onclick="toggleEdit(false)">Отмена</button>
                </div>
                <div id="prof-posts" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px; background:#fff; padding-bottom: 20px;"></div>
            </div>
        </div>

        <nav class="nav">
            <button class="nav-btn" onclick="nav('feed')">🏠</button>
            <button class="nav-btn" onclick="nav('search')">🔍</button>
            <button class="nav-btn" onclick="nav('chats')">💬<div id="dot" class="badge hidden"></div></button>
            <button class="nav-btn" onclick="openProfile(me)">👤</button>
        </nav>
    </div>

    <div id="modal" class="hidden" onclick="this.classList.add('hidden')"><img id="modal-img" style="max-width:100%; max-height:100%;"></div>

    <script>
        const API = "https://kasta-l49s.onrender.com";
        const DEF = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";
        let token = localStorage.getItem('token'), me = localStorage.getItem('currentUser'), curP, chatL;

        function fixUrl(url) {
            if(!url) return DEF;
            if(url.includes('localhost:3000')) return url.replace('http://localhost:3000', API);
            return url;
        }

        // --- НОВЫЙ ФИКС ЛАГОВ: КОМПРЕССОР ФОТОГРАФИЙ ---
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800; // Ужимаем до 800px, чтобы не лагало
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); // Сжимаем до 70% качества
                    };
                };
            });
        }

        async function api(p, o={}) {
            o.headers = { ...o.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(API+p, o);
            if(res.status === 401) { localStorage.clear(); location.reload(); }
            return res.json();
        }

        async function handleAuth(t) {
            const username = document.getElementById('auth-u').value.trim();
            const password = document.getElementById('auth-p').value.trim();
            const res = await fetch(`${API}/${t}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, password}) });
            const d = await res.json();
            if(res.ok) { localStorage.setItem('token', d.token); localStorage.setItem('currentUser', d.username); location.reload(); }
            else alert(d.message);
        }

        function nav(s) {
            document.querySelectorAll('[id^="sec-"]').forEach(x => x.classList.add('hidden'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            if(s==='feed') loadFeed();
            if(s==='chats') loadChats();
        }

        async function loadFeed() {
            document.getElementById('feed-list').innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Загрузка...</div>';
            const pp = await api('/posts');
            document.getElementById('feed-list').innerHTML = pp.map(p => `
                <div class="post">
                    <div class="post-h" onclick="openProfile('${p.author}')">
                        <img class="p-ava-s" src="${fixUrl(p.authorAvatar)}">
                        <b>${p.author}</b>
                        ${p.author === me ? `<button style="margin-left:auto; border:none; background:none; color:red; font-size:18px;" onclick="event.stopPropagation(); deletePost('${p._id}')">✕</button>` : ''}
                    </div>
                    ${p.text ? `<div style="padding:0 12px 10px">${p.text}</div>` : ''}
                    ${p.imageUrl ? `<img src="${fixUrl(p.imageUrl)}" class="post-img" onclick="zoom('${fixUrl(p.imageUrl)}')">` : ''}
                    <div style="padding:10px; display:flex; gap:15px;">
                        <button onclick="doLike('${p._id}')" style="border:none; background:none; font-size:18px;">❤️ ${p.likes.length}</button>
                    </div>
                    <div class="comm-sec">
                        ${p.comments.map(c => `<div class="comm"><b>${c.author}:</b> ${c.text}</div>`).join('')}
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <input id="ci-${p._id}" placeholder="Коммент..." style="margin:0; padding:5px; font-size:12px;">
                            <button class="btn" style="padding:5px 10px; font-size:12px;" onclick="addComment('${p._id}')">OK</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openProfile(n) {
            nav('profile');
            const u = await api('/users/profile/'+n);
            const isMe = u.username === me;
            const isSub = u.subscribers && u.subscribers.includes(me);

            document.getElementById('prof-ui').innerHTML = `
                <div class="prof-top">
                    <img src="${fixUrl(u.avatarUrl)}" class="p-ava-l" onclick="zoom('${fixUrl(u.avatarUrl)}')">
                    <h2>${u.displayName || u.username}</h2>
                    <p style="color:#666">@${u.username}</p>
                    <div class="p-stats">
                        <div><b>${u.postsCount}</b>посты</div>
                        <div><b>${u.subscribersCount}</b>подписчики</div>
                        <div><b>${u.subscriptionsCount}</b>подписки</div>
                    </div>
                    ${isMe ? `
                        <button class="btn btn-gray" onclick="toggleEdit(true)">Настройки</button>
                        <button class="btn btn-gray" onclick="localStorage.clear();location.reload()" style="color:red">Выйти</button>
                    ` : `
                        <div style="display:flex; gap:10px; justify-content:center;">
                            <button class="btn" style="background:${isSub?'#ccc':''}" onclick="doFollow('${u.username}')">${isSub?'Отписаться':'Подписаться'}</button>
                            <button class="btn btn-gray" onclick="startChat('${u.username}')">Сообщение</button>
                        </div>
                    `}
                </div>
            `;
            // ИСПРАВЛЕНА СЕТКА ПОСТОВ (Красивый вид для текста и картинок)
            document.getElementById('prof-posts').innerHTML = u.posts.map(p => `
                <div style="aspect-ratio:1/1; background:#f8f9fa; border:1px solid #fff; overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="zoom('${fixUrl(p.imageUrl || '')}')">
                    ${p.imageUrl ? `<img src="${fixUrl(p.imageUrl)}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="padding:10px; font-size:12px; text-align:center; color:#555; word-break:break-word;">${p.text.substring(0,40)}${p.text.length>40?'...':''}</div>`}
                </div>
            `).join('');
        }

        async function saveProfile() {
            document.getElementById('btn-save').innerText = 'Загрузка...';
            const displayName = document.getElementById('edit-name').value;
            const file = document.getElementById('edit-ava').files[0];
            let avatarUrl = "";
            if(file) avatarUrl = await compressImage(file); // Сжимаем аватарку
            
            await api('/users/update', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({displayName, avatarUrl}) });
            document.getElementById('btn-save').innerText = 'Сохранить';
            toggleEdit(false); openProfile(me);
        }

        async function doLike(id) { await api(`/posts/${id}/like`, {method:'POST'}); loadFeed(); }
        async function deletePost(id) { if(confirm('Удалить этот пост?')) { await api(`/posts/${id}`, {method:'DELETE'}); loadFeed(); } }
        async function addComment(id) {
            const text = document.getElementById('ci-'+id).value; if(!text) return;
            await api(`/posts/${id}/comment`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text})});
            loadFeed();
        }
        async function doFollow(n) { await api('/users/follow/'+n, {method:'POST'}); openProfile(n); }
        function toggleEdit(v) { document.getElementById('prof-ui').classList.toggle('hidden', v); document.getElementById('prof-edit').classList.toggle('hidden', !v); }
        function zoom(url) { if(!url || url===DEF) return; document.getElementById('modal-img').src = url; document.getElementById('modal').classList.remove('hidden'); }

        async function doPost() {
            const btn = document.getElementById('btn-post');
            const text = document.getElementById('p-txt').value, file = document.getElementById('p-img').files[0];
            if(!text && !file) return;
            
            btn.innerText = 'Загрузка...';
            let imageUrl = "";
            if(file) imageUrl = await compressImage(file); // Сжимаем фото перед отправкой!
            
            await api('/posts', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, imageUrl}) });
            document.getElementById('p-txt').value = ""; document.getElementById('p-img').value = ""; 
            btn.innerText = 'Опубликовать';
            loadFeed();
        }

        async function loadChats() {
            const d = await api('/chats');
            const dot = document.getElementById('dot');
            if(d.unreadCount > 0) { dot.innerText = d.unreadCount; dot.classList.remove('hidden'); } else dot.classList.add('hidden');
            document.getElementById('chats-list').innerHTML = d.users.map(u => `
                <div style="padding:15px; background:#fff; border-bottom:1px solid #eee; display:flex; gap:10px; align-items:center;" onclick="startChat('${u.username}')">
                    <img src="${fixUrl(u.avatarUrl)}" class="p-ava-s">
                    <b>${u.displayName || u.username}</b>
                </div>
            `).join('');
        }

        function startChat(n) {
            curP = n; nav('chats'); document.getElementById('chats-list').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('chat-name').innerText = n;
            loadMsgs(); if(chatL) clearInterval(chatL); chatL = setInterval(loadMsgs, 4000);
        }
        function backToChats() { clearInterval(chatL); document.getElementById('chat-active').classList.add('hidden'); document.getElementById('chats-list').classList.remove('hidden'); loadChats(); }
        async function loadMsgs() {
            const m = await api('/messages/'+curP);
            document.getElementById('msg-box').innerHTML = m.map(msg => `<div class="m ${msg.sender === me ? 'm-out' : 'm-in'}">${msg.text}</div>`).join('');
            const b = document.getElementById('msg-box'); b.scrollTop = b.scrollHeight;
        }
        async function sendMsg() {
            const text = document.getElementById('m-in').value; if(!text) return;
            await api('/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({receiver:curP, text}) });
            document.getElementById('m-in').value = ""; loadMsgs();
        }

        async function doSearch(q) {
            if(!q) return;
            const uu = await api('/users/search?q='+q);
            document.getElementById('search-list').innerHTML = uu.map(u => `
                <div style="padding:15px; background:#fff; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px;" onclick="openProfile('${u.username}')">
                    <img src="${fixUrl(u.avatarUrl)}" class="p-ava-s">
                    <b>${u.username}</b>
                </div>
            `).join('');
        }

        if(token) { document.getElementById('view-auth').classList.add('hidden'); document.getElementById('view-app').classList.remove('hidden'); loadFeed(); setInterval(loadChats, 15000); }
    </script>
</body>
</html>
