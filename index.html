<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasta Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        /* === ТЕМЫ И ПЕРЕМЕННЫЕ === */
        :root { 
            --primary: #8a2be2; /* Дефолтный фиолетовый из скрина */
            --bg: #f4f5f7; 
            --surface: #ffffff; 
            --text: #1a1a1a; 
            --text-mut: #8e8e8e; 
            --border: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
            --radius: 20px;
            --anim: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg: #0f0f11;
            --surface: #1c1c1e;
            --text: #f0f0f0;
            --text-mut: #7a7a7a;
            --border: #2c2c2e;
            --glass: rgba(28, 28, 30, 0.85);
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); transition: background var(--anim), color var(--anim); overflow-x: hidden; }
        
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 90px; }

        /* === ТИПОГРАФИКА И ИНПУТЫ === */
        h1, h2, b { color: var(--text); }
        input, textarea { width: 100%; padding: 14px 18px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; font-size: 15px; background: var(--surface); color: var(--text); transition: border var(--anim); outline: none; }
        input:focus, textarea:focus { border-color: var(--primary); }
        
        /* === КНОПКИ === */
        .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 14px; font-weight: 600; cursor: pointer; font-size: 15px; transition: transform 0.2s, opacity var(--anim), background var(--anim); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gray { background: var(--border); color: var(--text); }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-icon { background: none; border: none; color: var(--text); cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-icon:active { transform: scale(0.85); }

        /* === АВТОРИЗАЦИЯ === */
        #view-auth { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
        .auth-card { background: var(--surface); padding: 40px 30px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }

        /* === ПОСТЫ И ЛЕНТА === */
        .post { background: var(--surface); margin: 15px; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: background var(--anim); }
        .post-h { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .p-ava-s { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: var(--border); }
        .post-img { width: 100%; display: block; max-height: 500px; object-fit: cover; }
        .post-actions { padding: 12px 15px; display: flex; align-items: center; gap: 15px; }
        .post-info { padding: 0 15px 12px; font-size: 14px; line-height: 1.5; }
        
        /* === КОММЕНТАРИИ === */
        .comm-sec { padding: 12px 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.02); }
        .comm-item { margin-bottom: 6px; font-size: 13.5px; }
        .comm-item b { font-weight: 600; margin-right: 5px; }

        /* === ПРОФИЛЬ === */
        .prof-top { padding: 30px 20px; background: var(--surface); display: flex; flex-direction: column; align-items: center; border-bottom-left-radius: var(--radius); border-bottom-right-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 15px; }
        .p-ava-l { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; padding: 4px; border: 3px solid var(--primary); }
        .p-stats { display: flex; width: 100%; justify-content: space-evenly; margin: 20px 0; }
        .p-stats div { text-align: center; }
        .p-stats b { display: block; font-size: 18px; }
        .p-stats span { font-size: 12px; color: var(--text-mut); }

        /* === СЕТКА === */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 0 15px; }
        .grid-item { aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform var(--anim); }
        .grid-item:active { transform: scale(0.95); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* === ЧАТЫ === */
        .chat-list-item { padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--surface); margin: 10px 15px; border-radius: 16px; box-shadow: var(--shadow); cursor: pointer; }
        #msg-box { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .m { padding: 12px 16px; border-radius: 20px; max-width: 75%; font-size: 14.5px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .m-out { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .m-in { align-self: flex-start; background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
        .m-time { font-size: 10px; opacity: 0.7; display: block; margin-top: 5px; text-align: right; }

        /* === ПАНЕЛЬ НАВИГАЦИИ (МОБИЛКА ПО УМОЛЧАНИЮ) === */
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 65px; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 30px; display: flex; align-items: center; justify-content: space-around; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .nav-btn { background: none; border: none; color: var(--text-mut); font-size: 24px; cursor: pointer; transition: all var(--anim); position: relative; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--primary); background: rgba(0,0,0,0.03); }
        .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .nav-btn span { display: none; } /* Текст скрыт на мобилке */
        .badge { position: absolute; top: 8px; right: 8px; background: #ff3b30; color: white; border-radius: 10px; padding: 2px 6px; font-size: 10px; font-weight: bold; border: 2px solid var(--surface); }

        /* === МОДАЛКА ФОТО === */
        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center; opacity: 0; pointer-events: none; transition: opacity var(--anim); }
        #modal.show { opacity: 1; pointer-events: auto; }
        #modal-img { max-width: 95%; max-height: 95%; border-radius: 10px; }

        /* === НАСТРОЙКИ (НОВОЕ) === */
        .settings-block { background: var(--surface); margin: 15px; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .color-picker { display: flex; gap: 15px; margin-top: 15px; }
        .color-circle { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .color-circle:active { transform: scale(0.8); }

        /* === АДАПТИВНОСТЬ ДЛЯ ПК (МЕНЮ СПРАВА) === */
        @media (min-width: 768px) {
            body { padding-right: 280px; display: flex; justify-content: center; }
            .container { padding-bottom: 20px; margin: 0; padding-top: 20px; }
            
            .nav { bottom: auto; left: auto; right: 0; top: 0; transform: none; width: 280px; height: 100vh; border-radius: 0; border: none; border-left: 1px solid var(--border); flex-direction: column; justify-content: flex-start; align-items: flex-start; padding: 30px 20px; box-shadow: none; background: var(--surface); backdrop-filter: none; }
            
            .nav-btn { width: 100%; justify-content: flex-start; border-radius: 14px; padding: 15px 20px; gap: 15px; color: var(--text); }
            .nav-btn span { display: block; font-size: 16px; font-weight: 600; }
            .nav-btn.active { background: var(--primary); color: #fff; }
            .badge { top: 15px; right: 20px; }
            
            .grid { grid-template-columns: repeat(4, 1fr); }
            .post, .prof-top, .settings-block, .chat-list-item { margin: 0 0 20px 0; }
        }
    </style>
</head>
<body>

    <div id="view-auth" class="container hidden">
        <div class="auth-card">
            <h1 style="font-size: 40px; margin-bottom: 10px; color: var(--primary); letter-spacing: 2px;">KASTA</h1>
            <p style="color: var(--text-mut); margin-bottom: 30px;">Premium Social Network</p>
            <input id="auth-u" placeholder="Логин">
            <input id="auth-p" type="password" placeholder="Пароль">
            <button class="btn" style="width:100%; margin-top:10px;" onclick="handleAuth('login')">Войти</button>
            <button class="btn btn-gray" style="width:100%; margin-top:15px;" onclick="handleAuth('register')">Создать аккаунт</button>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="container">
            
            <div id="sec-feed">
                <div class="settings-block" style="display:flex; flex-direction:column; gap:10px;">
                    <textarea id="p-txt" placeholder="Что нового?" rows="2" style="border:none; background:transparent; padding:5px; font-size:16px; margin:0;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items:center; border-top: 1px solid var(--border); padding-top:10px;">
                        <label style="cursor:pointer; color:var(--primary); font-weight:600; display:flex; align-items:center; gap:8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            Фото <input type="file" id="p-img" accept="image/*" style="display:none;">
                        </label>
                        <button class="btn" id="btn-post" onclick="doPost()">Пост</button>
                    </div>
                </div>
                <div id="feed-list"></div>
            </div>

            <div id="sec-search" class="hidden">
                <div class="settings-block"><input oninput="doSearch(this.value)" placeholder="Найти друзей..." style="margin:0;"></div>
                <div id="search-list" style="padding: 0 15px;"></div>
            </div>

            <div id="sec-chats" class="hidden">
                <div id="chats-list"></div>
                <div id="chat-active" class="hidden">
                    <div style="padding:15px; background:var(--glass); backdrop-filter:blur(10px); display:flex; gap:15px; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;">
                        <button class="btn-icon" onclick="backToChats()"><svg width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <b id="chat-name" style="font-size:18px;">Чат</b>
                    </div>
                    <div id="msg-box"></div>
                    <div style="padding:15px; display:flex; gap:10px; background:var(--surface); border-top: 1px solid var(--border); position:sticky; bottom:0;">
                        <input id="m-in" placeholder="Сообщение..." style="margin:0; border-radius: 20px;">
                        <button class="btn" style="border-radius: 50%; width:50px; height:50px; padding:0;" onclick="sendMsg()"><svg width="20" height="20" viewBox="0 0 24 24" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </div>
                </div>
            </div>

            <div id="sec-profile" class="hidden">
                <div id="prof-ui"></div>
                <div id="prof-edit" class="settings-block hidden">
                    <h2 style="margin-bottom:15px;">Редактирование</h2>
                    <input id="edit-name" placeholder="Отображаемое имя">
                    <p style="font-size:13px; color:var(--text-mut); margin-bottom:5px;">Сменить аватар:</p>
                    <input type="file" id="edit-ava" accept="image/*" style="padding:10px;">
                    <button class="btn" onclick="saveProfile()" style="width:100%">Сохранить</button>
                    <button class="btn btn-gray" onclick="toggleEdit(false)" style="width:100%; margin-top:10px;">Отмена</button>
                </div>
                <div id="prof-posts" class="grid"></div>
                <div id="prof-feed" class="hidden">
                   <button class="btn btn-gray" onclick="closeProfFeed()" style="width:calc(100% - 30px); margin:0 15px 15px;">‹ Назад к сетке</button>
                   <div id="prof-feed-list"></div>
                </div>
            </div>

            <div id="sec-settings" class="hidden">
                <div class="settings-block">
                    <h2>Внешний вид</h2>
                    <p style="color:var(--text-mut); font-size:14px; margin-top:5px;">Настрой Kasta под себя</p>
                    
                    <h3 style="margin-top:20px; font-size:16px;">Тема</h3>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn btn-gray" style="flex:1" onclick="setTheme('light')">Светлая</button>
                        <button class="btn" style="flex:1; background:#1c1c1e;" onclick="setTheme('dark')">Темная</button>
                    </div>

                    <h3 style="margin-top:25px; font-size:16px;">Цвет акцента</h3>
                    <div class="color-picker">
                        <div class="color-circle" style="background:#8a2be2;" onclick="setColor('#8a2be2')"></div>
                        <div class="color-circle" style="background:#0095f6;" onclick="setColor('#0095f6')"></div>
                        <div class="color-circle" style="background:#ff2d55;" onclick="setColor('#ff2d55')"></div>
                        <div class="color-circle" style="background:#34c759;" onclick="setColor('#34c759')"></div>
                        <div class="color-circle" style="background:#ff9500;" onclick="setColor('#ff9500')"></div>
                    </div>
                    
                    <button class="btn btn-gray" style="width:100%; margin-top:30px; color:#ff3b30;" onclick="logout()">Выйти из аккаунта</button>
                </div>
            </div>

        </div>

        <nav class="nav" id="main-nav">
            <button class="nav-btn active" onclick="nav('feed', this)">
                <svg><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Лента</span>
            </button>
            <button class="nav-btn" onclick="nav('search', this)">
                <svg><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <span>Поиск</span>
            </button>
            <button class="nav-btn" onclick="nav('chats', this)">
                <svg><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <div id="dot" class="badge hidden"></div>
                <span>Чаты</span>
            </button>
            <button class="nav-btn" onclick="openProfile(me, this)">
                <svg><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Профиль</span>
            </button>
            <button class="nav-btn" onclick="nav('settings', this)">
                <svg><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Настройки</span>
            </button>
        </nav>
    </div>

    <div id="modal" onclick="closeZoom()"><img id="modal-img" src=""></div>

    <script>
        // === ЛОГИКА ТЕМ И ЦВЕТОВ ===
        function loadTheme() {
            const t = localStorage.getItem('theme') || 'light';
            const c = localStorage.getItem('color') || '#8a2be2';
            setTheme(t); setColor(c);
        }
        function setTheme(mode) {
            if(mode === 'dark') document.body.setAttribute('data-theme', 'dark');
            else document.body.removeAttribute('data-theme');
            localStorage.setItem('theme', mode);
        }
        function setColor(hex) {
            document.documentElement.style.setProperty('--primary', hex);
            localStorage.setItem('color', hex);
        }
        loadTheme(); // Применяем сразу при загрузке

        // === БЭКЕНД И ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ) ===
        const API = "https://kasta-l49s.onrender.com";
        const DEF = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";
        let token = localStorage.getItem('token'), me = localStorage.getItem('currentUser'), curP, chatL, lastProfileData = null;

        function fixUrl(url) { if(!url) return DEF; return url.replace('http://localhost:3000', API).replace('http://', 'https://'); }

        async function api(path, opt={}) {
            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            opt.headers = { ...headers, ...opt.headers };
            const r = await fetch(API+path, opt);
            if(r.status === 401) logout();
            return r.json();
        }

        async function handleAuth(t) {
            const u = document.getElementById('auth-u').value.trim(), p = document.getElementById('auth-p').value.trim();
            if(!u || !p) return alert("Заполни поля");
            const res = await fetch(`${API}/${t}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
            const d = await res.json();
            if(res.ok) { localStorage.setItem('token', d.token); localStorage.setItem('currentUser', d.username); location.reload(); }
            else alert(d.message);
        }

        function logout() { localStorage.clear(); location.reload(); }

        function nav(s, btnElem) {
            document.querySelectorAll('[id^="sec-"]').forEach(x => x.classList.add('hidden'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            window.scrollTo({top:0, behavior: 'smooth'});
            
            // Подсветка активной кнопки в меню
            if(btnElem) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btnElem.classList.add('active');
            }

            if(s==='feed') loadFeed();
            if(s==='chats') loadChats();
        }

        function renderPostList(pp, elId) {
            const list = document.getElementById(elId); list.innerHTML = '';
            pp.forEach(p => {
                const div = document.createElement('div'); div.className = 'post';
                div.innerHTML = `
                    <div class="post-h" onclick="openProfile('${p.author}')">
                        <img class="p-ava-s" src="${fixUrl(p.authorAvatar)}">
                        <span style="font-weight:600;">${p.author}</span>
                        ${p.author === me ? `<button class="btn-icon" style="margin-left:auto; color:#ff3b30;" onclick="event.stopPropagation(); deletePost('${p._id}')"><svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : ''}
                    </div>
                    ${p.imageUrl ? `<img src="${fixUrl(p.imageUrl)}" class="post-img" onclick="zoom('${fixUrl(p.imageUrl)}')">` : ''}
                    <div class="post-actions">
                        <button class="btn-icon" onclick="doLike('${p._id}', '${elId}')">
                            <svg width="26" height="26" viewBox="0 0 24 24" stroke="${p.likes?.includes(me) ? 'var(--primary)' : 'currentColor'}" fill="${p.likes?.includes(me) ? 'var(--primary)' : 'none'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        </button>
                        <span style="font-weight:600; font-size:15px;">${p.likes?.length || 0} отметок</span>
                    </div>
